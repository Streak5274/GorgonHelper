// SURVEY TAB
// ═══════════════════════════════════════════════════════════

const SURVEY_WS_URL = 'ws://localhost:8765';

// ── Safecracking state ──
let scState = null;
let scGuessInputs = ['','','',''];
let scSolver = null; // local JS solver (no server needed)

// ── Local Mastermind solver ──────────────────────────────────
function scSolverInit(n) {
  const all = [];
  for (let a = 1; a <= n; a++)
    for (let b = 1; b <= n; b++)
      for (let c = 1; c <= n; c++)
        for (let d = 1; d <= n; d++)
          all.push([a,b,c,d]);
  scSolver = { symbolCount: n, history: [], candidates: all, guess_count: 0 };
  scSolverBuildState();
}

function scSolverScore(guess, secret) {
  let exact = 0;
  const gl = [], sl = [];
  for (let i = 0; i < 4; i++) {
    if (guess[i] === secret[i]) exact++;
    else { gl.push(guess[i]); sl.push(secret[i]); }
  }
  let misplaced = 0;
  const used = new Uint8Array(sl.length);
  for (const g of gl) for (let j = 0; j < sl.length; j++) if (!used[j] && sl[j] === g) { misplaced++; used[j] = 1; break; }
  return { exact, misplaced };
}

function scSolverBuildState() {
  const s = scSolver;
  const n = s.candidates.length;
  scState = { solver: {
    history:     s.history,
    suggestion:  n > 0 ? s.candidates[0] : null,
    solved:      n === 1,
    impossible:  n === 0,
    candidates:  n,
    guess_count: s.guess_count,
    symbols:     Array.from({ length: s.symbolCount }, (_, i) => i + 1)
  }};
}

function scSolverRecord(guess, exact, misplaced) {
  const s = scSolver;
  s.history.push({ guess: [...guess], exact, misplaced });
  s.guess_count++;
  s.candidates = s.candidates.filter(c => {
    const r = scSolverScore(guess, c);
    return r.exact === exact && r.misplaced === misplaced;
  });
  scSolverBuildState();
}

function scSolverUndo() {
  if (!scSolver?.history.length) return;
  const prevHistory = scSolver.history.slice(0, -1); // all but last entry
  const n = scSolver.symbolCount;
  scSolverInit(n); // fresh candidates
  for (const h of prevHistory) scSolverRecord(h.guess, h.exact, h.misplaced);
}

// ── Gardening helpers ─────────────────────────────────────────
function startGardenSession() {
  gardenSessionActive = true;
  localStorage.setItem('gardenSessionActive', '1');
  if (mainTab === 'tools' && toolsSubTab === 'gardening') renderToolsTab();
}

function stopGardenSession() {
  gardenSessionActive = false;
  localStorage.removeItem('gardenSessionActive');
  if (mainTab === 'tools' && toolsSubTab === 'gardening') renderToolsTab();
}

function markPlotHarvested(charName, plotId) {
  if (!gardenData[charName]?.plots?.[plotId]) return;
  gardenData[charName].plots[plotId].stage = 'harvested';
  gardenData[charName].plots[plotId].updatedAt = Date.now();
  savePlayerLogData();
  if (mainTab === 'tools' && toolsSubTab === 'gardening') renderToolsTab();
}

function clearHarvestedPlots(charName) {
  if (!gardenData[charName]) return;
  for (const id of Object.keys(gardenData[charName].plots)) {
    if (gardenData[charName].plots[id].stage === 'harvested') delete gardenData[charName].plots[id];
  }
  savePlayerLogData();
  if (mainTab === 'tools' && toolsSubTab === 'gardening') renderToolsTab();
}

function markAllHarvested(charName) {
  if (!gardenData[charName]) return;
  for (const plot of Object.values(gardenData[charName].plots)) {
    if (plot.stage !== 'harvested') { plot.stage = 'harvested'; plot.updatedAt = Date.now(); }
  }
  savePlayerLogData();
  if (mainTab === 'tools' && toolsSubTab === 'gardening') renderToolsTab();
}

function clearAllGardenData(charName) {
  if (charName) delete gardenData[charName];
  else gardenData = {};
  savePlayerLogData();
  if (mainTab === 'tools' && toolsSubTab === 'gardening') renderToolsTab();
}

function renderGardeningTab(targetEl) {
  const el = targetEl || document.getElementById('appContent');
  if (!el) return;

  const GARDEN_CROP_ICONS = {
    'Potato': 5022, 'Onion': 5024, 'Cabbage': 5103, 'Beet': 5101,
    'Squash': 5105, 'Broccoli': 5135, 'Carrot': 5134, 'Pumpkin': 5404,
    'Tomato': 5458, 'Barley': 5717, 'OrcishWheat': 5719, 'Orcish Wheat': 5719,
    'Cotton': 5360, 'Cotton Plant': 5360, 'Marigold': 5285,
  };

  // Growth times in seconds (from wiki)
  const GARDEN_GROWTH_SECS = {
    'Potato': 50, 'Onion': 50, 'Cabbage': 55, 'Beet': 65,
    'Squash': 170, 'Broccoli': 175, 'Carrot': 175,
    'Green Pepper': 245, 'Red Pepper': 274, 'Corn': 285,
    'Escarole': 295, 'Basil': 304, 'Cantaloupe': 311, 'Pea': 310, 'Soybean': 310,
    'Bluebell': 70, 'Red Aster': 90, 'Violet': 110, 'Dahlia': 120,
    'Daisy': 130, 'Pansy': 140, 'Marigold': 150, 'Poppy': 160,
    'Red Rose': 170, 'Elven Lily': 180, 'Winterhue': 190,
    'Desert Rose': 199, 'Dandelion': 207, 'Fae Mysotis': 218,
    'Tulip': 228, 'Paleblood': 235,
    'Horse Apple': 59, 'Cotton': 150, 'Cotton Plant': 150, 'Evil Pumpkin': 75,
    'Sugarcane': 128, 'Barley': 150, 'Pumpkin': 170,
    'Flax': 282, 'Oat': 250, 'Tundra Rye': 250,
  };

  const SLOT_EMOJI = { Flowers:'🌸', Cotton:'🌿', Grass:'🌾' };

  // Format seconds into "1m 30s" style
  function fmtDur(secs) {
    if (secs <= 0) return '0s';
    const m = Math.floor(secs / 60), s = Math.round(secs % 60);
    return m > 0 ? (s > 0 ? `${m}m ${s}s` : `${m}m`) : `${s}s`;
  }

  const STAGE = {
    planted:          { icon: '🌱', label: 'Just Planted',        color: '#7ec87e' },
    growing:          { icon: '🌿', label: 'Growing',             color: '#4caf50' },
    thirsty:          { icon: '💧', label: 'Thirsty',             color: '#5b9bd5' },
    needs_fertilizer: { icon: '🧪', label: 'Needs Fertilizer',    color: '#e6a817' },
    ripe:             { icon: '🌾', label: 'Ready to Harvest',    color: '#f0c040' },
    harvested:        { icon: '✅', label: 'Harvested',           color: '#666'    },
  };
  const STAGE_ORDER = { ripe: 0, thirsty: 1, needs_fertilizer: 2, growing: 3, planted: 4, harvested: 5 };

  const sessionBtn = gardenSessionActive
    ? `<button class="sync-btn danger" onclick="stopGardenSession()">⏹ Stop</button>`
    : `<button class="sync-btn" onclick="startGardenSession()" style="background:var(--gold-dim);border-color:var(--gold);color:var(--gold)">▶ Start</button>`;

  const chars = Object.keys(gardenData).filter(c => Object.keys(gardenData[c]?.plots || {}).length > 0);

  if (!gardenSessionActive && chars.length === 0) {
    el.innerHTML = `<div style="padding:32px 24px;text-align:center;color:var(--text-dim)">
      <div style="font-size:36px;margin-bottom:12px">🌱</div>
      <div style="font-family:'Cinzel',serif;font-size:14px;color:var(--text);margin-bottom:12px">Gardening Tracker</div>
      <div style="font-size:13px;max-width:320px;margin:0 auto 20px;line-height:1.5">
        Press Start before planting seeds to begin tracking your garden plots.
      </div>
      <button class="sync-btn" onclick="startGardenSession()" style="background:var(--gold-dim);border-color:var(--gold);color:var(--gold);font-size:13px;padding:8px 28px">▶ Start</button>
    </div>`;
    return;
  }

  // Pre-compute toolbar action buttons (Reset / Clear harvested) for all chars
  const toolbarActions = chars.map(charName => {
    const plots = gardenData[charName].plots;
    const hasHarvested = Object.values(plots).some(p => p.stage === 'harvested');
    const safe = charName.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const label = chars.length > 1 ? ` (${charName})` : '';
    return [
      hasHarvested ? `<button class="sync-btn" onclick="clearHarvestedPlots('${safe}')">✕ Clear harvested${label}</button>` : '',
      `<button class="sync-btn danger" onclick="if(confirm('Clear all garden data for ${charName}?')) clearAllGardenData('${safe}')" title="Remove all plot data">✕ Reset${label}</button>`,
    ].filter(Boolean).join('');
  }).join('');

  // Top bar: session status + buttons
  const statusDot = gardenSessionActive
    ? `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#4caf50;margin-right:5px;box-shadow:0 0 5px #4caf5088"></span><span style="color:#4caf50;font-size:11px">Monitoring</span>`
    : `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#666;margin-right:5px"></span><span style="color:var(--text-dim);font-size:11px">Stopped</span>`;
  let html = `<div style="display:flex;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap">
    ${sessionBtn}
    ${toolbarActions ? `<span class="filter-divider"></span>${toolbarActions}` : ''}
    <span style="flex:1"></span>${statusDot}
  </div>`;

  if (chars.length === 0) {
    html += `<div style="padding:24px;text-align:center;color:var(--text-dim);font-size:13px">No plots detected yet. Plant seeds in-game to see them here.</div>`;
    el.innerHTML = html;
    return;
  }

  for (const charName of chars) {
    const plots = gardenData[charName].plots;
    const sorted = Object.entries(plots).sort((a, b) => {
      const ap = STAGE_ORDER[a[1].stage] ?? 9, bp = STAGE_ORDER[b[1].stage] ?? 9;
      return ap !== bp ? ap - bp : (b[1].firstSeenAt || 0) - (a[1].firstSeenAt || 0);
    });
    const activePlots = sorted.filter(([, p]) => p.stage !== 'harvested');
    const harvestedPlots = sorted.filter(([, p]) => p.stage === 'harvested');
    const ripeCnt = activePlots.filter(([, p]) => p.stage === 'ripe').length;
    const needsCnt = activePlots.filter(([, p]) => p.stage === 'thirsty' || p.stage === 'needs_fertilizer').length;

    const safeCharHeader = charName.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += `<div style="margin-bottom:4px">
      <div style="font-family:'Cinzel',serif;font-size:13px;color:var(--gold);padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span>${charName}</span>
        <span style="font-size:11px;color:var(--text-dim);font-family:sans-serif">${activePlots.length} active plot${activePlots.length !== 1 ? 's' : ''}</span>
        ${ripeCnt > 0 ? `<span style="background:#f0c04020;color:#f0c040;border:1px solid #f0c04055;border-radius:10px;padding:1px 8px;font-size:11px;font-family:sans-serif">🌾 ${ripeCnt} ready</span>` : ''}
        ${needsCnt > 0 ? `<span style="background:#5b9bd520;color:#5b9bd5;border:1px solid #5b9bd555;border-radius:10px;padding:1px 8px;font-size:11px;font-family:sans-serif">⚠ ${needsCnt} need attention</span>` : ''}
        <span style="flex:1"></span>
        ${ripeCnt > 0 ? `<button class="sync-btn" onclick="markAllHarvested('${safeCharHeader}')" title="Mark all plots as harvested">✓ Harvest All</button>` : ''}
      </div>`;

    // ── Capacity section ─────────────────────────────────────
    // Count active (non-harvested) plots per slot
    const slotCounts = {};
    for (const [, p] of sorted) {
      if (p.stage === 'harvested' || !p.cropType) continue;
      const si2 = GARDEN_SLOT_MAP[p.cropType];
      if (!si2) continue;
      if (!slotCounts[si2.slot]) slotCounts[si2.slot] = { count: 0, max: si2.max };
      slotCounts[si2.slot].count++;
    }
    // Always show Flowers/Cotton/Grass regardless of count (so player sees capacity)
    for (const [crop, info] of Object.entries(GARDEN_SLOT_MAP)) {
      if (['Flowers','Cotton','Grass'].includes(info.slot) && !slotCounts[info.slot])
        slotCounts[info.slot] = { count: 0, max: info.max };
    }
    const slotEntries = Object.entries(slotCounts).sort((a, b) => {
      // Active (count > 0) before empty; within active: full before partial; then alphabetical
      const aEmpty = a[1].count === 0 ? 1 : 0, bEmpty = b[1].count === 0 ? 1 : 0;
      if (aEmpty !== bEmpty) return aEmpty - bEmpty;
      const af = a[1].count >= a[1].max ? 0 : 1, bf = b[1].count >= b[1].max ? 0 : 1;
      return af !== bf ? af - bf : a[0].localeCompare(b[0]);
    });
    if (slotEntries.length) {
      html += `<div style="display:flex;flex-wrap:wrap;gap:5px;padding:6px 12px 8px;border-bottom:1px solid var(--border);align-items:center">
        <span style="font-size:10px;color:var(--text-dim);margin-right:2px">Slots:</span>`;
      for (const [slotName, info] of slotEntries) {
        const full = info.count >= info.max;
        const dots = '●'.repeat(info.count) + '○'.repeat(Math.max(0, info.max - info.count));
        const col = full ? '#e07060' : (info.count > 0 ? 'var(--text)' : 'var(--text-dim)');
        const bg = full ? '#e0706018' : 'var(--bg3)';
        const border = full ? '#e0706055' : 'var(--border)';
        const emoji = SLOT_EMOJI[slotName] ? `${SLOT_EMOJI[slotName]} ` : '';
        html += `<span style="font-size:11px;background:${bg};border:1px solid ${border};border-radius:10px;padding:2px 8px;color:${col};font-family:monospace;white-space:nowrap" title="${info.count}/${info.max} ${slotName}">${emoji}${slotName} ${dots}</span>`;
      }
      html += `</div>`;
    }

    html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px;padding:10px 12px">`;

    for (const [plotId, plot] of sorted) {
      if (plot.stage === 'harvested') continue;
      const si = STAGE[plot.stage] || STAGE.growing;
      const isRipe = plot.stage === 'ripe';
      const needsAttn = plot.stage === 'thirsty' || plot.stage === 'needs_fertilizer';
      const borderCol = (isRipe || needsAttn) ? si.color : 'var(--border)';
      const glowStyle = isRipe ? `box-shadow:0 0 10px ${si.color}33;` : '';
      const safeChar = charName.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      // Growth bar: use elapsed time from plantedAt if available, else fall back to model scale
      const growthSecs = GARDEN_GROWTH_SECS[plot.cropType] || null;
      const refTime = plot.plantedAt || null;
      let scalePct = null, remainSecs = null;
      if (isRipe) {
        scalePct = 100;
      } else if (growthSecs && refTime) {
        const totalElapsedMs = Date.now() - refTime;
        const activePauseMs = (plot.totalPausedMs || 0) + (plot.pausedAt ? Date.now() - plot.pausedAt : 0);
        const growingMs = Math.max(0, totalElapsedMs - activePauseMs);
        scalePct = Math.min(99, Math.max(1, Math.round(growingMs / (growthSecs * 1000) * 100)));
        remainSecs = Math.max(0, growthSecs - growingMs / 1000);
      } else if (plot.scale != null) {
        scalePct = Math.min(100, Math.round(plot.scale * 100));
      }
      const scaleBarCol = isRipe ? si.color : (scalePct >= 80 ? '#f0c040' : 'var(--gold-dim)');

      const cropIconId = GARDEN_CROP_ICONS[plot.cropType];
      const cropIconUrl = cropIconId ? getIconUrl(cropIconId) : null;
      const cropIconHtml = cropIconUrl
        ? `<img src="${cropIconUrl}" style="width:24px;height:24px;image-rendering:pixelated;flex-shrink:0">`
        : `<span style="font-size:20px;line-height:1;flex-shrink:0">${si.icon}</span>`;

      html += `<div style="background:var(--bg2);border:1px solid ${borderCol};border-radius:6px;padding:10px;${glowStyle}position:relative">
        <div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:6px">
          ${cropIconHtml}
          <div style="min-width:0;flex:1">
            <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${plot.cropType || 'Unknown'}</div>
            <div style="font-size:10px;color:${si.color};font-weight:600;margin-top:1px">${si.label}</div>
          </div>
        </div>
        ${plot.description ? `<div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;line-height:1.35">${plot.description}</div>` : ''}
        ${scalePct != null ? `<div style="margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-bottom:2px">
            <span>Growth</span>
            <span style="color:${scaleBarCol}">${isRipe ? '✓ Ready' : (remainSecs != null ? `~${fmtDur(remainSecs)}` : `${scalePct}%`)}</span>
          </div>
          <div style="background:var(--bg3);border-radius:2px;height:4px;overflow:hidden"><div style="height:100%;width:${scalePct}%;background:${scaleBarCol};transition:width 0.3s"></div></div>
        </div>` : ''}
        <div style="font-size:10px;color:var(--text-dim)">First seen: <span style="color:var(--text)">${fmtAgo(plot.firstSeenAt)}</span></div>
        ${plot.updatedAt && plot.updatedAt !== plot.firstSeenAt ? `<div style="font-size:10px;color:var(--text-dim)">Updated: <span style="color:var(--text)">${fmtAgo(plot.updatedAt)}</span></div>` : ''}
        ${isRipe ? `<button onclick="markPlotHarvested('${safeChar}','${plotId}')" style="margin-top:8px;width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 0;font-size:11px;cursor:pointer" onmouseover="this.style.borderColor='${si.color}'" onmouseout="this.style.borderColor='var(--border)'">✓ Mark Harvested</button>` : ''}
      </div>`;
    }

    html += `</div>`;

    if (harvestedPlots.length > 0) {
      html += `<div style="padding:2px 12px 8px;border-top:1px solid var(--border)">
        <span style="font-size:11px;color:var(--text-dim)">✅ ${harvestedPlots.length} harvested</span>
      </div>`;
    }

    html += `</div>`;
  }

  el.innerHTML = html;
}

// ── Tools tab ────────────────────────────────────────────────
function pruneWitheredPlots() {
  // Auto-remove plots that haven't received a game update in too long.
  // Plants wither in the game after a few minutes without care; if our tracker
  // hasn't seen any ProcessUpdateDescription for a plot within the threshold,
  // assume the entity is gone (harvested / withered) and clean it up.
  //   Unknown crop (cropType null)  →  2 minutes  (likely mis-detected, clear fast)
  //   Known crop, any stage         →  5 minutes  (safety net for missed harvests)
  //   Harvested plots               →  never pruned here (user clears manually)
  const now = Date.now();
  const KNOWN_TTL   = 5 * 60 * 1000; // 5 min
  const UNKNOWN_TTL = 2 * 60 * 1000; // 2 min
  let pruned = false;
  for (const charData of Object.values(gardenData)) {
    for (const [plotId, plot] of Object.entries(charData.plots || {})) {
      if (plot.stage === 'harvested') continue;
      const ttl = plot.cropType ? KNOWN_TTL : UNKNOWN_TTL;
      const ref = plot.updatedAt || plot.firstSeenAt || 0;
      if (now - ref > ttl) {
        delete charData.plots[plotId];
        pruned = true;
      }
    }
  }
  if (pruned) savePlayerLogData();
}

function startGardenRefresh() {
  if (gardenRefreshTimer) return;
  gardenRefreshTimer = setInterval(() => {
    pruneWitheredPlots();
    if (mainTab === 'tools' && toolsSubTab === 'gardening') renderToolsTab();
  }, 20000); // re-render every 20 seconds so growth bars stay current
}
function stopGardenRefresh() {
  if (gardenRefreshTimer) { clearInterval(gardenRefreshTimer); gardenRefreshTimer = null; }
}

function setToolsSubTab(tab) {
  toolsSubTab = tab;
  if (tab === 'survey') surveyConnect();
  if (tab === 'gardening') { pruneWitheredPlots(); startGardenRefresh(); } else stopGardenRefresh();
  renderToolsTab();
}

function renderToolsTab() {
  const el = document.getElementById('appContent');
  if (!el) return;
  el.innerHTML = `
    <div class="char-tabs" style="margin-bottom:0">
      <div class="char-tab ${toolsSubTab==='safecracking'?'active':''}" onclick="setToolsSubTab('safecracking')">Safecracking</div>
      <div class="char-tab ${toolsSubTab==='survey'?'active':''}" onclick="setToolsSubTab('survey')">Survey</div>
      <div class="char-tab ${toolsSubTab==='gardening'?'active':''}" onclick="setToolsSubTab('gardening')">🌱 Gardening</div>
    </div>
    <div id="toolsContent"></div>`;
  const content = document.getElementById('toolsContent');
  if (toolsSubTab === 'safecracking') renderSafecrackingTab(content);
  else if (toolsSubTab === 'gardening') renderGardeningTab(content);
  else renderSurveyTab(content);
}

function setSurveyTabVisible(visible, saveToStorage = true) {
  showSurveyTab = visible;
  if (saveToStorage) localStorage.setItem('showSurveyTab', visible ? '1' : '0');
  if (visible) surveyConnect();
  if (mainTab === 'settings') renderSettingsTab();
}

function surveyConnect() {
  if (surveyWs && surveyWs.readyState <= 1) return; // already open or connecting
  try {
    surveyWs = new WebSocket(SURVEY_WS_URL);
    surveyWs.onopen = () => {
      surveyConnected = true;
      if (mainTab === 'tools' && toolsSubTab === 'survey') renderToolsTab();
    };
    surveyWs.onclose = () => {
      surveyConnected = false;
      surveyWs = null;
      if (mainTab === 'tools' && toolsSubTab === 'survey') renderToolsTab();
      if ((showSurveyTab || (mainTab === 'tools' && toolsSubTab === 'survey')) && !surveyShuttingDown)
        setTimeout(surveyConnect, 3000);
      surveyShuttingDown = false;
    };
    surveyWs.onerror = () => {};
    surveyWs.onmessage = e => { try { surveyHandleMessage(JSON.parse(e.data)); } catch(_) {} };
  } catch(e) {
    if (showSurveyTab) setTimeout(surveyConnect, 3000);
  }
}

function surveyLaunch() {
  const btn = document.getElementById('surveyLaunchBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Starting…'; }

  // Fire the custom URL protocol registered by:  py Survey/setup_protocol.py
  // Works from any browser (file:// or http://), no HTTP server needed.
  const a = document.createElement('a');
  a.href = 'gorgon-survey://launch';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // Silent fallback: also hit start_server.py endpoint if it happens to be running.
  fetch('/api/start-survey', { method: 'POST' }).catch(() => {});

  // Poll for WebSocket connection — main.pyw takes ~1-2 s to bind port 8765.
  showToast('Survey Helper starting…');
  let attempts = 0;
  const poll = setInterval(() => {
    attempts++;
    surveyConnect();
    if (surveyConnected || attempts >= 10) {
      clearInterval(poll);
      if (btn) { btn.disabled = false; btn.textContent = '▶ Start Survey Helper'; }
    }
  }, 1500);
}

function surveySend(obj) {
  if (surveyWs && surveyWs.readyState === WebSocket.OPEN) surveyWs.send(JSON.stringify(obj));
}

function surveySetHotkey(id, vkField, modsField) {
  const sel = document.getElementById('hkSel_' + id);
  const vk = sel ? +sel.value : 0;
  if (!vk) return;
  let mods = 0;
  [1, 2, 4].forEach(bit => {
    const cb = document.getElementById('hkMod_' + id + '_' + bit);
    if (cb && cb.checked) mods |= bit;
  });
  surveySend({type: 'cmd_update_config', [vkField]: vk, [modsField]: mods});
}

function surveyHandleMessage(msg) {
  switch(msg.type) {
    case 'shutdown_ack':
      surveyShuttingDown = true;
      if (surveyWs) surveyWs.close();
      return;
    case 'state_full':
      surveyLocations = msg.locations || [];
      surveyRouteOrder = msg.route_id_order || [];
      surveySlotLabels = msg.slot_labels || {};
      surveySetupActive = msg.surveying && !msg.setup_complete;
      surveySetupComplete = msg.setup_complete;
      surveyActiveArea = msg.active_area || surveyActiveArea;
      surveyStatus = msg.status || '';
      surveyConfig = msg.config || surveyConfig;
      if (msg.player_east != null) surveyConfig.player_east = msg.player_east;
      if (msg.player_south != null) surveyConfig.player_south = msg.player_south;
      surveyCirclePins = [];
      if (mainTab === 'tools' && toolsSubTab === 'survey') renderToolsTab();
      break;
    case 'survey_detected':
      surveyLocations.push(msg.location);
      surveyStatus = msg.status || '';
      if (mainTab === 'tools' && toolsSubTab === 'survey') { surveyRenderList(); surveyDrawCanvas(); surveyUpdateStatus(); }
      break;
    case 'survey_duplicate':
      surveyStatus = msg.status || '';
      if (mainTab === 'tools' && toolsSubTab === 'survey') surveyUpdateStatus();
      break;
    case 'survey_completed':
    case 'survey_unmarked':
      surveyLocations = msg.locations || surveyLocations;
      surveySlotLabels = msg.slot_labels || surveySlotLabels;
      surveyStatus = msg.status || '';
      if (mainTab === 'tools' && toolsSubTab === 'survey') { surveyRenderList(); surveyDrawCanvas(); surveyUpdateStatus(); }
      break;
    case 'survey_all_complete':
      surveyCompletion = { total: msg.total, elapsed: msg.elapsed_seconds, loot: msg.loot || {} };
      if (mainTab === 'tools' && toolsSubTab === 'survey') renderToolsTab();
      break;
    case 'area_changed':
      surveyActiveArea = msg.area;
      surveyStatus = msg.status || '';
      if (mainTab === 'tools' && toolsSubTab === 'survey') surveyUpdateStatus();
      break;
    case 'setup_stopped':
      // Sent by server whenever Stop Setup is pressed, even with 0 locations.
      // route_calculated may follow immediately if there are locations to route.
      surveyLocations = msg.locations || [];
      surveySetupActive = false;
      surveySetupComplete = true;
      if (mainTab === 'tools' && toolsSubTab === 'survey') renderToolsTab();
      break;
    case 'route_calculated':
      surveyLocations = msg.locations || [];
      surveyRouteOrder = msg.route_id_order || [];
      surveySlotLabels = msg.slot_labels || {};
      surveySetupActive = false;
      surveySetupComplete = true;
      surveyStatus = msg.status || '';
      if (mainTab === 'tools' && toolsSubTab === 'survey') renderToolsTab();
      break;
    case 'player_pos':
      if (msg.east != null) surveyPlayerMeters = {east: msg.east, south: msg.south};
      if (mainTab === 'tools' && toolsSubTab === 'survey') surveyDrawCanvas();
      break;
    case 'circle_pin_added':
      surveyCirclePins.push({px: msg.pixel_x, py: msg.pixel_y});
      if (mainTab === 'tools' && toolsSubTab === 'survey') surveyDrawCanvas();
      break;
    case 'sc_state':
      // sc_state from server ignored — local JS solver manages state
      break;
    case 'status':
    case 'error':
    case 'pong':
      if (msg.message) surveyStatus = msg.message;
      if (mainTab === 'tools' && toolsSubTab === 'survey') surveyUpdateStatus();
      break;
  }
}

function surveyUpdateStatus() {
  const el = document.getElementById('surveyStatusMsg');
  if (el) el.textContent = surveyStatus;
}

// ── Safecracking tab render ────────────────────────────────

function scSend(obj) {
  const rerender = () => {
    const tgt = mainTab === 'tools' ? document.getElementById('toolsContent') : null;
    renderSafecrackingTab(tgt);
  };
  switch (obj.type) {
    case 'sc_reset':
      scSolverInit(obj.symbol_count || scSolver?.symbolCount || 12);
      scGuessInputs = ['','','',''];
      rerender(); break;
    case 'sc_record':
      scSolverRecord(obj.guess, obj.exact, obj.misplaced);
      rerender(); break;
    case 'sc_undo':
      scSolverUndo();
      rerender(); break;
    default:
      surveySend(obj); // survey commands still go via WS
  }
}

function scSelectSymbol(slot, idx) {
  scGuessInputs[slot] = idx;
  _scRenderGuessRow();
}

function _scRenderGuessRow() {
  const el = document.getElementById('scGuessRow');
  if (!el) return;
  const solver = scState?.solver;
  const html = [0,1,2,3].map(i => {
    const v = scGuessInputs[i];
    const img = v
      ? `<img src="icons/safecracking/symbol_${v}.png" style="width:44px;height:44px;border-radius:6px">`
      : `<div style="width:44px;height:44px;border-radius:6px;border:2px dashed var(--border);background:var(--bg3)"></div>`;
    return `<div style="cursor:pointer;position:relative" onclick="_scOpenSymbolPicker(${i})" title="Click to change slot ${i+1}">
      ${img}
      <div style="position:absolute;bottom:-14px;left:0;right:0;text-align:center;font-size:10px;color:var(--text-dim)">${v||'?'}</div>
    </div>`;
  }).join('');
  el.innerHTML = html;
}

function _scOpenSymbolPicker(slot) {
  const symbolCount = scState?.solver?.symbols?.length || 12;
  const picker = document.getElementById('scSymbolPicker');
  if (!picker) return;
  picker.innerHTML = `<div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">Select symbol for slot ${slot+1}:</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${Array.from({length:symbolCount},(_,i) => `
        <div onclick="scSelectSymbol(${slot},${i+1});document.getElementById('scSymbolPicker').style.display='none'" title="Symbol ${i+1}"
          style="cursor:pointer;border:2px solid ${scGuessInputs[slot]===i+1?'var(--gold)':'var(--border)'};border-radius:6px;padding:2px;background:var(--bg3)">
          <img src="icons/safecracking/symbol_${i+1}.png" style="width:40px;height:40px;display:block;border-radius:4px">
          <div style="text-align:center;font-size:10px;color:var(--text-dim);margin-top:1px">${i+1}</div>
        </div>`).join('')}
    </div>
    <button class="sync-btn" onclick="document.getElementById('scSymbolPicker').style.display='none'" style="margin-top:8px">Cancel</button>`;
  picker.style.display = '';
}

function scSubmitGuess() {
  const guess = scGuessInputs.map(Number);
  if (guess.some(v => !v)) { showToast('Select all 4 symbols first'); return; }
  const exact    = parseInt(document.getElementById('scExact')?.value    || '0');
  const misplaced = parseInt(document.getElementById('scMisplaced')?.value || '0');
  if (isNaN(exact) || isNaN(misplaced)) { showToast('Enter valid numbers'); return; }
  scSend({ type: 'sc_record', guess, exact, misplaced });
  scGuessInputs = ['','','',''];
}

function scApplySuggestion() {
  const sug = scState?.solver?.suggestion;
  if (!sug) return;
  scGuessInputs = sug.map(String);
  _scRenderGuessRow();
  // scroll to guess entry
  document.getElementById('scGuessSection')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderSafecrackingTab(targetEl) {
  const el = targetEl || document.getElementById('appContent');
  if (!el) return;

  // Init local solver on first use
  if (!scSolver) scSolverInit(12);
  if (!scState) scSolverBuildState();

  const sc = scState;
  const solver = sc?.solver;
  const history = solver?.history || [];
  const suggestion = solver?.suggestion;
  const solved = solver?.solved || false;
  const impossible = solver?.impossible || false;
  const candidates = solver?.candidates ?? '—';
  const guessCount = solver?.guess_count || 0;
  const symbolCount = solver?.symbols?.length || 12;

  // Suggestion banner text
  let bannerHtml = '';
  if (impossible) {
    bannerHtml = `<div style="color:#e07070;font-size:14px;font-weight:600">⚠ No consistent solution — check for input errors. Use Undo to correct.</div>`;
  } else if (solved) {
    const sol = solver.candidates === 1 ? solver.suggestion : null;
    const solHtml = sol ? sol.map(v => `<span style="display:inline-block;border:2px solid var(--gold);border-radius:6px;padding:2px 4px;margin:0 2px"><img src="icons/safecracking/symbol_${v}.png" style="width:36px;height:36px;vertical-align:middle;border-radius:4px"></span>`).join('') : '';
    bannerHtml = `<div style="color:#7ab880;font-size:14px;font-weight:600;margin-bottom:6px">✓ Solution found! Enter this combination:</div>${solHtml}`;
  } else if (suggestion) {
    const sugHtml = suggestion.map(v => `<span style="display:inline-block;border:2px solid var(--gold-dim);border-radius:6px;padding:2px 4px;margin:0 2px;cursor:pointer" onclick="scApplySuggestion()" title="Click to fill guess"><img src="icons/safecracking/symbol_${v}.png" style="width:36px;height:36px;vertical-align:middle;border-radius:4px"></span>`).join('');
    bannerHtml = `<div style="color:var(--gold);font-size:12px;margin-bottom:6px;font-weight:600">SUGGESTED GUESS (${candidates} candidates remain):</div>
      <div style="margin-bottom:8px">${sugHtml}</div>
      <button class="sync-btn" onclick="scApplySuggestion()" style="font-size:12px;padding:4px 14px;background:var(--gold-dim);border-color:var(--gold);color:var(--gold)">↓ Fill into guess</button>`;
  }

  // History rows
  const histHtml = history.length ? history.map((h, i) => {
    const symHtml = h.guess.map(v => `<img src="icons/safecracking/symbol_${v}.png" style="width:30px;height:30px;border-radius:4px;vertical-align:middle" title="Symbol ${v}">`).join(' ');
    const color = (h.exact === 4) ? '#7ab880' : h.exact > 0 ? 'var(--gold)' : 'var(--text-dim)';
    return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">
      <div style="color:var(--text-dim);font-size:11px;min-width:16px">#${i+1}</div>
      <div style="display:flex;gap:4px">${symHtml}</div>
      <div style="font-weight:600;color:${color};font-size:14px;min-width:60px">${h.exact}, ${h.misplaced}</div>
      <div style="font-size:11px;color:var(--text-dim)">${h.exact} right pos · ${h.misplaced} wrong pos</div>
    </div>`;
  }).join('') : `<div style="color:var(--text-dim);font-size:12px;padding:12px 0">No guesses yet</div>`;

  el.innerHTML = `
<div style="max-width:820px;margin:0 auto;padding:16px 20px">

  <!-- Header -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
    <div style="font-family:'Cinzel',serif;font-size:18px;color:var(--gold)">🔐 Safecracking Solver</div>
    <div style="flex:1"></div>
    <select onchange="scSend({type:'sc_reset',symbol_count:parseInt(this.value)});this.blur()"
      style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px" title="Active symbols">
      <option value="6" ${symbolCount===6?'selected':''}>6 symbols (dungeon hints)</option>
      <option value="12" ${symbolCount===12?'selected':''}>12 symbols (no hints)</option>
    </select>
    <button class="sync-btn danger" onclick="scGuessInputs=['','','',''];scSend({type:'sc_reset',symbol_count:${symbolCount}})" title="Start new puzzle">↺ Reset</button>
  </div>

  <!-- Suggestion banner -->
  ${bannerHtml ? `
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px;text-align:center">
    ${bannerHtml}
  </div>` : ''}

  <!-- Guess entry -->
  ${!solved ? `

    <div style="display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap">
      <!-- 4 symbol slots -->
      <div>
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">Symbols (click to select)</div>
        <div id="scGuessRow" style="display:flex;gap:8px;margin-bottom:18px"></div>
      </div>

      <!-- Result inputs -->
      <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;padding-bottom:18px">
        <div>
          <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">Correct position</div>
          <input id="scExact" type="number" min="0" max="4" value="0"
            style="width:60px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-size:16px;text-align:center">

        </div>
        <button class="sync-btn" onclick="scSubmitGuess()" style="background:var(--gold-dim);border-color:var(--gold);color:var(--gold);padding:6px 20px;margin-bottom:1px">
          Submit result →

        ${guessCount > 0 ? `<button class="sync-btn" onclick="scSend({type:'sc_undo'})" style="color:var(--text-dim);margin-bottom:1px" title="Undo last guess">↩ Undo</button>` : ''}
      </div>
    </div>

    <!-- Symbol picker popup -->
    <div id="scSymbolPicker" style="display:none;background:var(--bg3);border:1px solid var(--gold-dim);border-radius:8px;padding:12px;margin-top:8px"></div>
  </div>` : ''}

  <!-- History -->
  ${history.length || guessCount > 0 ? `
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div style="font-size:11px;color:var(--text-dim);font-weight:600">GUESS HISTORY</div>
      <div style="font-size:11px;color:var(--text-dim)">(${guessCount} / 12 guesses used)</div>
    </div>
    ${histHtml}
  </div>` : ''}

</div>`;

  // Render guess row slots after DOM is built
  _scRenderGuessRow();
}

            ].map(({id,vkField,modsField,defVk,defMods,label,hint}) => {
              const curVk   = surveyConfig[vkField]   ?? defVk;
              const curMods = surveyConfig[modsField] ?? defMods;
              const HOTKEY_KEYS = [
                ['F1',0x70],['F2',0x71],['F3',0x72],['F4',0x73],['F5',0x74],['F6',0x75],
                ['F7',0x76],['F8',0x77],['F9',0x78],['F10',0x79],['F11',0x7A],['F12',0x7B],
                ['─────',''],
                ['A',0x41],['B',0x42],['C',0x43],['D',0x44],['E',0x45],['F',0x46],['G',0x47],
                ['H',0x48],['I',0x49],['J',0x4A],['K',0x4B],['L',0x4C],['M',0x4D],['N',0x4E],
                ['O',0x4F],['P',0x50],['Q',0x51],['R',0x52],['S',0x53],['T',0x54],['U',0x55],
                ['V',0x56],['W',0x57],['X',0x58],['Y',0x59],['Z',0x5A],
                ['─────',''],
                ['0',0x30],['1',0x31],['2',0x32],['3',0x33],['4',0x34],
                ['5',0x35],['6',0x36],['7',0x37],['8',0x38],['9',0x39],
                ['─────',''],
                ['Num0',0x60],['Num1',0x61],['Num2',0x62],['Num3',0x63],['Num4',0x64],
                ['Num5',0x65],['Num6',0x66],['Num7',0x67],['Num8',0x68],['Num9',0x69],
                ['─────',''],
                ['Delete',0x2E],['Insert',0x2D],['Home',0x24],['End',0x23],
                ['PgUp',0x21],['PgDn',0x22],['Pause',0x13],
              ];
              const modBits = [{bit:1,name:'Shift'},{bit:2,name:'Ctrl'},{bit:4,name:'Alt'}];
              return `<div>
                <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">${label}</div>
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                  <select id="hkSel_${id}"
                    style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:4px;font-size:12px"
                    onchange="surveySetHotkey('${id}','${vkField}','${modsField}')">
                    ${HOTKEY_KEYS.map(([name,vk])=>vk===''
                      ? `<option disabled>${name}</option>`
                      : `<option value="${vk}" ${curVk===vk?'selected':''}>${name}</option>`
                    ).join('')}
                  </select>
                  ${modBits.map(({bit,name})=>`
                  <label style="display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text-dim);cursor:pointer;user-select:none">
                    <input type="checkbox" id="hkMod_${id}_${bit}"
                      style="cursor:pointer;accent-color:var(--gold)"
                      ${(curMods & bit)?'checked':''}
                      onchange="surveySetHotkey('${id}','${vkField}','${modsField}')">
                    ${name}
                  </label>`).join('')}
                  <span style="font-size:11px;color:var(--text-dim)">${hint}</span>
                </div>
              </div>`;
            }).join('')}
          </div>
          ${['inventory','map'].map(purpose => {
            const isInv = purpose === 'inventory';
            const cfg   = isInv ? (surveyConfig.inventory || {}) : (surveyConfig.map_capture || {});
            const fields = isInv
              ? [{k:'screen_x',  lbl:'X'}, {k:'screen_y',    lbl:'Y'}, {k:'slot_width', lbl:'W'}, {k:'slot_height',lbl:'H'}]
              : [{k:'x',         lbl:'X'}, {k:'y',            lbl:'Y'}, {k:'w',          lbl:'W'}, {k:'h',          lbl:'H'}];
            const label = isInv ? 'Inventory region (first slot)' : 'Map region';
            const btnTxt = isInv ? 'Select first slot on screen' : 'Select map region on screen';
            const gridInputs = isInv ? `
              <div style="display:flex;gap:5px;margin-top:5px">
                ${[['grid_cols','Cols'],['grid_rows','Rows']].map(([k,lbl]) => `
                <label style="display:flex;flex-direction:column;gap:2px;align-items:center">
                  <span style="font-size:9px;color:var(--text-dim);letter-spacing:.05em">${lbl}</span>
                  <input type="number" min="1" max="20" value="${cfg[k] ?? (k==='grid_cols'?6:5)}"
                    style="width:52px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:2px 5px;border-radius:3px;font-size:11px;text-align:right"
                    oninput="surveySend({type:'cmd_update_config',inventory:{${k}:+this.value}})">
                </label>`).join('')}
              </div>` : '';
            return `<div>
              <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">${label}</div>
              <button class="ctx-btn" onclick="surveySend({type:'cmd_capture_screenshot',purpose:'${purpose}'})">⊞ ${btnTxt}</button>
              <div style="display:flex;gap:5px;margin-top:7px">
                ${fields.map(({k, lbl}) => `
                <label style="display:flex;flex-direction:column;gap:2px;align-items:center">
                  <span style="font-size:9px;color:var(--text-dim);letter-spacing:.05em">${lbl}</span>
                  <input type="number" value="${cfg[k] ?? 0}"
                    style="width:60px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:2px 5px;border-radius:3px;font-size:11px;text-align:right"
                    onfocus="surveyRegionFocus('${purpose}')"
                    onblur="surveyRegionBlur()"
                    oninput="surveyRegionInput('${purpose}','${k}',+this.value)">
                </label>`).join('')}
              </div>
              ${gridInputs}
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

  </div>

  <!-- Status bar -->
  <div style="padding:5px 16px;background:var(--bg2);border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);min-height:24px">
    <span id="surveyStatusMsg">${surveyStatus}</span>
  </div>

</div>`;

  surveyRenderList();
  // Size canvas to its container then draw
  requestAnimationFrame(() => {
    const canvas = document.getElementById('surveyCanvas');
    if (canvas) {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      surveyDrawCanvas();
    }
  });
}

// ── Survey list ───────────────────────────────────────────

function surveyRenderList() {
  const el = document.getElementById('surveyList');
  if (!el) return;

  if (!surveyLocations.length) {
    el.innerHTML = `<div style="padding:20px 16px;color:var(--text-dim);font-size:12px;text-align:center">
      ${surveySetupActive ? 'Use survey items in-game to add locations…' : 'No locations yet'}
    </div>`;
    return;
  }

  // Build route-number lookup: location id → route number
  const routeNum = {};
  surveyRouteOrder.forEach((id, i) => { routeNum[id] = i + 1; });

  // Sort: unvisited in route order first, then visited
  const unvisited = surveyLocations.filter(l => !l.visited).sort((a,b) => (routeNum[a.id]||99) - (routeNum[b.id]||99));
  const visited   = surveyLocations.filter(l =>  l.visited);
  const sorted = [...unvisited, ...visited];

  el.innerHTML = sorted.map(loc => {
    const num = routeNum[loc.id] || '–';
    const ew = (loc.east_absolute||0) >= 0 ? 'E' : 'W';
    const ns = (loc.south_absolute||0) >= 0 ? 'S' : 'N';
    const ea = Math.abs(loc.east_absolute||0).toFixed(0);
    const sa = Math.abs(loc.south_absolute||0).toFixed(0);
    const visitBtn = loc.visited
      ? `<button onclick="event.stopPropagation();surveySend({type:'cmd_unmark_visited',location_id:${loc.id}})"
           title="Unmark as visited"
           style="background:none;border:1px solid #4c4;border-radius:3px;color:#4c4;font-size:11px;padding:1px 5px;cursor:pointer;line-height:1.4"
           onmouseenter="this.style.background='rgba(68,204,68,.15)'" onmouseleave="this.style.background='none'">✓</button>`
      : '';
    return `<div onclick="${loc.visited ? '' : `surveySend({type:'cmd_mark_visited',location_id:${loc.id}})`}"
      style="display:flex;align-items:center;gap:8px;padding:7px 12px;${loc.visited?'':'cursor:pointer;'}border-bottom:1px solid var(--border);opacity:${loc.visited?'.55':'1'}"
      ${loc.visited ? '' : `onmouseenter="this.style.background='var(--bg2)'" onmouseleave="this.style.background=''"`}>
      <span style="font-family:'Cinzel',serif;font-size:11px;color:${loc.visited?'var(--text-dim)':'var(--gold)'};min-width:22px;text-align:right">#${num}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${loc.visited?'var(--text-dim)':'var(--text)'}">${loc.item_name}</div>
        <div style="font-size:11px;color:var(--text-dim)">${ea}${ew}, ${sa}${ns}</div>
      </div>
      ${visitBtn}
    </div>`;
  }).join('');
}

// ── Survey canvas ─────────────────────────────────────────

function surveyDrawCanvas() {
  const canvas = document.getElementById('surveyCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  if (!W || !H) return;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1a1f';
  ctx.fillRect(0, 0, W, H);

  const locs = surveyLocations.filter(l => l.east_absolute != null);

  if (surveySetupActive && surveyCirclePins.length > 0) {
    // Setup mode: show crosshairs for detected red circles (pixel coords — just draw in centre area)
    const pad = 40;
    surveyCirclePins.forEach((pin, i) => {
      const x = pad + (i % 5) * ((W - pad*2) / 5);
      const y = pad + Math.floor(i / 5) * 40;
      ctx.strokeStyle = '#ffe600cc';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-12,y); ctx.lineTo(x+12,y); ctx.moveTo(x,y-12); ctx.lineTo(x,y+12); ctx.stroke();
    });
    if (!locs.length) {
      ctx.fillStyle = '#ffffff44';
      ctx.font = '12px Crimson Pro, serif';
      ctx.textAlign = 'center';
      ctx.fillText(`${surveyCirclePins.length} pin${surveyCirclePins.length!==1?'s':''} detected`, W/2, H-20);
    }
  }

  if (!locs.length) {
    ctx.fillStyle = '#ffffff33';
    ctx.font = '13px Crimson Pro, serif';
    ctx.textAlign = 'center';
    ctx.fillText(surveySetupActive ? 'Use survey items — locations will appear here' : 'No locations', W/2, H/2);
    return;
  }

  // Compute bounding box
  let minE = Infinity, maxE = -Infinity, minS = Infinity, maxS = -Infinity;
  locs.forEach(l => {
    minE = Math.min(minE, l.east_absolute); maxE = Math.max(maxE, l.east_absolute);
    minS = Math.min(minS, l.south_absolute); maxS = Math.max(maxS, l.south_absolute);
  });
  if (surveyPlayerMeters) {
    minE = Math.min(minE, surveyPlayerMeters.east); maxE = Math.max(maxE, surveyPlayerMeters.east);
    minS = Math.min(minS, surveyPlayerMeters.south); maxS = Math.max(maxS, surveyPlayerMeters.south);
  }

  const pad = 45;
  const rangeE = maxE - minE || 100;
  const rangeS = maxS - minS || 100;
  const scale = Math.min((W - pad*2) / rangeE, (H - pad*2) / rangeS);

  function toCanvas(e, s) {
    return [pad + (e - minE) * scale, pad + (s - minS) * scale];
  }

  // Build route-number lookup
  const routeNum = {};
  surveyRouteOrder.forEach((id, i) => { routeNum[id] = i + 1; });

  // Unvisited in route order
  const unvisited = surveyLocations
    .filter(l => !l.visited && l.east_absolute != null)
    .sort((a,b) => (routeNum[a.id]||99) - (routeNum[b.id]||99));

  // Draw route lines
  if (unvisited.length > 1 || (unvisited.length === 1 && surveyPlayerMeters)) {
    ctx.strokeStyle = '#46a0ff88';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    if (surveyPlayerMeters) {
      const [px, py] = toCanvas(surveyPlayerMeters.east, surveyPlayerMeters.south);
      if (unvisited.length) {
        const [fx, fy] = toCanvas(unvisited[0].east_absolute, unvisited[0].south_absolute);
        ctx.moveTo(px, py); ctx.lineTo(fx, fy);
      }
    }
    for (let i = 0; i < unvisited.length - 1; i++) {
      const [ax, ay] = toCanvas(unvisited[i].east_absolute, unvisited[i].south_absolute);
      const [bx, by] = toCanvas(unvisited[i+1].east_absolute, unvisited[i+1].south_absolute);
      ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw location markers
  locs.forEach(loc => {
    const [x, y] = toCanvas(loc.east_absolute, loc.south_absolute);
    const num = routeNum[loc.id] || '?';
    const r = loc.visited ? 9 : 11;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = loc.visited ? '#3c7a3c' : '#cc8800';
    ctx.fill();
    ctx.strokeStyle = loc.visited ? '#4c4' : '#ffd700';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = loc.visited ? '#aaffaa' : '#000';
    ctx.font = `bold ${loc.visited?9:10}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(num), x, y);
  });

  // Draw player dot
  if (surveyPlayerMeters) {
    const [px, py] = toCanvas(surveyPlayerMeters.east, surveyPlayerMeters.south);
    ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI*2);
    ctx.fillStyle = '#00c8ffcc';
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// ── Region selector overlay ───────────────────────────────


// ------------------------------------------------------------------
// Survey region highlight helpers
// ------------------------------------------------------------------
let _surveyHighlightBlurTimer = null;

function surveyRegionFocus(purpose) {
  clearTimeout(_surveyHighlightBlurTimer);
  const inv = surveyConfig.inventory || {};
  const mc  = surveyConfig.map_capture || {};
  const r   = purpose === 'inventory'
    ? { x: inv.screen_x|0, y: inv.screen_y|0, w: inv.slot_width|0, h: inv.slot_height|0 }
    : { x: mc.x|0,         y: mc.y|0,         w: mc.w|0,           h: mc.h|0 };
  surveySend({ type: 'cmd_highlight_region', ...r });
}

function surveyRegionBlur() {
  // Short delay so switching between sibling inputs doesn't flicker
  _surveyHighlightBlurTimer = setTimeout(() => {
    surveySend({ type: 'cmd_hide_highlight' });
  }, 300);
}

function surveyRegionInput(purpose, field, value) {
  clearTimeout(_surveyHighlightBlurTimer);
  // Update local cache
  if (purpose === 'inventory') {
    if (!surveyConfig.inventory) surveyConfig.inventory = {};
    surveyConfig.inventory[field] = value;
    const inv = surveyConfig.inventory;
    surveySend({ type: 'cmd_highlight_region', x: inv.screen_x|0, y: inv.screen_y|0, w: inv.slot_width|0, h: inv.slot_height|0 });
    surveySend({ type: 'cmd_update_config', inventory: { [field]: value } });
  } else {
    if (!surveyConfig.map_capture) surveyConfig.map_capture = {};
    surveyConfig.map_capture[field] = value;
    const mc = surveyConfig.map_capture;
    surveySend({ type: 'cmd_highlight_region', x: mc.x|0, y: mc.y|0, w: mc.w|0, h: mc.h|0 });
    surveySend({ type: 'cmd_update_config', map_capture: { [field]: value } });
  }
}
