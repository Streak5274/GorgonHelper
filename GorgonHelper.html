function renderStorageTab() {
  const char = characters.find(c => c.id === activeCharId);
  if (!char) {
    document.getElementById('appContent').innerHTML = `<div class="full-panel"><div class="empty-state">
      <div class="icon">⚔</div>
      <h3>No character loaded</h3>
      <p style="font-size:13px;margin-top:10px;color:var(--text-dim);max-width:340px;line-height:1.6">
        Click <strong style="color:var(--text)">📂 Watch Folder</strong> in the header to select the folder where your Project: Gorgon export files are saved.<br><br>
        The app looks for pairs of files like<br>
        <code style="font-size:11px;color:var(--gold)">Character_Name_Server.json</code> and<br>
        <code style="font-size:11px;color:var(--gold)">Name_Server_items_timestamp.json</code>
      </p>
      <button onclick="pickFolder()" style="margin-top:18px;padding:8px 20px;background:var(--bg3);border:1px solid var(--border-light);border-radius:4px;color:var(--text);font-size:13px;cursor:pointer">📂 Select Folder</button>
    </div></div>`;
    return;
  }
  document.getElementById('appContent').innerHTML = `<div class="layout"><div class="left-panel" id="leftPanel"></div><div class="right-panel" id="rightPanel"></div></div>`;
  renderLeft(char);
  rerenderRight();
}

function renderLeft(char) {
  const cd = char.charData, stats = cd.CurrentStats||{}, currencies = cd.Currencies||{};
  const hp=stats.MAX_HEALTH||0, armor=stats.MAX_ARMOR||0, power=stats.MAX_POWER||0, mx=Math.max(hp,armor,power,1);
  const curKeys = Object.entries(currencies).filter(([k,v])=>v>0 && k !== 'REDWINGTOKENS');

  // ── Pinned skills ──
  const pinned = getPinnedSkills(char.id);
  const allSkills = cd.Skills || {};
  let pinnedHtml = '';
  if (pinned.size > 0) {
    const pinnedRows = [...pinned].map(skillName => {
      const s = allSkills[skillName];
      if (!s) return '';
      const totalLevel = s.Level + (s.BonusLevels||0);
      const pct = s.XpNeededForNextLevel > 0
        ? Math.min(100, (s.XpTowardNextLevel / s.XpNeededForNextLevel) * 100) : 100;
      const xpText = s.XpNeededForNextLevel > 0
        ? `${s.XpTowardNextLevel.toLocaleString()} / ${s.XpNeededForNextLevel.toLocaleString()} XP`
        : 'Max level';
      const bonusHtml = s.BonusLevels > 0 ? `<span class="pinned-skill-bonus">+${s.BonusLevels}</span>` : '';
      return `<div class="pinned-skill-row">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:baseline;justify-content:space-between">
            <span class="pinned-skill-name">${skillName.replace(/([A-Z])/g,' $1').trim()}</span>
            <span class="pinned-skill-level">${s.Level}${bonusHtml}</span>
          </div>
          <div class="pinned-xp-wrap"><div class="pinned-xp" style="width:${pct}%"></div></div>
          <div class="pinned-xp-text">${xpText}</div>
        </div>
      </div>`;
    }).filter(Boolean).join('');
    pinnedHtml = `<div class="panel-section">
      <div class="panel-label" style="display:flex;align-items:center;justify-content:space-between">
        <span>Pinned Skills</span>
        <button class="edit-pins-btn" onclick="openSkillPicker('${char.id}')">✎ Edit</button>
      </div>
      <div>${pinnedRows}</div>
    </div>`;
  }

  // ── Top skills (always shown below pinned) ──
  const skillsHtml = char.topSkills.map(([name,s]) => {
    const pct = s.XpNeededForNextLevel>0 ? Math.min(100,(s.XpTowardNextLevel/s.XpNeededForNextLevel)*100) : 100;
    return `<div class="skill-row"><span class="skill-name">${name.replace(/([A-Z])/g,' $1').trim()}</span><div class="skill-xp-wrap"><div class="skill-xp" style="width:${pct}%"></div></div><span class="skill-level">${s.Level}</span></div>`;
  }).join('');

  document.getElementById('leftPanel').innerHTML = `
    <div class="panel-section"><div class="char-card"><div class="char-avatar">${cd.Character[0]}</div><div class="char-info"><h2>${cd.Character}</h2><div class="meta">${cd.Race} · ${cd.ServerName}</div><div class="meta" style="font-size:10px;margin-top:1px">${cd.Timestamp?.slice(0,10)||''}</div></div></div></div>
    <div class="panel-section"><div class="panel-label">Vitals</div><div class="vitals">
      <div class="vital-row"><span class="vital-label" style="color:var(--red)">Health</span><div class="vital-bar-wrap"><div class="vital-bar health" style="width:${hp/mx*100}%"></div></div><span class="vital-val">${hp}</span></div>
      <div class="vital-row"><span class="vital-label" style="color:var(--blue)">Armor</span><div class="vital-bar-wrap"><div class="vital-bar armor" style="width:${armor/mx*100}%"></div></div><span class="vital-val">${armor}</span></div>
      <div class="vital-row"><span class="vital-label" style="color:var(--purple)">Power</span><div class="vital-bar-wrap"><div class="vital-bar power" style="width:${power/mx*100}%"></div></div><span class="vital-val">${power}</span></div>
    </div></div>
    ${curKeys.length?`<div class="panel-section"><div class="panel-label">Currencies</div><div class="currencies">${curKeys.map(([k,v])=>`<div class="currency-chip"><span class="cur-name">${k.replace(/_/g,' ').toLowerCase().replace(/\b\w/g,c=>c.toUpperCase())}</span><span class="cur-val">${v.toLocaleString()}</span></div>`).join('')}</div></div>`:''}
    ${pinnedHtml}
    <div class="panel-section"><div class="panel-label">Top Skills</div><div class="skill-list">${skillsHtml}</div>
      <button class="edit-pins-btn" style="margin-top:10px" onclick="openSkillPicker('${char.id}')">⭐ Pin Skills</button>
    </div>`;
}

// ── Search mode + right panel ──
function rerenderRight() {
  if (mainTab !== 'storage') return;
  if (searchMode === 'all') renderRightAll();
  else { const char = characters.find(c=>c.id===activeCharId); if (char) renderRight(char); }
}

function highlight(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
    '<mark style="background:rgba(201,168,76,.25);color:var(--gold-light);border-radius:2px;padding:0 1px">$1</mark>');
}

function renderModeToggle() {
  return `<div class="mode-toggle">
    <button class="mode-btn ${searchMode==='single'?'active':''}" onclick="setSearchMode('single')">This Character</button>
    <button class="mode-btn ${searchMode==='all'?'active':''}" onclick="setSearchMode('all')">All Characters</button>
  </div>`;
}
function setSearchMode(m) { searchMode=m; activeVaultFilter=null; activeTownFilter=''; rerenderRight(); }
function clearSearch() { searchQuery=''; rerenderRight(); }
function onSearch(v) { searchQuery=v; rerenderRight(); }
function toggleVaultFilter(v) { activeVaultFilter = activeVaultFilter===v?null:v; rerenderRight(); }
function toggleConsolidate() { showConsolidateOnly=!showConsolidateOnly; rerenderRight(); }
function toggleTownFilter(town) {
  activeTownFilter = (activeTownFilter === town) ? '' : town;
  // Drop vault filter if it's not in the newly selected town
  if (activeTownFilter && activeVaultFilter && getVaultTown(activeVaultFilter) !== activeTownFilter) {
    activeVaultFilter = null;
  }
  rerenderRight();
}
function getVaultTown(vaultKey) {
  const vd = VAULTS[vaultKey];
  return vd ? getVaultArea(vaultKey, vd) : null;
}

function renderTownFilters(allVaults) {
  const townSet = new Set();
  for (const v of allVaults) {
    const t = getVaultTown(v);
    if (t && t !== 'Unknown') townSet.add(t);
  }
  const towns = [...townSet].sort();
  if (towns.length <= 1) return '';
  const chips = towns.map(town => {
    const active = activeTownFilter === town;
    return `<span class="filter-chip ${active?'active':''}" onclick="toggleTownFilter('${town.replace(/'/g,"\\'")}')">
      ${town}</span>`;
  }).join('');
  return `<div class="filter-row" style="margin-bottom:4px">
    <span class="filter-chip ${!activeTownFilter?'active':''}" onclick="toggleTownFilter('')">All Locations</span>
    <span class="filter-divider"></span>
    ${chips}
  </div>`;
}

function renderVaultFilters(allVaults) {
  // Scope vault chips to the selected town
  const visibleVaults = activeTownFilter
    ? allVaults.filter(v => getVaultTown(v) === activeTownFilter)
    : allVaults;
  const chips = visibleVaults.map(v => {
    const c=vc(v), isA=activeVaultFilter===v;
    return `<span class="filter-chip ${isA?'active':''}" style="${isA?`border-color:${c.border};color:${c.text};background:${c.bg}`:''}" onclick="toggleVaultFilter('${v.replace(/'/g,"\\\'")}')">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${c.dot};margin-right:3px;vertical-align:middle"></span>${fvn(v)}</span>`;
  }).join('');

  let cCount = 0;
  if (searchMode === 'all') {
    // Merged items have byChar, not vaults — count per-char vaults
    const merged = buildMergedAllItems();
    for (const item of merged) {
      for (const cd of Object.values(item.byChar)) {
        if (getConsolidationInfo(item.name, cd.vaults, item.typeId)) { cCount++; break; }
      }
    }
  } else {
    const charItems = characters.find(c=>c.id===activeCharId)?.items || [];
    cCount = charItems.filter(i => getConsolidationInfo(i.name, i.vaults, i.typeId)).length;
  }

  return `<div class="filter-row">${chips}${visibleVaults.length?'<span class="filter-divider"></span>':''}
    <span class="filter-chip consolidate-chip ${showConsolidateOnly?'active':''}" onclick="toggleConsolidate()">⚡ Consolidate${cCount?` <strong>${cCount}</strong>`:''}</span>
  </div>`;
}

function renderItemRow(name, vaults, total, typeId, value, query, charLabel, consInfo) {
  const nameHtml = highlight(name, query);
  const warn = consInfo ? `<span class="consolidate-warn">⚡ consolidate</span>` : '';
  const charHtml = charLabel ? `<td><span class="char-tag">${charLabel}</span></td>` : '';
  const chips = Object.entries(vaults).map(([v,amt])=>{const c=vc(v);return`<span class="vault-chip" style="background:${c.bg};border-color:${c.border};color:${c.text}">${fvn(v)} <strong>${amt}</strong></span>`;}).join('');
  const safeN = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const safeTid = typeId || '';
  const safeVal = value || 0;
  const iconId = typeId ? ITEMS_ICONS[String(typeId)] : null;
  const iconUrl = iconId ? getIconUrl(iconId) : null;
  const iconHtml = iconUrl ? `<img class="item-icon" src="${iconUrl}" alt="">` : '';
  return `<tr class="item-row${consInfo?' needs-consolidation':''}"
    oncontextmenu="openStackPopup('${safeN}',${safeTid},event)"
    onmouseenter="showItemTooltip('${safeN}',${safeTid||0},${safeVal},event)"
    onmouseleave="hideTooltip()">
    <td><div style="display:flex;align-items:center">${iconHtml}<div><span class="item-name">${nameHtml}</span>${warn}</div></div></td>
    ${charHtml}
    <td><div class="vault-chips">${chips}</div></td>
    <td><span class="total-badge ${total<2?'small':''}">${total}</span></td>
  </tr>`;
}

function calcVaultSlotInfo(vaultKey, charItems, charNPCs) {
  // usedSlots: count all items in this vault (ignoring search), ceil(qty/maxStack) each
  const vaultItems = charItems.filter(i => i.vaults[vaultKey] !== undefined);
  const usedSlots = vaultItems.reduce((sum, i) => {
    const qty = i.vaults[vaultKey] || 0;
    const ms = getMaxStack(i.name, i.typeId) || 1;
    return sum + Math.ceil(qty / ms);
  }, 0);
  // availSlots: from VAULTS data (favor-gated for NPC vaults)
  const vd = VAULTS[vaultKey];
  const availSlots = vd ? getCurrentSlots(vaultKey, charNPCs, vd) : null;
  return { usedSlots, availSlots };
}

function renderRight(char) {
  const q = searchQuery.toLowerCase().trim();
  const allVaults = [...new Set(char.items.flatMap(i=>Object.keys(i.vaults)))]
    .sort((a,b)=>a==='Inventory'?-1:b==='Inventory'?1:a.localeCompare(b));
  // Build set of vaults in the active town for filtering
  const townVaultSet = activeTownFilter
    ? new Set(allVaults.filter(v => getVaultTown(v) === activeTownFilter))
    : null;
  let items = char.items;
  if (q) items = items.filter(i=>i.name.toLowerCase().includes(q));
  if (townVaultSet) items = items.filter(i=>Object.keys(i.vaults).some(v=>townVaultSet.has(v)));
  if (activeVaultFilter) items = items.filter(i=>i.vaults[activeVaultFilter]!==undefined);
  if (showConsolidateOnly) items = items.filter(i=>getConsolidationInfo(i.name,i.vaults,i.typeId));
  const rows = items.map(i=>renderItemRow(i.name,i.vaults,i.total,i.typeId,i.value,q,null,getConsolidationInfo(i.name,i.vaults,i.typeId))).join('');
  const totalValue = items.reduce((s,i)=>s+(i.value||0)*i.total, 0);
  const totalValueHtml = totalValue > 0
    ? `<div style="margin-bottom:8px;font-size:12px;color:var(--text-dim)">Total value: <span style="color:var(--gold-light);font-family:'Cinzel',serif">🪙 ${totalValue.toLocaleString()}</span></div>`
    : '';

  // Slot usage — only when a specific vault is selected and it's not Inventory
  let slotInfoHtml = '';
  if (activeVaultFilter && activeVaultFilter !== 'Inventory' && dataLoaded.vaults) {
    const { usedSlots, availSlots } = calcVaultSlotInfo(activeVaultFilter, char.items, char.charData.NPCs || {});
    const full = availSlots != null && usedSlots >= availSlots;
    const slotColor = full ? '#e07070' : usedSlots >= (availSlots ?? Infinity) * 0.9 ? 'var(--orange)' : 'var(--gold-light)';
    const slotStr = availSlots != null ? `${usedSlots} / ${availSlots}` : `${usedSlots} used`;
    const pct = availSlots > 0 ? Math.min(100, usedSlots / availSlots * 100) : 0;
    slotInfoHtml = `<div style="margin-bottom:10px">
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:4px">Slots: <span style="color:${slotColor};font-family:'Cinzel',serif">${slotStr}</span>${full ? ' <span style="color:#e07070;font-size:11px">FULL</span>' : ''}</div>
      ${availSlots != null ? `<div style="background:var(--bg3);border-radius:3px;height:5px;overflow:hidden;max-width:200px"><div style="height:100%;width:${pct.toFixed(1)}%;background:${slotColor};border-radius:3px;transition:width .3s"></div></div>` : ''}
    </div>`;
  }

  document.getElementById('rightPanel').innerHTML = `
    <div class="search-wrap">
      ${renderModeToggle()}
      <div class="search-input-wrap">
        <button class="search-clear ${searchQuery?'visible':''}" onclick="clearSearch()">✕</button>
        <input class="search-input" id="searchInput" type="text" placeholder="Search items…" value="${searchQuery.replace(/"/g,'&quot;')}" oninput="onSearch(this.value)">
        <span class="search-icon">⌕</span>
      </div>
    </div>
    <div class="search-meta"><div class="search-count">Showing <span>${items.length}</span> of <span>${char.items.length}</span> items${activeTownFilter?` · <span style="color:var(--gold-light)">${activeTownFilter}</span>`:''}${activeVaultFilter?` · <span style="color:${vc(activeVaultFilter).text}">${fvn(activeVaultFilter)}</span>`:''}</div></div>
    ${renderTownFilters(allVaults)}
    ${renderVaultFilters(allVaults)}
    ${totalValueHtml}${slotInfoHtml}
    ${items.length===0?`<div class="empty-state"><div class="icon">⚗</div><h3>No items found</h3></div>`
    :`<table class="inv-table"><thead><tr><th>Item</th><th>Location</th><th class="r">Total</th></tr></thead><tbody>${rows}</tbody></table>`}`;
  restoreFocus(q);
}

function buildMergedAllItems() {
  const map = {};
  for (const char of characters) {
    for (const item of char.items) {
      if (!map[item.name]) map[item.name] = { name:item.name, total:0, typeId:item.typeId, value:item.value||0, byChar:{} };
      if (!map[item.name].byChar[char.id]) map[item.name].byChar[char.id] = { charName:char.charData.Character, total:0, vaults:{} };
      map[item.name].total += item.total;
      map[item.name].byChar[char.id].total += item.total;
      for (const [v,amt] of Object.entries(item.vaults)) map[item.name].byChar[char.id].vaults[v] = (map[item.name].byChar[char.id].vaults[v]||0)+amt;
    }
  }
  return Object.values(map).sort((a,b)=>a.name.localeCompare(b.name));
}

function renderRightAll() {
  const q = searchQuery.toLowerCase().trim();
  const merged = buildMergedAllItems();
  // All vaults that appear across all characters (for town filter)
  const allVaultsAll = [...new Set(characters.flatMap(c => c.items.flatMap(i => Object.keys(i.vaults))))]
    .sort((a,b)=>a==='Inventory'?-1:b==='Inventory'?1:a.localeCompare(b));
  const townVaultSet = activeTownFilter
    ? new Set(allVaultsAll.filter(v => getVaultTown(v) === activeTownFilter))
    : null;
  let items = merged;
  if (q) items = items.filter(i=>i.name.toLowerCase().includes(q));
  if (townVaultSet) items = items.filter(i=>Object.values(i.byChar).some(cd=>Object.keys(cd.vaults).some(v=>townVaultSet.has(v))));
  if (showConsolidateOnly) items = items.filter(i=>Object.values(i.byChar).some(cd=>getConsolidationInfo(i.name,cd.vaults,i.typeId)));
  const rows = items.flatMap(item => {
    // In town-filter mode, only show the char rows that have items in that town
    const charEntries = townVaultSet
      ? Object.values(item.byChar).filter(cd => Object.keys(cd.vaults).some(v => townVaultSet.has(v)))
      : Object.values(item.byChar);
    return charEntries.map(cd => renderItemRow(item.name, cd.vaults, cd.total, item.typeId, item.value, q, cd.charName, getConsolidationInfo(item.name, cd.vaults, item.typeId)));
  }).join('');
  const totalValue = items.reduce((s,i)=>s+(i.value||0)*i.total, 0);
  const totalValueHtml = totalValue > 0
    ? `<div style="margin-bottom:10px;font-size:12px;color:var(--text-dim)">Total value: <span style="color:var(--gold-light);font-family:'Cinzel',serif">🪙 ${totalValue.toLocaleString()}</span></div>`
    : '';
  document.getElementById('rightPanel').innerHTML = `
    <div class="search-wrap">
      ${renderModeToggle()}
      <div class="search-input-wrap">
        <button class="search-clear ${searchQuery?'visible':''}" onclick="clearSearch()">✕</button>
        <input class="search-input" id="searchInput" type="text" placeholder="Search all characters…" value="${searchQuery.replace(/"/g,'&quot;')}" oninput="onSearch(this.value)">
        <span class="search-icon">⌕</span>
      </div>
    </div>
    <div class="search-meta"><div class="search-count">Showing <span>${items.length}</span> of <span>${merged.length}</span> unique items across <span>${characters.length}</span> characters${activeTownFilter?` · <span style="color:var(--gold-light)">${activeTownFilter}</span>`:''}</div></div>
    ${renderTownFilters(allVaultsAll)}
    ${renderVaultFilters([])}
    ${totalValueHtml}
    ${items.length===0?`<div class="empty-state"><div class="icon">⚗</div><h3>No items found</h3></div>`
    :`<table class="inv-table"><thead><tr><th>Item</th><th>Character</th><th>Location</th><th class="r">Total</th></tr></thead><tbody>${rows}</tbody></table>`}`;
  restoreFocus(q);
}

function restoreFocus(q) { const i=document.getElementById('searchInput');i?.focus();i?.setSelectionRange(i.value.length,i.value.length); }
function toggleNavMenu() { document.getElementById('main-nav')?.classList.toggle('nav-open'); }
function updateHeaderChar() {

// ITEM TOOLTIP
// ═══════════════════════════════════════════════════════════
let tooltipTimer = null;
function showItemTooltip(itemName, typeId, itemValue, e) {
  hideTooltip();
  tooltipTimer = setTimeout(() => {
    const recipes = getRecipesForItem(typeId);
    const maxStack = getMaxStack(itemName, typeId);
    // Find total qty across all visible items for value sum
    const char = characters.find(c=>c.id===activeCharId);
    const charItems = char ? char.items : [];
    const itemEntry = charItems.find(i => i.name === itemName);
    const totalQty = itemEntry ? itemEntry.total : 0;
    const valuePerItem = itemValue || 0;
    const totalValue = valuePerItem * totalQty;

    if (!recipes.length && !maxStack && !valuePerItem && !dataLoaded.sources_items) return;

    const recipesHtml = recipes.slice(0,5).map(rInternal => {
      const r = RECIPES[rInternal];
      if (!r) return '';
      const [rName, rSkill, ings] = r;
      const ingLines = ings.slice(0,6).map(([ingId, qty]) => {
        const idata = ITEMS[String(ingId)];
        const iName = idata ? idata[0] : `#${ingId}`;
        const have = getInventoryQty(ingId, charItems);
        const cls = have >= qty ? 'have' : 'lack';
        return `<span class="tooltip-ing ${cls}">${iName} <strong>${have}/${qty}</strong></span>`;
      }).join(' · ');
      return `<div class="tooltip-recipe"><div class="tooltip-recipe-name">${rName}</div><div class="tooltip-recipe-skill">${rSkill}</div><div class="tooltip-ing">${ingLines}</div></div>`;
    }).join('');

    const sourcesHtml = renderItemSources(typeId, 6, 'tip');
    const stackPart = maxStack ? `Max stack: <strong>${maxStack}</strong>` : '';
    const valuePart = valuePerItem ? `🪙 <strong>${valuePerItem.toLocaleString()}</strong> ea · <strong>${totalValue.toLocaleString()}</strong> total` : '';
    const footerLine = [stackPart, valuePart].filter(Boolean).join('&ensp;·&ensp;');
    const stackHtml = footerLine ? `<div class="tooltip-stack">${footerLine}</div>` : '';

    if (!recipesHtml && !stackHtml && !sourcesHtml) return;

    const tip = document.createElement('div');
    tip.className = 'item-tooltip';
    tip.id = 'itemTooltip';
    tip.innerHTML = `<div class="tooltip-title">${itemName}</div>${recipesHtml}${sourcesHtml}${stackHtml}`;
    document.body.appendChild(tip);
    positionTooltip(tip, e);
  }, 350);
}

function getRecipesForItem(typeId) {
  if (!typeId || !dataLoaded.itemuses) return [];
  return ITEMUSES[String(typeId)] || [];
}

// Render item source badges for a given typeId
// Returns HTML string; empty string if no sources loaded or none found
const ITEM_SOURCE_ICONS = {
  Vendor:         { icon:'🛒', label:'Vendor',     cls:'vendor'  },
  Barter:         { icon:'🔄', label:'Barter',     cls:'barter'  },
  HangOut:        { icon:'🤝', label:'Hang Out',   cls:'hangout' },
  NpcGift:        { icon:'🎁', label:'Gift',       cls:'gift'    },
  Monster:        { icon:'⚔', label:'Monster',    cls:'monster' },
  Angling:        { icon:'🎣', label:'Fishing',    cls:'skill'   },
  CorpseButchering:{ icon:'🔪', label:'Butchering', cls:'skill'  },
  CorpseSkinning: { icon:'🐾', label:'Skinning',   cls:'skill'   },
  TreasureMap:    { icon:'🗺', label:'Treasure',   cls:'quest'   },
};

// Expanded sources state — cleared on tab change
const expandedSources = new Set(); // key strings like "typeId" or "ctx:typeId"

function clearExpandedSources() { expandedSources.clear(); }

function toggleSourceExpand(key, typeId, maxEntries, e) {
  e.stopPropagation();
  if (expandedSources.has(key)) expandedSources.delete(key);
  else expandedSources.add(key);
  // Re-render just this sources div in place
  const el = document.getElementById('src_' + key);
  if (el) el.outerHTML = buildItemSourcesHtml(typeId, maxEntries, key);
}

function buildItemSourcesHtml(typeId, maxEntries, key, filteredSources) {
  const sources = filteredSources || SOURCES_ITEMS[String(typeId)];
  if (!sources || sources.length === 0) return '';
  const expanded = expandedSources.has(key);
  const shown = expanded ? sources : sources.slice(0, maxEntries);
  const badges = shown.map(s => {
    const def = ITEM_SOURCE_ICONS[s.t] || { icon:'•', label: s.t, cls:'effect' };
    const detail = s.n ? ` ${s.n}${s.a ? ` <span style="opacity:.65">(${s.a})</span>` : ''}` : '';
    return `<span class="recipe-source ${def.cls}">${def.icon}${detail}</span>`;
  }).join('');
  const overflow = sources.length - maxEntries;
  let toggleBtn = '';
  if (sources.length > maxEntries) {
    if (expanded) {
      toggleBtn = `<button class="src-expand-btn" onclick="toggleSourceExpand('${key}',${typeId},${maxEntries},event)">▲ less</button>`;
    } else {
      toggleBtn = `<button class="src-expand-btn" onclick="toggleSourceExpand('${key}',${typeId},${maxEntries},event)">+${overflow} more</button>`;
    }
  }
  return `<div id="src_${key}" style="margin-top:4px;display:flex;flex-wrap:wrap;gap:2px;align-items:center">${badges}${toggleBtn}</div>`;
}

function renderItemSources(typeId, maxEntries = 6, ctxKey = '', excludeTypes = []) {
  if (!dataLoaded.sources_items || !typeId) return '';
  let sources = SOURCES_ITEMS[String(typeId)];
  if (!sources || sources.length === 0) return '';
  if (excludeTypes.length) sources = sources.filter(s => !excludeTypes.includes(s.t));
  if (sources.length === 0) return '';
  const key = ctxKey ? `${ctxKey}_${typeId}` : String(typeId);
  return buildItemSourcesHtml(typeId, maxEntries, key, sources);
}

function positionTooltip(tip, e) {
  const W=window.innerWidth, H=window.innerHeight;
  const tw=tip.offsetWidth||300, th=tip.offsetHeight||200;
  let x = e.clientX+14, y = e.clientY+14;
  if (x+tw > W-10) x = e.clientX - tw - 14;
  if (y+th > H-10) y = e.clientY - th - 14;
  tip.style.left = x+'px'; tip.style.top = y+'px';
}

function hideTooltip() {
  clearTimeout(tooltipTimer);
  document.getElementById('itemTooltip')?.remove();
}

// ═══════════════════════════════════════════════════════════
// WORK ORDERS TAB
// ═══════════════════════════════════════════════════════════
function renderWorkOrdersTab() {
  const showAll = activeCharId === '__all__';
  const chars = showAll ? characters : characters.filter(c=>c.id===activeCharId);
  if (chars.length === 0) { document.getElementById('appContent').innerHTML='<div class="full-panel"><div class="empty-state"><div class="icon">📋</div><h3>No character loaded</h3></div></div>'; return; }

  let html = '<div class="full-panel">';

  // ── Active Work Orders ──
  const activeWOs = [];
  for (const char of chars) {
    for (const woKey of (char.charData.ActiveWorkOrders||[])) {
      const limit = woLimitsCache[woKey] || 10;
      const recipe = resolveWORecipe(woKey);
      activeWOs.push({ woKey, char, limit, recipe, charItems: char.items });
    }
  }

  html += `<div class="wo-section"><div class="wo-section-title">Active Work Orders <span class="badge">${activeWOs.length}</span></div>`;
  if (activeWOs.length === 0) {
    html += '<div class="empty-state" style="padding:20px"><div class="icon">📋</div><h3>No active work orders</h3></div>';
  } else {
    for (const { woKey, char, limit, recipe, charItems } of activeWOs) {
      html += renderWOCard(woKey, char, limit, recipe, charItems, showAll, false, null);
    }
  }
  html += '</div>';

  // ── Completed Work Orders ──
  const THIRTY_DAYS = 30*24*60*60*1000;
  const now = Date.now();
  const charIds = new Set(chars.map(c=>c.id));
  // Sort soonest-to-reset first (smallest remaining time at top)
  const recentCompleted = woCompletedLog
    .filter(e => charIds.has(e.charId) && (now - e.ts) < THIRTY_DAYS)
    .sort((a, b) => b.ts - a.ts); // older = less remaining = sort first

  // Static completed (from char data, not yet tracked with timestamp)
  const loggedKeys = new Set(recentCompleted.map(e=>e.woKey+'_'+e.charId));
  const staticCompleted = [];
  for (const char of chars) {
    for (const woKey of (char.charData.CompletedWorkOrders||[])) {
      if (!loggedKeys.has(woKey+'_'+char.id))
        staticCompleted.push({ woKey, char, name: woKeyToDisplayName(woKey) });
    }
  }

  const totalCompleted = recentCompleted.length + staticCompleted.length;

  // Filter by search
  const cq = completedWOSearch.toLowerCase().trim();
  const filteredRecent  = cq ? recentCompleted.filter(e  => (resolveWORecipe(e.woKey)?.[0] || woKeyToDisplayName(e.woKey)).toLowerCase().includes(cq)) : recentCompleted;
  const filteredStatic  = cq ? staticCompleted.filter(e  => e.name.toLowerCase().includes(cq)) : staticCompleted;
  const filteredTotal   = filteredRecent.length + filteredStatic.length;

  html += `<div class="wo-section">
    <div class="wo-section-title">Completed Work Orders <span class="badge">${totalCompleted}</span></div>
    <div class="search-input-wrap" style="max-width:280px;margin-bottom:12px">
      <button class="search-clear ${completedWOSearch?'visible':''}" onclick="clearCompletedWOSearch()">✕</button>
      <input class="search-input" id="completedWOSearchInput" style="padding-left:34px" placeholder="Search completed…"
        value="${completedWOSearch.replace(/"/g,'&quot;')}" oninput="onCompletedWOSearch(this.value)">
      <span class="search-icon">⌕</span>
    </div>`;

  if (filteredRecent.length > 0) {
    html += `<div style="font-size:11px;color:var(--text-dim);margin-bottom:10px">Tracked completions — bar shows time until 30-day reset:</div>`;
    for (const entry of filteredRecent) {
      const char = characters.find(c=>c.id===entry.charId) || chars[0];
      const recipe = resolveWORecipe(entry.woKey);
      const limit = woLimitsCache[entry.woKey] || 10;
      html += renderWOCard(entry.woKey, char, limit, recipe, char.items, showAll, true, entry.ts);
    }
  }

  if (filteredStatic.length > 0) {
    html += `<div style="font-size:11px;color:var(--text-dim);margin:${filteredRecent.length?14:0}px 0 8px">All completed (from character data — completion date unknown):</div>`;
    html += '<div style="display:flex;flex-direction:column;gap:3px">';
    for (const { woKey, char, name } of filteredStatic.slice(0, 120)) {
      const iconId = getWOIconId(woKey, resolveWORecipe(woKey));
      const iconUrl = iconId ? getIconUrl(iconId) : null;
      const iconHtml = iconUrl ? `<img class="item-icon" src="${iconUrl}" alt="" style="width:16px;height:16px;margin-right:6px;vertical-align:middle">` : '';
      html += `<div class="wo-card complete" style="padding:7px 12px">
        <div class="wo-header" style="margin-bottom:0">
          <div style="display:flex;align-items:center">${iconHtml}<div class="wo-name" style="font-size:13px">${name}</div></div>
          ${showAll?`<span class="wo-char-tag">${char.charData.Character}</span>`:''}
        </div>
      </div>`;
    }
    html += '</div>';
    if (filteredStatic.length > 120) html += `<div style="font-size:11px;color:var(--text-dim);padding:6px 0">…and ${filteredStatic.length-120} more</div>`;
  }

  if (totalCompleted === 0) {
    html += '<div class="empty-state" style="padding:20px"><div class="icon">✓</div><h3>No completed work orders yet</h3><p style="font-size:12px;margin-top:6px">Completions will be tracked when detected from your character file</p></div>';
  } else if (filteredTotal === 0) {
    html += `<div style="font-size:12px;color:var(--text-dim);padding:10px 0">No completed work orders match "<strong>${completedWOSearch}</strong>"</div>`;
  }
  html += '</div></div>';
  document.getElementById('appContent').innerHTML = html;
}

function toggleWOCard(expandKey) {
  if (expandedWOs.has(expandKey)) expandedWOs.delete(expandKey);
  else expandedWOs.add(expandKey);
  renderAll();
}

function onCompletedWOSearch(v) {
  completedWOSearch = v;
  // Partial re-render: preserve search focus — just re-render the WO tab
  renderWorkOrdersTab();
  // Restore focus
  setTimeout(() => {
    const el = document.getElementById('completedWOSearchInput');
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 10);
}
function clearCompletedWOSearch() { completedWOSearch = ''; renderWorkOrdersTab(); }

function renderWOCard(woKey, char, limit, recipe, charItems, showChar, isCompleted, completedTs, extraHtml = '') {
  const displayName = woKeyToDisplayName(woKey);
  const skill = woKey.split('_')[0];
  const expandKey = woKey + '_' + char.id + (isCompleted ? '_c' : '');
  const expanded = expandedWOs.has(expandKey);
  const safeExpandKey = expandKey.replace(/'/g, "\\'");

  // No recipe found — show minimal card silently
  if (!recipe) {
    const resetHtml = buildResetHtml(isCompleted, completedTs);
    return `<div class="wo-card${isCompleted?' complete':''}" oncontextmenu="openWOLimitPopup('${woKey}',${limit},event)">
      <div class="wo-header"><div><div class="wo-name">${displayName}</div><div class="wo-skill">${skill}</div></div></div>
      ${resetHtml}
    </div>`;
  }

  const [rName, rSkill, ings] = recipe;
  const recipeKey = _recipeKeyByRef.get(recipe) || '';
  const rc = char.charData.RecipeCompletions || {};
  const recipeUnlocked = recipeKey && (rc[recipeKey] !== undefined);
  const recipeCount = rc[recipeKey] || 0;
  const itemMap = getCharItemMap(char);

  const resultIconId = getWOIconId(woKey, recipe);
  const resultIconUrl = resultIconId ? getIconUrl(resultIconId) : null;
  const resultIconHtml = resultIconUrl ? `<img class="item-icon" src="${resultIconUrl}" alt="" style="width:18px;height:18px;margin-right:6px;vertical-align:middle">` : '';

  if (isCompleted) {
    const resetHtml = buildResetHtml(isCompleted, completedTs);
    return `<div class="wo-card complete" oncontextmenu="openWOLimitPopup('${woKey}',${limit},event)">
      <div class="wo-header" style="margin-bottom:0">
        <div style="display:flex;align-items:center">${resultIconHtml}<div><div class="wo-name">${rName}</div><div class="wo-skill">${rSkill}</div></div></div>
        ${showChar?`<span class="wo-char-tag">${char.charData.Character}</span>`:''}
      </div>
      ${resetHtml}
    </div>`;
  }

  // ── Active WO ──
  let canCraft = Infinity;
  for (const [ingId, qty] of ings) canCraft = Math.min(canCraft, Math.floor(getInventoryQtyFast(ingId, itemMap) / qty));
  canCraft = Math.min(canCraft === Infinity ? 0 : canCraft, limit);
  const pct = Math.min(100, (canCraft / limit) * 100);
  const barClass = pct >= 100 ? 'done' : pct > 0 ? 'partial' : 'none';

  // Collapsed: header + progress only
  if (!expanded) {
    return `<div class="wo-card" style="cursor:pointer" onclick="toggleWOCard('${safeExpandKey}')" oncontextmenu="openWOLimitPopup('${woKey}',${limit},event)">
      <div class="wo-header">
        <div style="display:flex;align-items:center">${resultIconHtml}<div><div class="wo-name">${rName}</div><div class="wo-skill">${rSkill}</div></div></div>
        <div style="display:flex;align-items:center;gap:8px">
          ${showChar?`<span class="wo-char-tag">${char.charData.Character}</span>`:''}
          <span style="font-size:11px;color:var(--text-dim);user-select:none">▼</span>
        </div>
      </div>
      <div class="wo-progress">
        <div class="wo-bar-wrap"><div class="wo-bar ${barClass}" style="width:${pct}%"></div></div>
        <span class="wo-qty">${canCraft}/${limit} craftable</span>
      </div>
    </div>`;
  }

  // Expanded: full detail
  const recipeCls = recipeUnlocked ? 'have' : 'lack';
  const recipeLabel = recipeUnlocked ? `✓ Recipe (×${recipeCount})` : `✗ Recipe (not learned)`;
  const safeRecipeKey = recipeKey.replace(/'/g, "\\'");
  const recipeChip = `<span class="wo-ing-chip ${recipeCls}" style="cursor:default"
    onmouseenter="showRecipeSourceTooltip('${safeRecipeKey}',event)"
    onmouseleave="hideRecipeSourceTooltip()">${recipeLabel}</span>`;

  const ingChips = ings.map(([ingId, qty]) => {
    const idata = ITEMS[String(ingId)];
    const iName = idata ? idata[0] : `#${ingId}`;
    const have = getInventoryQtyFast(ingId, itemMap);
    const needed = qty * limit;
    const cls = have >= needed ? 'have' : have >= qty ? 'partial' : 'lack';
    const safeN = iName.replace(/'/g,"\\'");
    const iconId = ITEMS_ICONS[String(ingId)];
    const iconUrl = iconId ? getIconUrl(iconId) : null;
    const iconHtml = iconUrl ? `<img class="item-icon" src="${iconUrl}" alt="" style="width:14px;height:14px">` : '';
    return `<span class="wo-ing-chip ${cls}"
      onmouseenter="showIngTooltip(${ingId},'${safeN}',${qty},${limit},event)"
      onmouseleave="hideIngTooltip()">${iconHtml}${iName} <span class="qty">${have}/${needed}</span></span>`;
  }).join('');

  return `<div class="wo-card" style="cursor:pointer" onclick="toggleWOCard('${safeExpandKey}')" oncontextmenu="openWOLimitPopup('${woKey}',${limit},event)">
    <div class="wo-header">
      <div style="display:flex;align-items:center">${resultIconHtml}<div><div class="wo-name">${rName}</div><div class="wo-skill">${rSkill}</div></div></div>
      <div style="display:flex;align-items:center;gap:8px">
        ${showChar?`<span class="wo-char-tag">${char.charData.Character}</span>`:''}
        <span style="font-size:11px;color:var(--text-dim);user-select:none">▲</span>
      </div>
    </div>
    <div class="wo-progress">
      <div class="wo-bar-wrap"><div class="wo-bar ${barClass}" style="width:${pct}%"></div></div>
      <span class="wo-qty">${canCraft}/${limit} craftable</span>
    </div>
    <div class="wo-ingredients" onclick="event.stopPropagation()">${recipeChip}${ingChips}</div>
    <div style="font-size:10px;color:var(--text-dim);margin-top:5px">Right-click to change max quantity (default: 10)</div>
    ${extraHtml}
  </div>`;
}

function buildResetHtml(isCompleted, completedTs) {
  if (!isCompleted || !completedTs) return '';
  const THIRTY_DAYS = 30*24*60*60*1000;
  const elapsed = Math.min(THIRTY_DAYS, Date.now() - completedTs);
  const remaining = Math.max(0, THIRTY_DAYS - elapsed);
  const fillPct = Math.min(100, (elapsed / THIRTY_DAYS) * 100); // fills up over time
  const days = Math.ceil(remaining / (24*60*60*1000));
  const date = new Date(completedTs).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  return `<div class="wo-completed-date">Completed ${date}</div>
    <div class="wo-reset-row">
      <div class="wo-reset-bar-wrap"><div class="wo-reset-bar" style="width:${fillPct}%"></div></div>
      <span class="wo-reset-label">${remaining > 0 ? `resets in ~${days}d` : 'reset available'}</span>
    </div>`;
}

// AVAILABLE WORK ORDERS TAB
// ═══════════════════════════════════════════════════════════
function scrollNameToWOKey(scrollName) {
  const m = scrollName.match(/^Work Order for (.+?)(?:\s*\((.+?)\))?$/);
  if (!m) return null;
  const skill = m[2] || 'Unknown';
  const itemKey = m[1].replace(/-/g,' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
  return `${skill}_${itemKey}`;
}

const expandedAvailWOs = new Set();
const expandedWOs = new Set();       // woKey_charId -> expanded active/completed WOs
const expandedRecipes = new Set();   // recipe internalName -> expanded recipe rows
const expandedFavorNpcs = new Set(); // npcKey -> expanded training panel

function toggleAvailWO(woKey) {
  if (expandedAvailWOs.has(woKey)) expandedAvailWOs.delete(woKey);
  else expandedAvailWOs.add(woKey);
  // Re-render just this card in place
  const el = document.getElementById('avail_' + CSS.escape(woKey));
  if (el) {
    const entry = _availWOEntries?.find(e => e.woKey === woKey);
    if (entry) el.outerHTML = renderAvailWOCard(entry);
  }
}

let _availWOEntries = null; // cache for toggle re-renders
let availWOSearchQ = '';

function onAvailWOSearch(v) {
  availWOSearchQ = v;
  filterAvailWOs();
  setTimeout(() => {
    const el = document.getElementById('availWOSearch');
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 10);
}
function clearAvailWOSearch() { availWOSearchQ = ''; renderAvailableWOsTab(); }

function filterAvailWOs() {
  const q = availWOSearchQ.toLowerCase();
  const entries = _availWOEntries;
  if (!entries) return;

  const bySkill = {};
  for (const entry of entries) {
    const skill = entry.woKey.split('_')[0];
    const recipe = entry.recipe;
    const name = recipe ? recipe[0] : woKeyToDisplayName(entry.woKey);
    if (q && !name.toLowerCase().includes(q) && !skill.toLowerCase().includes(q)) continue;
    if (!bySkill[skill]) bySkill[skill] = [];
    bySkill[skill].push(entry);
  }

  const container = document.getElementById('availWOList');
  if (!container) return;
  let filtered = 0;
  let html = '';
  for (const [skill, skillEntries] of Object.entries(bySkill).sort()) {
    html += `<div style="font-family:'Cinzel',serif;font-size:10px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.12em;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)">${skill}</div>`;
    for (const entry of skillEntries) { html += renderAvailWOCard(entry); filtered++; }
  }
  container.innerHTML = html || '<div style="color:var(--text-dim);padding:16px;font-size:13px">No results</div>';
  const badge = document.getElementById('availWOBadge');
  if (badge) badge.textContent = filtered;
  const clearBtn = document.querySelector('#availWOSearch')?.previousElementSibling;
  if (clearBtn) clearBtn.classList.toggle('visible', !!q);
}

function renderAvailableWOsTab() {
  const allChars = characters;
  if (allChars.length === 0) {
    document.getElementById('appContent').innerHTML = '<div class="full-panel"><div class="empty-state"><div class="icon">📜</div><h3>No character loaded</h3></div></div>';
    return;
  }

  // Collect all WO scrolls — group by derived WO key
  const byWOKey = {};
  for (const char of allChars) {
    for (const item of char.items) {
      if (!item.name.startsWith('Work Order for')) continue;
      const woKey = scrollNameToWOKey(item.name);
      if (!woKey) continue;
      if (!byWOKey[woKey]) {
        byWOKey[woKey] = { woKey, recipe: resolveWORecipe(woKey), scrolls: [] };
      }
      byWOKey[woKey].scrolls.push({
        charName: char.charData.Character,
        charObj: char,
        qty: item.total,
        vaults: item.vaults
      });
    }
  }

  const entries = Object.values(byWOKey).sort((a, b) => {
    const [aSkill, aItem = ''] = a.woKey.split('_');
    const [bSkill, bItem = ''] = b.woKey.split('_');
    return aSkill.localeCompare(bSkill) || aItem.localeCompare(bItem);
  });

  _availWOEntries = entries;

  if (entries.length === 0) {
    document.getElementById('appContent').innerHTML = `<div class="full-panel"><div class="empty-state"><div class="icon">📜</div><h3>No work order scrolls found</h3><p style="font-size:12px;margin-top:6px">Items named "Work Order for…" will appear here</p></div></div>`;
    return;
  }

  // Group by skill
  const bySkill = {};
  for (const entry of entries) {
    const skill = entry.woKey.split('_')[0];
    if (!bySkill[skill]) bySkill[skill] = [];
    bySkill[skill].push(entry);
  }

  let skillRows = '';
  for (const [skill, skillEntries] of Object.entries(bySkill).sort()) {
    skillRows += `<div style="font-family:'Cinzel',serif;font-size:10px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.12em;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)">${skill}</div>`;
    for (const entry of skillEntries) skillRows += renderAvailWOCard(entry);
  }

  const html = `<div class="full-panel"><div class="wo-section">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <div class="wo-section-title" style="margin:0">Available Work Order Scrolls <span id="availWOBadge" class="badge">${entries.length}</span></div>
      <div class="search-input-wrap" style="max-width:260px">
        <button class="search-clear ${availWOSearchQ?'visible':''}" onclick="clearAvailWOSearch()">✕</button>
        <input class="search-input" id="availWOSearch" style="padding-left:34px" placeholder="Search…"
          value="${availWOSearchQ.replace(/"/g,'&quot;')}" oninput="onAvailWOSearch(this.value)">
        <span class="search-icon">⌕</span>
      </div>
    </div>
    <div id="availWOList">${skillRows}</div>
  </div></div>`;
  document.getElementById('appContent').innerHTML = html;
  if (availWOSearchQ) filterAvailWOs();
}

function renderAvailWOCard(entry) {
  const { woKey, recipe, scrolls } = entry;
  const limit = woLimitsCache[woKey] || 10;
  const expanded = expandedAvailWOs.has(woKey);
  const safeKey = woKey.replace(/'/g, "\\'");
  const escapedKey = CSS.escape(woKey);

  // Header: icon + name + skill (no char tag)
  const skill = woKey.split('_')[0];
  let rName = woKeyToDisplayName(woKey).replace(` (${skill})`, '');
  let rSkill = skill;
  if (recipe) { rName = recipe[0]; rSkill = recipe[1]; }

  const resultIconId = getWOIconId(woKey, recipe);
  const resultIconUrl = resultIconId ? getIconUrl(resultIconId) : null;
  const resultIconHtml = resultIconUrl ? `<img class="item-icon" src="${resultIconUrl}" alt="" style="width:18px;height:18px;margin-right:6px;vertical-align:middle">` : '';

  // Progress bar — count across ALL characters
  let canCraft = 0;
  let pct = 0, barClass = 'none';
  if (recipe) {
    const ings = recipe[2] || [];
    let craftable = Infinity;
    for (const [ingId, qty] of ings) {
      const totalHave = getInventoryQtyAllChars(ingId);
      craftable = Math.min(craftable, Math.floor(totalHave / qty));
    }
    canCraft = Math.min(craftable === Infinity ? 0 : craftable, limit);
    pct = Math.min(100, (canCraft / limit) * 100);
    barClass = pct >= 100 ? 'done' : pct > 0 ? 'partial' : 'none';
  }

  // Collapsed view: header + progress bar only
  let expandedSection = '';
  if (expanded && recipe) {
    const ings = recipe[2] || [];
    const recipeKey = _recipeKeyByRef.get(recipe) || '';
    const recipeCls = characters.some(c => (c.charData.RecipeCompletions||{})[recipeKey] !== undefined) ? 'have' : 'lack';
    const recipeLabel = recipeCls === 'have' ? `✓ Recipe` : `✗ Recipe (not learned)`;
    const safeRecipeKey = recipeKey.replace(/'/g,"\\'");
    const recipeChip = `<span class="wo-ing-chip ${recipeCls}" style="cursor:default"
      onmouseenter="showRecipeSourceTooltip('${safeRecipeKey}',event)"
      onmouseleave="hideRecipeSourceTooltip()">${recipeLabel}</span>`;

    const ingChips = ings.map(([ingId, qty]) => {
      const idata = ITEMS[String(ingId)];
      const iName = idata ? idata[0] : `#${ingId}`;
      const have = getInventoryQtyAllChars(ingId);
      const needed = qty * limit;
      const cls = have >= needed ? 'have' : have >= qty ? 'partial' : 'lack';
      const safeN = iName.replace(/'/g,"\\'");
      const iconId = ITEMS_ICONS[String(ingId)];
      const iconUrl = iconId ? getIconUrl(iconId) : null;
      const iconHtml = iconUrl ? `<img class="item-icon" src="${iconUrl}" alt="" style="width:14px;height:14px">` : '';
      return `<span class="wo-ing-chip ${cls}"
        onmouseenter="showIngTooltip(${ingId},'${safeN}',${qty},${limit},event)"
        onmouseleave="hideIngTooltip()">${iconHtml}${iName} <span class="qty">${have}/${needed}</span></span>`;
    }).join('');

    // Scroll location
    const scrollChips = scrolls.map(s => {
      const vaultChips = Object.entries(s.vaults).map(([v]) => {
        const col = vc(v);
        return `<span style="font-size:10px;padding:1px 6px;border-radius:3px;border:1px solid ${col.border};background:${col.bg};color:${col.text};white-space:nowrap">${fvn(v)}</span>`;
      }).join(' ');
      const charTag = characters.length > 1 ? `<span style="font-size:10px;color:var(--text-dim);margin-right:4px">${s.charName}:</span>` : '';
      return `<span style="display:inline-flex;align-items:center;gap:4px">${charTag}${vaultChips}</span>`;
    }).join(' ');

    // Craftable by — which chars have all ingredients (single-craft basis)
    const craftableBy = characters.filter(char => {
      if (!ings.length) return false;
      return ings.every(([ingId, qty]) => getInventoryQtyFast(ingId, getCharItemMap(char)) >= qty);
    }).map(c => c.charData.Character);
    const craftableHtml = craftableBy.length
      ? `<span style="color:var(--green)">${craftableBy.join(', ')}</span>`
      : `<span style="color:var(--text-dim)">No one (missing ingredients)</span>`;

    expandedSection = `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(42,47,63,.5)">
      <div class="wo-ingredients" style="margin-bottom:8px">${recipeChip}${ingChips}</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:5px 8px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:4px">
          <span style="font-size:10px;color:var(--gold-dim);flex-shrink:0">📜 Scroll in:</span>
          ${scrollChips}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:5px 8px;background:rgba(90,153,96,.06);border:1px solid rgba(90,153,96,.25);border-radius:4px">
          <span style="font-size:10px;color:var(--green);flex-shrink:0">🔨 Craftable by:</span>
          <span style="font-size:11px">${craftableHtml}</span>
        </div>
      </div>
      <div style="font-size:10px;color:var(--text-dim);margin-top:6px">Right-click to change max quantity (default: 10)</div>
    </div>`;
  }

  return `<div class="wo-card" id="avail_${escapedKey}" style="cursor:pointer" oncontextmenu="openWOLimitPopup('${safeKey}',${limit},event)" onclick="toggleAvailWO('${safeKey}')">
    <div class="wo-header">
      <div style="display:flex;align-items:center">${resultIconHtml}<div><div class="wo-name">${rName}</div><div class="wo-skill">${rSkill}</div></div></div>
      <span style="font-size:11px;color:var(--text-dim);user-select:none">${expanded ? '▲' : '▼'}</span>
    </div>
    <div class="wo-progress">
      <div class="wo-bar-wrap"><div class="wo-bar ${barClass}" style="width:${pct}%"></div></div>
      <span class="wo-qty">${canCraft}/${limit} craftable (all chars)</span>
    </div>
    ${expandedSection}
  </div>`;
}

// Favor level order and display colours
const FAVOR_LEVELS_ALL = ['Neutral','Tolerated','Comfortable','Friends','CloseFriends','BestFriends','LikeFamily','SoulMates'];
const FAVOR_PCT = { Neutral:0, Tolerated:12, Comfortable:25, Friends:38, CloseFriends:55, BestFriends:70, LikeFamily:85, SoulMates:100 };
const FAVOR_COLORS = {
  Neutral:    { bar:'rgba(138,128,112,.4)',  text:'var(--text-dim)',   bg:'rgba(138,128,112,.08)',  border:'rgba(138,128,112,.3)'  },
  Tolerated:  { bar:'rgba(74,144,144,.6)',   text:'#60b0b0',           bg:'rgba(74,144,144,.08)',   border:'rgba(74,144,144,.35)'  },
  Comfortable:{ bar:'rgba(80,120,200,.6)',   text:'#7aa0e8',           bg:'rgba(80,120,200,.08)',   border:'rgba(80,120,200,.35)'  },
  Friends:    { bar:'rgba(90,153,96,.7)',    text:'#7ab880',           bg:'rgba(90,153,96,.08)',    border:'rgba(90,153,96,.35)'   },
  CloseFriends:{ bar:'rgba(201,168,76,.7)', text:'var(--gold)',        bg:'rgba(201,168,76,.08)',   border:'rgba(201,168,76,.35)'  },
  BestFriends:{ bar:'rgba(200,168,76,.85)', text:'var(--gold-light)',  bg:'rgba(200,168,76,.12)',   border:'rgba(200,168,76,.4)'   },
  LikeFamily: { bar:'rgba(128,96,160,.8)',  text:'#a880d0',           bg:'rgba(128,96,160,.1)',    border:'rgba(128,96,160,.45)'  },
  SoulMates:  { bar:'rgba(192,80,80,.8)',   text:'#e07070',           bg:'rgba(192,80,80,.1)',     border:'rgba(192,80,80,.45)'   },
};

function setFavorAreaFilter(area) {
  favorAreaFilter = (favorAreaFilter === area) ? '' : area;
  // Area change must re-render the chips too — clear shell so full re-render runs
  const ac = document.getElementById('appContent');
  if (ac) ac.innerHTML = '';
  renderFavorsTab();
}

function onFavorSearch(v) { favorSearchQ = v; renderFavorsTab(); }
function clearFavorSearch() { favorSearchQ = ''; renderFavorsTab(); }

function toggleFavorNpc(key) {
  if (expandedFavorNpcs.has(key)) expandedFavorNpcs.delete(key);
  else expandedFavorNpcs.add(key);
  // Partial re-render — just rebuild tbody to avoid losing search focus
  const tbody = document.getElementById('favorTbody');
  if (tbody) {
    const showAll = activeCharId === '__all__';
    const chars = showAll ? characters : characters.filter(c => c.id === activeCharId);
    tbody.innerHTML = _lastFavorRows ? _lastFavorRows(chars, showAll) : '';
  }
}
let _lastFavorRows = null; // stored builder fn for partial re-renders

function buildFavorTrainingPanel(npcKey, chars) {
  let entries;
  if (dataLoaded.npc_training && NPC_TRAINING[npcKey]?.length > 0) {
    entries = NPC_TRAINING[npcKey];
  } else if (dataLoaded.sources_recipes && NPC_RECIPES_MAP[npcKey]?.length > 0) {
    // Build entries from CDN data — no per-recipe favor/cost available
    entries = NPC_RECIPES_MAP[npcKey].map(recipeKey => {
      const r = RECIPES[recipeKey];
      return { recipeKey, name: r ? r[0] : recipeKey, skillLevel: r ? (r[4] || 0) : 0, favor: null, cost: null };
    });
  }
  if (!entries || entries.length === 0) return '';

  // Get recipe completions across all chars: recipeKey -> Set of charIds that know it
  const known = {};
  for (const char of chars) {
    const completions = char.charData.RecipeCompletions || {};
    for (const rk of Object.keys(completions)) {
      if (!known[rk]) known[rk] = new Set();
      known[rk].add(char.id);
    }
  }
  const singleChar = chars.length === 1;

  // Group entries by skill (from RECIPES lookup, else 'Other')
  const bySkill = {};
  for (const e of entries) {
    const skill = (e.recipeKey && RECIPES[e.recipeKey]) ? RECIPES[e.recipeKey][1] : 'Abilities';
    if (!bySkill[skill]) bySkill[skill] = [];
    bySkill[skill].push(e);
  }

  let html = `<div style="padding:8px 4px 4px">`;
  for (const [skill, skillEntries] of Object.entries(bySkill).sort()) {
    html += `<div style="font-family:'Cinzel',serif;font-size:9px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.1em;margin:8px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--border)">${skill}</div>`;
    html += `<div style="display:flex;flex-direction:column;gap:3px">`;
    for (const e of skillEntries.sort((a,b) => (a.skillLevel||0)-(b.skillLevel||0))) {
      const fc = FAVOR_COLORS[e.favor] || FAVOR_COLORS.Neutral;
      const favorLabel = FAVOR_LABELS[e.favor] || e.favor || '?';
      const costStr = e.cost != null ? `<span style="color:var(--gold-dim);font-size:10px;margin-left:6px">${e.cost.toLocaleString()} 🪙</span>` : '';
      const lvlStr = e.skillLevel != null ? `<span style="font-size:10px;color:var(--text-dim);margin-left:4px">Lv.${e.skillLevel}</span>` : '';

      // Learned indicator (only for recipe entries)
      let learnedHtml = '';
      if (e.recipeKey) {
        if (singleChar) {
          const isKnown = !!known[e.recipeKey]?.size;
          learnedHtml = `<span style="font-size:11px;margin-right:5px;color:${isKnown ? 'var(--green)' : 'var(--text-dim)'}">${isKnown ? '✓' : '✗'}</span>`;
        } else {
          const knownCount = known[e.recipeKey]?.size || 0;
          if (knownCount > 0) learnedHtml = `<span style="font-size:10px;margin-right:5px;color:var(--green)">✓${knownCount}</span>`;
          else learnedHtml = `<span style="font-size:10px;margin-right:5px;color:var(--text-dim)">✗</span>`;
        }
      }

      const kwTag = e.recipeKey && RECIPES[e.recipeKey] ? cookingKwTag(RECIPES[e.recipeKey]) : '';
      const favorBadge = e.favor != null
        ? `<span style="font-size:10px;margin-left:8px;padding:1px 6px;border-radius:3px;background:${fc.bg};color:${fc.text};border:1px solid ${fc.border};white-space:nowrap">${favorLabel}</span>`
        : '';
      html += `<div style="display:flex;align-items:center;gap:0;padding:1px 0">
        ${learnedHtml}
        <span style="font-size:12px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.name}</span>${kwTag}
        <span style="flex:1"></span>
        ${lvlStr}
        ${costStr}
        ${favorBadge}
      </div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

// ── Player log parsing ──────────────────────────────────────

function fmtAgo(ts) {
  if (!ts) return '?';
  const mins = Math.round((Date.now() - ts) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.round(hrs / 24)}d ago`;
}

function detectGardenStage(action) {
  // Detect stage from the ActionLabel arg of ProcessUpdateDescription
  // e.g. "Water Onion" → thirsty, "Fertilize Cotton Plant" → needs_fertilizer
  //      "Harvest Potato" → ripe, "Pick Cotton Plant" → ripe (cotton uses Pick)
  const a = action.toLowerCase();
  if (a.startsWith('harvest') || a.startsWith('pick')) return 'ripe';
  if (a.startsWith('water')) return 'thirsty';
  if (a.startsWith('fertilize') || a.startsWith('feed')) return 'needs_fertilizer';
  return 'growing'; // "Check ..." or anything else
}

function loadPlayerLogData() {
  try {
    const s = localStorage.getItem('pgPlayerLogData');
    if (s) { const p = JSON.parse(s); playerLogData = p.data || {}; currentLogChar = p.char || ''; updateHeaderChar(); }
    // Migrate old keys
    localStorage.removeItem('pgPlayerLogNpcs');
    localStorage.removeItem('pgPlayerLogNpcIdMap');
  } catch(e) {}
  try {
    const g = localStorage.getItem('pgGardenData');
    if (g) gardenData = JSON.parse(g) || {};
  } catch(e) {}
  gardenSessionActive = localStorage.getItem('gardenSessionActive') === '1';
  const savedPos = parseInt(localStorage.getItem('pgPlayerLogPos') || '0', 10);
  if (savedPos > 0) playerLogFileSize = savedPos;
}

function savePlayerLogData() {
  try { localStorage.setItem('pgPlayerLogData', JSON.stringify({ data: playerLogData, char: currentLogChar })); } catch(e) {}
  try { localStorage.setItem('pgGardenData', JSON.stringify(gardenData)); } catch(e) {}
  try { localStorage.setItem('pgPlayerLogPos', String(playerLogFileSize)); } catch(e) {}
}

// Garden harvest helpers — module-scope so they can be called from inside the parse loop
// without re-declaring on every iteration (which causes strict-mode errors).
function _gardenMarkHarvested(char, plotId) {
  const plot = gardenData[char]?.plots?.[plotId];
  if (plot && plot.stage !== 'harvested') {
    plot.stage = 'harvested';
    plot.updatedAt = Date.now();
    return true;
  }
  return false;
}
function _gardenMarkRipeByType(char, cropType) {
  const plots = gardenData[char]?.plots;
  if (!plots) return false;
  let oldest = null, oldestId = null;
  for (const [id, p] of Object.entries(plots)) {
    if (p.stage === 'ripe' && p.cropType === cropType) {
      if (!oldest || (p.updatedAt || 0) < (oldest.updatedAt || 0)) { oldest = p; oldestId = id; }
    }
  }
  if (oldestId) { plots[oldestId].stage = 'harvested'; plots[oldestId].updatedAt = Date.now(); return true; }
  return false;
}

function parsePlayerLogLines(lines) {
  let vendorCount = 0;
  for (const line of lines) {
    // Detect current player: ProcessAddPlayer(id, n, "AppearanceStr", "CharName", ...)
    let m = line.match(/ProcessAddPlayer\([^,]+,\s*[^,]+,\s*"[^"]*",\s*"([^"]+)"/);
    if (m) { currentLogChar = m[1]; updateHeaderChar(); continue; }

    // Always track owned pet IDs regardless of char state — so thirsty events later
    // can be matched even if currentLogChar was empty when the seed was planted
    { const om = line.match(/LocalPlayer: ProcessSetPetOwner\((\d+),/); if (om) playerOwnedPetIds.add(om[1]); }

    const char = currentLogChar;
    if (!char) continue;
    if (!playerLogData[char]) playerLogData[char] = { npcs: {}, idMap: {} };
    const d = playerLogData[char];

    // ProcessStartInteraction(id, ?, absoluteFavor, bool, "NPC_Name") — capture absolute favor
    m = line.match(/ProcessStartInteraction\((\d+),\s*\d+,\s*([\d.-]+),\s*\w+,\s*"(NPC_\w+)"\)/);
    if (m) {
      const npcKey = m[3];
      d.idMap[m[1]] = npcKey;
      const absF = parseFloat(m[2]);
      if (!isNaN(absF)) {
        if (!d.npcs[npcKey]) d.npcs[npcKey] = { loggedAt: Date.now() };
        const prev = d.npcs[npcKey].exactFavor;
        d.npcs[npcKey].exactFavor = absF;
        d.npcs[npcKey].loggedAt = Date.now();
        if (prev !== absF) {
          const displayName = NPCS[npcKey]?.name || npcKey.replace('NPC_', '');
          showToast(`↑ ${displayName} updated`);
        }
        vendorCount++;
      }
      continue;
    }
    // ProcessDeltaFavor — only used for id→npcKey mapping
    m = line.match(/ProcessDeltaFavor\((\d+),\s*"(NPC_\w+)"/);
    if (m) { d.idMap[m[1]] = m[2]; continue; }
    // Vendor data: ProcessVendorScreen(id, favorLevel, currentGold, resetAt, maxGold, ...)
    m = line.match(/ProcessVendorScreen\((\d+),\s*(\w+),\s*(\d+),\s*(\d+),\s*(\d+)/);
    if (m) {
      const npcKey = d.idMap[m[1]];
      if (npcKey) {
        const prevGold = d.npcs[npcKey]?.currentGold;
        d.npcs[npcKey] = { ...(d.npcs[npcKey] || {}), currentGold: +m[3], maxGold: +m[5], resetAt: +m[4], favorLevel: m[2], loggedAt: Date.now() };
        if (prevGold !== +m[3]) {
          const displayName = NPCS[npcKey]?.name || npcKey.replace('NPC_', '');
          showToast(`↑ ${displayName} updated`);
        }
        vendorCount++;
      }
      continue;
    }
    // Appearance loop: track last clean crop name for planted-stage detection
    // Format: "Download appearance loop @ModelName(scale=N)" — alpha-only names are decodable crop names
    m = line.match(/Download appearance loop @([A-Za-z0-9]+)\(scale=/);
    if (m) {
      const model = m[1];
      if (/\d/.test(model)) {
        // Digit-containing model (Flower11, Flower7 = cotton) — can't decode crop name; clear pending
        lastCropAsset = null;
        pendingPlantForCrop = null;
      } else {
        if (lastCropAssetUsed) {
          // "is done" line for a crop already consumed by a pending fill — clear to prevent bleed into next plant
          lastCropAsset = null;
          lastCropAssetUsed = false;
        } else {
          lastCropAsset = model;
          lastCropAssetTime = Date.now();
          // If a plot is waiting for its crop name, fill it in now
          if (pendingPlantForCrop && gardenData[pendingPlantForCrop.charName]?.plots?.[pendingPlantForCrop.plotId]) {
            gardenData[pendingPlantForCrop.charName].plots[pendingPlantForCrop.plotId].cropType = model;
            pendingPlantForCrop = null;
            lastCropAssetUsed = true; // mark consumed so next "is done" for same plant is ignored
            vendorCount++;
          }
        }
      }
    }

    // Track entity IDs for plants WE planted (LocalPlayer: prefix = our action)
    m = line.match(/LocalPlayer: ProcessSetPetOwner\((\d+),/);
    if (m) {
      const plotId = m[1];
      playerOwnedPetIds.add(plotId);
      if (gardenSessionActive && char) {
        if (!gardenData[char]) gardenData[char] = { plots: {} };
        if (!gardenData[char].plots[plotId]) {
          // Use lastCropAsset only if fresh (≤5s) and not already consumed, AND the slot isn't full.
          // The slot check is key: if e.g. Carrot slot is 2/2, the next plant can't be a Carrot —
          // even if a Carrot appearance loop fired recently (from an existing plant's scale update).
          const rawCrop = (lastCropAsset && !lastCropAssetUsed && (Date.now() - lastCropAssetTime) < 5000) ? lastCropAsset : null;
          const crop = (rawCrop && !isGardenSlotFull(rawCrop, char)) ? rawCrop : null;
          gardenData[char].plots[plotId] = {
            cropType: crop, stage: 'planted', description: '', title: '', action: '', scale: 0,
            plantedAt: Date.now(), firstSeenAt: Date.now(), updatedAt: Date.now(),
            totalPausedMs: 0, pausedAt: null,
          };
          // If we couldn't get the crop from appearance (cached crop fires before SetPetOwner),
          // set a pending so the NEXT appearance loop line can fill it in
          pendingPlantForCrop = crop === null ? { plotId, charName: char } : null;
          lastCropAsset = null;      // consume so stale name doesn't bleed into next plant
          lastCropAssetUsed = false; // reset — next appearance loop can populate fresh
          vendorCount++;
        }
      }
    }

    // Garden events — only when a session is active
    if (gardenSessionActive) {
      // ProcessUpdateDescription with Scale= pattern uniquely identifies garden plant entities
      // Format: ProcessUpdateDescription(id, "Title", "Desc", "ActionLabel", Type, "ModelName(Scale=N)", 0)
      // Model name may contain digits (e.g. Flower11 for cotton); crop name extracted from action label
      m = line.match(/ProcessUpdateDescription\((\d+),\s*"([^"]+)",\s*"([^"]+)",\s*"([^"]+)",\s*\w+,\s*"[\w]+\(Scale=([\d.]+)\)",\s*\d+\)/);
      if (m) {
        const plotId = m[1], title = m[2], desc = m[3], action = m[4], scale = parseFloat(m[5]);
        const alreadyKnown = !!gardenData[char]?.plots?.[plotId];
        // Reject plants we didn't plant: not in gardenData AND not in our owned pet set
        if (!alreadyKnown && !playerOwnedPetIds.has(plotId)) continue;
        // Crop name = action label with the leading verb stripped: "Water Onion" → "Onion", "Pick Cotton Plant" → "Cotton Plant"
        const cropType = action.replace(/^\w+\s+/, '');
        if (!gardenData[char]) gardenData[char] = { plots: {} };
        const existing = gardenData[char].plots[plotId];
        const newStage = detectGardenStage(action);
        const wasPaused = existing?.stage === 'thirsty' || existing?.stage === 'needs_fertilizer';
        const nowPaused = newStage === 'thirsty' || newStage === 'needs_fertilizer';
        let totalPausedMs = existing?.totalPausedMs || 0;
        let pausedAt = existing?.pausedAt || null;
        if (nowPaused && !wasPaused) {
          pausedAt = Date.now(); // just became thirsty/hungry — start pause
        } else if (!nowPaused && wasPaused && pausedAt) {
          totalPausedMs += Date.now() - pausedAt; // resumed — accumulate pause
          pausedAt = null;
        } else if (!nowPaused) {
          pausedAt = null;
        }
        gardenData[char].plots[plotId] = {
          cropType, title, description: desc, action, scale,
          stage: newStage,
          plantedAt: existing?.plantedAt || null,
          totalPausedMs, pausedAt,
          firstSeenAt: existing?.firstSeenAt || Date.now(),
          updatedAt: Date.now(),
        };
        vendorCount++;
        continue;
      }
      // Garden harvest detection — four-tier approach:
      //
      // Tier 1 (PRIMARY): StartInteraction(plotId) → plot already 'ripe' → immediate harvest.
      //   Also arms pendingHarvestPlotId for tiers 2/3 when stage wasn't tracked as ripe yet.
      //
      // Tier 2: ProcessAddItem(CropName(itemId)) while pendingHarvestPlotId set → harvest confirmed.
      //   Also records itemId→cropType in gardenItemCropMap for tier 4.
      //
      // Tier 3: ProcessUpdateSkill(Gardening) while pendingHarvestPlotId set → catch-all harvest.
      //   Fires even when UpdateItemCode is used instead of AddItem (second harvest of same type).
      //
      // Tier 4 (NO-STARTINTERACTION): ProcessUpdateItemCode(itemId) whose itemId is in
      //   gardenItemCropMap, followed immediately by Gardening XP with NO pendingHarvestPlotId.
      //   Handles the case where ProcessStartInteraction wasn't logged (quick/simultaneous actions).
      //   lastUpdateItemCropType carries the crop name from UpdateItemCode into the XP line.
      //
      // Clearing: ProcessScreenText(ErrorMessage) clears pendingHarvestPlotId and
      //   lastUpdateItemCropType — the interaction failed, not a harvest.

      // Tier 1 — StartInteraction for a Summoned entity
      m = line.match(/ProcessStartInteraction\((\d+),\s*\d+,\s*[\d.-]+,\s*\w+,\s*"(Summoned\w+)"\)/);
      if (m) {
        const plotId = m[1];
        const plot = gardenData[char]?.plots?.[plotId];
        lastUpdateItemCropType = null; // new interaction resets tier-4 state
        if (plot) {
          if (plot.stage === 'ripe') {
            if (_gardenMarkHarvested(char, plotId)) vendorCount++;
            pendingHarvestPlotId = null;
          } else {
            pendingHarvestPlotId = plotId;
          }
        } else {
          pendingHarvestPlotId = null;
        }
        continue;
      }

      // Clear pending on failed interaction (plant still growing / some other error)
      if (line.includes('ProcessScreenText(ErrorMessage')) {
        pendingHarvestPlotId = null;
        lastUpdateItemCropType = null;
        continue;
      }

      // Tier 2 — ProcessAddItem: record itemId→cropType AND confirm harvest if pending
      m = line.match(/LocalPlayer: ProcessAddItem\((\w[\w\s]*)\((\d+)\)/);
      if (m) {
        const itemName = m[1].trimEnd(), itemId = m[2];
        for (const cropType of Object.keys(GARDEN_SLOT_MAP)) {
          if (itemName.toLowerCase().startsWith(cropType.split(' ')[0].toLowerCase())) {
            gardenItemCropMap[itemId] = cropType; break;
          }
        }
        if (pendingHarvestPlotId) {
          const plot = gardenData[char]?.plots?.[pendingHarvestPlotId];
          if (plot?.cropType && itemName.toLowerCase().startsWith(plot.cropType.split(' ')[0].toLowerCase())) {
            if (_gardenMarkHarvested(char, pendingHarvestPlotId)) vendorCount++;
            pendingHarvestPlotId = null; lastUpdateItemCropType = null;
          }
        }
      }

      // Tier 4 — ProcessUpdateItemCode: look up itemId→cropType for no-StartInteraction path
      m = line.match(/LocalPlayer: ProcessUpdateItemCode\((\d+),/);
      if (m) { const ct = gardenItemCropMap[m[1]]; if (ct) lastUpdateItemCropType = ct; }

      // Tier 3 + 4 — Gardening XP: definitive harvest signal (never fires for water/fertilize)
      if (line.includes('ProcessUpdateSkill') && line.includes('type=Gardening')) {
        if (pendingHarvestPlotId) {
          if (_gardenMarkHarvested(char, pendingHarvestPlotId)) vendorCount++;
          pendingHarvestPlotId = null; lastUpdateItemCropType = null;
        } else if (lastUpdateItemCropType) {
          if (_gardenMarkRipeByType(char, lastUpdateItemCropType)) vendorCount++;
          lastUpdateItemCropType = null;
        }
      }
    }
  }
  if (vendorCount > 0) playerLogLastUpdate = Date.now();
  savePlayerLogData();
  return vendorCount;
}

// ── Player log file watcher ──────────────────────────────────

async function watchPlayerLog() {
  try {
    const [handle] = await window.showOpenFilePicker({
      types: [{ description: 'Log files', accept: { 'text/plain': ['.log', '.txt'] } }],
      excludeAcceptAllOption: false,
    });
    playerLogFileHandle = handle;
    playerLogFileSize = 0;
    playerLogWatchActive = true;
    await dbPut('player_log_handle', 'handle', handle);
    startPlayerLogWatcher();
    if (mainTab === 'settings') renderSettingsTab();
  } catch(e) { /* user cancelled */ }
}

function stopPlayerLogWatch() {
  if (playerLogWatchTimer) { clearInterval(playerLogWatchTimer); playerLogWatchTimer = null; }
  playerLogWatchActive = false;
  if (mainTab === 'settings') renderSettingsTab();
}

function startPlayerLogWatcher() {
  if (playerLogWatchTimer) clearInterval(playerLogWatchTimer);
  playerLogWatchTimer = setInterval(pollPlayerLog, 2000);
  pollPlayerLog();
}

async function pollPlayerLog() {
  if (!playerLogFileHandle) return;
  try {
    const file = await playerLogFileHandle.getFile();
    if (file.size <= playerLogFileSize) return;
    const blob = file.slice(playerLogFileSize);
    const text = await blob.text();
    // Only process up to the last complete newline — if the game is mid-write on a line
    // when we poll, that partial line would never match any regex, and its continuation
    // bytes would be skipped on the next read (since playerLogFileSize already passed them).
    // By stopping at the last '\n' we ensure every line we parse is complete.
    const lastNL = text.lastIndexOf('\n');
    if (lastNL < 0) return; // no complete line yet — wait for more
    const processText = text.slice(0, lastNL + 1);
    // Log files are ASCII so char length ≈ byte length; use TextEncoder to be safe
    playerLogFileSize += new TextEncoder().encode(processText).byteLength;
    const lines = processText.split('\n');
    const count = parsePlayerLogLines(lines);
    if (count > 0 && mainTab === 'favors') renderFavorsTab();
    if (count > 0 && mainTab === 'tools' && toolsSubTab === 'gardening') renderToolsTab();
    if (mainTab === 'settings') renderSettingsTab();
  } catch(e) {
    // File moved or permission lost
    playerLogWatchActive = false;
    if (mainTab === 'settings') renderSettingsTab();
  }
}

let playerLogPendingHandle = null; // stored when permission needs re-granting

async function resumePlayerLogWatch() {
  try {
    const handle = await dbGet('player_log_handle', 'handle');
    if (!handle) return;
    const perm = await handle.queryPermission({ mode: 'read' });
    if (perm === 'granted') {
      playerLogFileHandle = handle;
      playerLogWatchActive = true;
      startPlayerLogWatcher();
    } else {
      // Permission needs re-granting — store handle and surface a resume button
      playerLogPendingHandle = handle;
      if (mainTab === 'settings') renderSettingsTab();
    }
  } catch(e) {}
}

async function resumePlayerLog() {
  const handle = playerLogPendingHandle;
  if (!handle) return;
  try {
    const perm = await handle.requestPermission({ mode: 'read' });
    if (perm === 'granted') {
      playerLogPendingHandle = null;
      playerLogFileHandle = handle;
      // keep playerLogFileSize from restored value — don't reset to 0
      playerLogWatchActive = true;
      await dbPut('player_log_handle', 'handle', handle);

function formatGoldReset(resetAt) {
  // resetAt is a Unix timestamp in ms for when gold resets
  const now = Date.now();
  const diff = resetAt - now;
  if (diff > 0 && diff < 30 * 86400 * 1000) {
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    if (days > 0) return `${days}d ${hours}h`;
    if (hours > 0) return `${hours}h ${mins}m`;
    return `${mins}m`;
  }
  if (diff <= 0 && diff > -86400000) return 'resetting soon';
  return '?';
}

function renderFavorsTab() {
  if (activeCharId === '__favorcalc__') return renderFavorCalcTab();
  const showAll = activeCharId === '__all__';
  const chars = showAll ? characters : characters.filter(c => c.id === activeCharId);
  if (chars.length === 0) {
    document.getElementById('appContent').innerHTML = '<div class="full-panel"><div class="empty-state"><div class="icon">🤝</div><h3>No character loaded</h3></div></div>';
    return;
  }

  // Build merged NPC list: npcKey -> { name, area, desc, chars: {charId: favorLevel}, logOnly? }
  const npcMap = {};
  for (const char of chars) {
    for (const [npcKey, npcData] of Object.entries(char.charData.NPCs || {})) {
      const favor = npcData.FavorLevel;
      if (!npcMap[npcKey]) {
        const info = NPCS[npcKey];
        npcMap[npcKey] = {
          key: npcKey,
          name: info?.name || npcKey.replace('NPC_','').replace(/_/g,' '),
          area: info?.area || '',
          desc: info?.desc || '',
          prefs: info?.prefs || [],
          chars: {}
        };
      }
      npcMap[npcKey].chars[char.id] = favor;
    }
  }

  // Add log-only NPCs (seen in player.log but not in character export)
  const singleCharName = !showAll && chars.length === 1 ? chars[0].charData?.Character : null;
  if (singleCharName && playerLogData[singleCharName]) {
    for (const npcKey of Object.keys(playerLogData[singleCharName].npcs)) {
      if (!npcMap[npcKey]) {
        const info = NPCS[npcKey];
        npcMap[npcKey] = {
          key: npcKey,
          name: info?.name || npcKey.replace('NPC_','').replace(/_/g,' '),
          area: info?.area || '',
          desc: info?.desc || '',
          prefs: info?.prefs || [],
          chars: {},
          logOnly: true
        };
      }
    }
  }
  // In All Characters mode, add log-only NPCs from all chars
  if (showAll) {
    for (const char of chars) {
      const cn = char.charData?.Character;
      if (!cn || !playerLogData[cn]) continue;
      for (const npcKey of Object.keys(playerLogData[cn].npcs)) {
        if (!npcMap[npcKey]) {
          const info = NPCS[npcKey];
          npcMap[npcKey] = {
            key: npcKey,
            name: info?.name || npcKey.replace('NPC_','').replace(/_/g,' '),
            area: info?.area || '',
            desc: info?.desc || '',
            prefs: info?.prefs || [],
            chars: {},
            logOnly: true
          };
        }
      }
    }
  }

  // Collect all areas
  const areaSet = new Map();
  for (const npc of Object.values(npcMap)) {
    if (npc.area) areaSet.set(npc.area, (areaSet.get(npc.area)||0)+1);
  }
  const sortedAreas = [...areaSet.entries()].sort((a,b)=>a[0].localeCompare(b[0]));

  // Filter
  let npcs = Object.values(npcMap);
  if (favorAreaFilter) npcs = npcs.filter(n => n.area === favorAreaFilter);
  if (favorSearchQ) {
    const q = favorSearchQ.toLowerCase();
    npcs = npcs.filter(n => n.name.toLowerCase().includes(q) || n.area.toLowerCase().includes(q));
  }
  // Sort: log-only NPCs last, then by highest favor (across chars) desc, then name
  const favorRank = f => FAVOR_LEVELS_ALL.indexOf(f);
  npcs.sort((a, b) => {
    if (a.logOnly !== b.logOnly) return a.logOnly ? 1 : -1;
    const aVals = Object.values(a.chars);
    const bVals = Object.values(b.chars);
    const aMax = aVals.length ? Math.max(...aVals.map(favorRank)) : -1;
    const bMax = bVals.length ? Math.max(...bVals.map(favorRank)) : -1;
    if (bMax !== aMax) return bMax - aMax;
    return a.name.localeCompare(b.name);
  });

  // Area filter chips
  const areaChips = sortedAreas.map(([area, count]) => {
    const active = favorAreaFilter === area;
    return `<span class="filter-chip ${active?'active':''}" onclick="setFavorAreaFilter('${area.replace(/'/g,"\\'")}')">
      ${area} <span style="opacity:.6;font-size:10px">${count}</span>

  // Character column headers — single col in all-chars mode

  // Table rows builder (stored for partial re-renders on toggle)
  const buildRows = (charList, isAll) => npcs.map(npc => {
    const favorCell = isAll
      ? `<td class="favor-bar-cell">${charList.map(c => {
          const favor = npc.chars[c.id];

    const safeKey = npc.key.replace(/'/g,"\\'");
    const hasTraining = (dataLoaded.npc_training && NPC_TRAINING[npc.key]?.length > 0)
                     || (dataLoaded.sources_recipes && NPC_RECIPES_MAP[npc.key]?.length > 0);
    const hasVendorData = isAll
      ? charList.some(c => playerLogData[c.charData?.Character]?.npcs[npc.key])
      : !!(singleCharName && playerLogData[singleCharName]?.npcs[npc.key]);
    const hasExpand = hasTraining || hasVendorData;
    const expanded = expandedFavorNpcs.has(npc.key);
    const toggleIcon = hasExpand ? `<span style="font-size:10px;color:var(--text-dim);margin-left:5px">${expanded ? '▲' : '▼'}</span>` : '';

    const detailRow = (hasExpand && expanded)
      ? `<tr><td colspan="2" style="padding:0 8px 10px 12px;background:var(--bg2);border-bottom:1px solid var(--border)">
          ${isAll ? buildFavorVendorPanelAllChars(npc.key, charList) : buildFavorVendorPanel(npc.key, singleCharName)}

      : '';

    const logOnlyBadge = npc.logOnly ? `<span style="font-size:9px;color:var(--text-dim);margin-left:5px;border:1px solid var(--border);border-radius:3px;padding:0 3px">vendor</span>` : '';

    return `<tr class="favor-row" style="${hasExpand ? 'cursor:pointer' : ''}"
      onclick="${hasExpand ? `toggleFavorNpc('${safeKey}')` : ''}"

        ${npc.area ? `<div class="favor-npc-area">${npc.area}</div>` : ''}

      ${favorCell}

  }).join('');

  _lastFavorRows = buildRows;

  // If shell already exists (user is typing in search), only update the body parts
  const existingTbodyWrap = document.getElementById('favorTbodyWrap');

          <tbody id="favorTbody">${rows}</tbody>

  }

  document.getElementById('appContent').innerHTML = `<div class="full-panel">
    <div class="search-wrap" style="margin-bottom:10px">
      <div class="search-input-wrap">

      : `<div id="favorTbodyWrap"><table class="favor-table">
