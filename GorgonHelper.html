            ${showAll ? charHeaders : '<th>Favor</th>'}
          </tr></thead>
          <tbody id="favorTbody">${rows}</tbody>
        </table></div>`}
  </div>`;
}

function favorTierFromExact(exactFavor) {
  // Walk tiers best→worst and return the first whose floor is <= exactFavor
  for (let i = FAVOR_TIER_ORDER.length - 1; i >= 0; i--) {
    const tier = FAVOR_TIER_ORDER[i];
    if (FAVOR_TIER_FLOORS[tier] != null && exactFavor >= FAVOR_TIER_FLOORS[tier]) return tier;
  }
  return 'Neutral';
}

function renderFavorCell(favor, exactFavor) {
  // If we have a live exact value, derive the true tier from it — the
  // character-export tier can be stale if favor was gained without re-exporting.
  const resolvedFavor = exactFavor != null ? favorTierFromExact(exactFavor) : favor;
  const fc = FAVOR_COLORS[resolvedFavor] || FAVOR_COLORS.Neutral;
  const displayName = resolvedFavor.replace(/([A-Z])/g,' $1').trim();
  let pct, subHtml = '';
  if (exactFavor != null && FAVOR_TIER_FLOORS[resolvedFavor] != null && FAVOR_TIER_CAPS[resolvedFavor] != null) {
    const floor = FAVOR_TIER_FLOORS[resolvedFavor];
    const cap = FAVOR_TIER_CAPS[resolvedFavor];
    const withinTier = exactFavor - floor;
    pct = Math.min(100, (withinTier / cap) * 100);
    subHtml = `<div style="font-size:10px;color:var(--text-dim);margin-top:2px">${Math.round(withinTier)} / ${cap}</div>`;
  } else {
    pct = FAVOR_PCT[resolvedFavor] ?? 0;
  }
  return `<div>
    <div class="favor-bar-row">
      <div class="favor-pbar-wrap"><div class="favor-pbar" style="width:${pct}%;background:${fc.bar}"></div></div>
      <span class="favor-level-badge" style="color:${fc.text};background:${fc.bg};border-color:${fc.border}">${displayName}</span>
    </div>${subHtml}
  </div>`;
}

// NPC preference tooltip
const DESIRE_COLORS = {
  Love:    { dot:'#e8c97a', text:'var(--gold-light)' },
  Like:    { dot:'#7ab880', text:'#7ab880' },
  Dislike: { dot:'#d08848', text:'var(--orange)' },
  Hate:    { dot:'#e07070', text:'#e07070' },
};

let npcPrefTimer = null;

function showNpcPrefTooltip(npcKey, e) {
  hideNpcPrefTooltip();
  npcPrefTimer = setTimeout(() => {
    const npc = NPCS[npcKey];
    const prefs = npc?.prefs || [];
    const desc = npc?.desc || '';
    if (!prefs.length && !desc) return;

    // Sort: Love first, then Like, then Dislike, then Hate
    const order = ['Love','Like','Dislike','Hate'];
    const sorted = [...prefs].sort((a,b) => {
      const ai = order.indexOf(a.desire), bi = order.indexOf(b.desire);
      if (ai !== bi) return ai - bi;
      return b.pref - a.pref; // higher score first within same desire
    });

    const rows = sorted.map(p => {
      const dc = DESIRE_COLORS[p.desire] || { dot:'var(--text-dim)', text:'var(--text-dim)' };
      const sign = p.pref > 0 ? '+' : '';
      return `<div class="npc-pref-row">
        <div class="npc-pref-dot" style="background:${dc.dot}"></div>
        <span class="npc-pref-name">${p.name}</span>
        <span class="npc-pref-score" style="color:${dc.text}">${sign}${p.pref}</span>
      </div>`;
    }).join('');

    const tip = document.createElement('div');
    tip.className = 'npc-pref-tooltip';
    tip.id = 'npcPrefTooltip';
    tip.innerHTML = `
      <div class="npc-pref-title">🎁 Gift Preferences</div>
      ${desc ? `<div class="npc-desc-line">${desc}</div>` : ''}
      ${rows || '<div style="font-size:11px;color:var(--text-dim)">No preferences listed</div>'}`;
    document.body.appendChild(tip);

    // Position near cursor, keep on screen
    const W = window.innerWidth, H = window.innerHeight;
    const tw = tip.offsetWidth || 260, th = tip.offsetHeight || 150;
    let x = e.clientX + 16, y = e.clientY + 8;
    if (x + tw > W - 8) x = e.clientX - tw - 16;
    if (y + th > H - 8) y = e.clientY - th - 8;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }, 300);
}

function hideNpcPrefTooltip() {
  clearTimeout(npcPrefTimer);
  document.getElementById('npcPrefTooltip')?.remove();
}

function getMapBaseWidth() {
  const sidebarW = 256 + 14 + 32; // panel + gap + padding
  return Math.max(400, window.innerWidth - sidebarW);
}
function setMapZoom(z, pivotX, pivotY) {
  const outer = document.querySelector('.map-outer');
  const newZoom = Math.max(MAP_ZOOM_MIN, Math.min(MAP_ZOOM_MAX, z));
  if (newZoom === mapZoom && outer) return;
  const ratio = newZoom / mapZoom;
  const sx = outer ? (outer.scrollLeft + (pivotX ?? outer.clientWidth/2))  * ratio - (pivotX ?? outer.clientWidth/2)  : 0;
  const sy = outer ? (outer.scrollTop  + (pivotY ?? outer.clientHeight/2)) * ratio - (pivotY ?? outer.clientHeight/2) : 0;
  mapZoom = newZoom;
  renderMapsTab();
  requestAnimationFrame(() => { const o = document.querySelector('.map-outer'); if (o) { o.scrollLeft = sx; o.scrollTop = sy; } });
}
function fitMapToWindow() {
  const availW = getMapBaseWidth();
  const availH = window.innerHeight - 220;
  const img = document.querySelector('.map-container img');
  const w = img?.naturalWidth || 1961, h = img?.naturalHeight || 2048;
  mapZoom = Math.min(availW / w, availH / h, 1.0);
  renderMapsTab();
}
function handleMapWheel(e) {
  e.preventDefault();
  if (_mapScrollPending) return;
  _mapScrollPending = true;
  requestAnimationFrame(() => {
    _mapScrollPending = false;
    const outer = document.querySelector('.map-outer');
    if (!outer) return;
    const rect = outer.getBoundingClientRect();
    const pivotX = e.clientX - rect.left, pivotY = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
    setMapZoom(mapZoom * factor, pivotX, pivotY);
  });
}
function setupMapScrollHandler() {
  const outer = document.querySelector('.map-outer');
  if (!outer || outer._wheelBound) return;
  outer._wheelBound = true;
  outer.addEventListener('wheel', handleMapWheel, {passive: false});
}

async function fetchMapOverrides() {
  let data = null;
  try {
    const r = await fetch('pg_map_overrides.json');
    if (r.ok) data = await r.json();
  } catch(e) {}
  // Fallback: read via File System Access API (needed when opened as file://)
  if (!data && folderHandle) {
    try {
      const fh = await folderHandle.getFileHandle('pg_map_overrides.json');
      data = JSON.parse(await (await fh.getFile()).text());
    } catch(e) {}
  }

function exportMapOverrides() {

  for (const [area, npcs] of Object.entries(fileMapOverrides.npcs)) {
    merged.npcs[area] = {...npcs};

  for (const [area, npcs] of Object.entries(mapNpcOverrides)) {

  for (const [area, lms] of Object.entries(fileMapOverrides.landmarks)) {

function worldToMapPct(x, z, cfg) {
  // swapXZ: world Z drives horizontal (left↔right), world X drives vertical (top↔bottom)
  const wx = cfg.swapXZ ? z : x;
  const wz = cfg.swapXZ ? x : z;
  let px = (wx - cfg.worldMinX) / (cfg.worldMaxX - cfg.worldMinX) * 100;
  let py = (1 - (wz - cfg.worldMinZ) / (cfg.worldMaxZ - cfg.worldMinZ)) * 100;
  if (cfg.rotate180) { px = 100 - px; py = 100 - py; }
  return { x: Math.max(-2, Math.min(102, px)), y: Math.max(-2, Math.min(102, py)) };
}

function getRecipeDisplayList() {
  const isAll = activeCharId === '__all__' || characters.length <= 1;
  const activeChars = isAll ? characters : characters.filter(c => c.id === activeCharId);
  const allRecipeKeys = new Set();
  for (const char of activeChars) Object.keys(char.charData.RecipeCompletions||{}).forEach(k=>allRecipeKeys.add(k));
  let pool = Object.entries(RECIPES);
  if (recipeSkillFilter) pool = pool.filter(([,r])=>r[1]===recipeSkillFilter);
  if (recipeSearchQ) {
    const q = recipeSearchQ.toLowerCase();
    pool = pool.filter(([,r]) => r[0].toLowerCase().includes(q) || (r[5]||'').toLowerCase().includes(q));
  }
  const known  = pool.filter(([k])=>allRecipeKeys.has(k));
  const locked = pool.filter(([k])=>!allRecipeKeys.has(k));
  let display = recipeShowLocked === 'all' ? pool
              : recipeShowLocked === 'locked' ? locked
              : known;
  if (recipeSkillSort) {
    const dir = recipeSkillSort === 'asc' ? 1 : -1;
    display = [...display].sort(([,a],[,b]) => {
      const bySkill = (a[1]||'').localeCompare(b[1]||'');
      return dir * (bySkill || (a[4]||0) - (b[4]||0));
    });
  }
  return { known, locked, display, allRecipeKeys };
}

function renderRecipesTab() {
  if (!dataLoaded.recipes) {
    document.getElementById('appContent').innerHTML = `<div class="full-panel"><div class="empty-state"><div class="icon">📖</div><h3>Recipe data not loaded</h3><p style="margin-top:8px;font-size:12px">Place pg_recipes.json in your watched folder, or sync from Settings</p></div></div>`;
    return;
  }

  const { known, locked, display, allRecipeKeys } = getRecipeDisplayList();
  const skills = [...new Set(Object.values(RECIPES).map(r=>r[1]))].filter(Boolean).sort();
  const skillOpts = skills.map(s=>`<option value="${s}" ${s===recipeSkillFilter?'selected':''}>${s}</option>`).join('');

  // If the shell is already rendered (same tab, user is just typing) — only update the body
  const existingShell = document.getElementById('recipeTableBody');
  if (existingShell) {
    updateRecipeBody(display, allRecipeKeys, known.length, locked.length);
    return;
  }

  // Full render (first load or tab switch)
  document.getElementById('appContent').innerHTML = `<div class="full-panel">
    <div class="recipe-controls">
      <div class="search-input-wrap" style="max-width:260px">
        <button class="search-clear ${recipeSearchQ?'visible':''}" id="recipeClearBtn" onclick="clearRecipeSearch()">✕</button>
        <input class="search-input" id="recipeSearchInput" style="padding-left:34px" placeholder="Search recipes…"
          value="${recipeSearchQ.replace(/"/g,'&quot;')}" oninput="onRecipeSearch(this.value)">
        <span class="search-icon">⌕</span>
      </div>
      <select class="recipe-skill-filter" id="recipeSkillSelect" onchange="onRecipeSkillFilter(this.value)">
        <option value="">All Skills</option>${skillOpts}
      </select>
      <div class="mode-toggle" id="recipeModToggle">
        <button class="mode-btn ${recipeShowLocked==='known'?'active':''}" id="recipeBtnKnown" onclick="setRecipeLocked('known')">Known (<span id="recipeKnownCount">${known.length}</span>)</button>
        <button class="mode-btn ${recipeShowLocked==='all'?'active':''}" id="recipeBtnAll" onclick="setRecipeLocked('all')">All (<span id="recipeAllCount">${known.length+locked.length}</span>)</button>
        <button class="mode-btn ${recipeShowLocked==='locked'?'active':''}" id="recipeBtnLocked" onclick="setRecipeLocked('locked')">Locked (<span id="recipeLockedCount">${locked.length}</span>)</button>
      </div>
    </div>
    <div id="recipeTableWrap">
      ${display.length===0
        ? `<div class="empty-state" id="recipeEmpty"><div class="icon">📖</div><h3>No recipes found</h3></div>`
        : `<table class="recipe-table">
            <thead><tr><th>Recipe</th><th style="cursor:pointer;user-select:none" onclick="cycleRecipeSkillSort()" id="recipeSkillTh">Skill ${recipeSkillSort==='asc'?'▲':recipeSkillSort==='desc'?'▼':'⇅'}</th>${activeCharId==='__all__'&&characters.length>1?'<th>Characters</th>':''}</tr></thead>
            <tbody id="recipeTableBody">${buildRecipeRows(display, allRecipeKeys)}</tbody>
          </table>`}
    </div>
  </div>`;
}

function updateRecipeBody(display, allRecipeKeys, knownCount, lockedCount, allCount) {
  // Update counts
  const kEl = document.getElementById('recipeKnownCount');
  const lEl = document.getElementById('recipeLockedCount');
  const aEl = document.getElementById('recipeAllCount');
  if (kEl) kEl.textContent = knownCount;
  if (lEl) lEl.textContent = lockedCount;
  if (aEl) aEl.textContent = allCount ?? (knownCount + lockedCount);
  // Update known/locked/all button active state
  document.getElementById('recipeBtnKnown')?.classList.toggle('active', recipeShowLocked==='known');
  document.getElementById('recipeBtnAll')?.classList.toggle('active', recipeShowLocked==='all');
  document.getElementById('recipeBtnLocked')?.classList.toggle('active', recipeShowLocked==='locked');
  // Update clear button visibility
  const clearBtn = document.getElementById('recipeClearBtn');
  if (clearBtn) clearBtn.classList.toggle('visible', !!recipeSearchQ);
  // Update table body (or swap empty state)
  const wrap = document.getElementById('recipeTableWrap');
  if (!wrap) return;
  if (display.length === 0) {
    wrap.innerHTML = `<div class="empty-state" id="recipeEmpty"><div class="icon">📖</div><h3>No recipes found</h3></div>`;
    return;
  }
  const thEl = document.getElementById('recipeSkillTh');
  if (thEl) thEl.textContent = `Skill ${recipeSkillSort==='asc'?'▲':recipeSkillSort==='desc'?'▼':'⇅'}`;
  const tbody = document.getElementById('recipeTableBody');
  if (tbody) {
    tbody.innerHTML = buildRecipeRows(display, allRecipeKeys);
  } else {
    // Table didn't exist before (was showing empty state), rebuild fully
    wrap.innerHTML = `<table class="recipe-table"><thead><tr><th>Recipe</th><th style="cursor:pointer;user-select:none" onclick="cycleRecipeSkillSort()" id="recipeSkillTh">Skill ${recipeSkillSort==='asc'?'▲':recipeSkillSort==='desc'?'▼':'⇅'}</th>${activeCharId==='__all__'&&characters.length>1?'<th>Characters</th>':''}</tr></thead><tbody id="recipeTableBody">${buildRecipeRows(display, allRecipeKeys)}</tbody></table>`;
  }
}

function FAVOR_COLOR(favor) {
  const map = {
    'Despised':'#c05050','Neutral':'var(--text-dim)','Tolerated':'#8a8070',
    'Comfortable':'#7aa0e8','Friends':'#7ab880','CloseFriends':'var(--gold)',
    'BestFriends':'#e8c97a','LikeFamily':'#a880d0','SoulMates':'#60b0b0'
  };
  return map[favor] || 'var(--text-dim)';
}

function setRecipeLocked(v) { recipeShowLocked = v; renderRecipesTab(); }
function onRecipeSearch(v) {
  recipeSearchQ = v;
  const { known, locked, display, allRecipeKeys } = getRecipeDisplayList();
  updateRecipeBody(display, allRecipeKeys, known.length, locked.length);
}
function clearRecipeSearch() { recipeSearchQ = ''; renderRecipesTab(); }
function onRecipeSkillFilter(v) { recipeSkillFilter = v; renderRecipesTab(); }
function cycleRecipeSkillSort() {
  recipeSkillSort = recipeSkillSort === null ? 'asc' : recipeSkillSort === 'asc' ? 'desc' : null;
  const { known, locked, display, allRecipeKeys } = getRecipeDisplayList();
  updateRecipeBody(display, allRecipeKeys, known.length, locked.length);
}
function cookingKwTag(r) {
  const kw = r[5];
  if (!kw) return '';
  const isMeal = kw === 'Meal';
  return `<span style="font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid ${isMeal?'#7a9e6a':'#c4a24a'};background:${isMeal?'rgba(122,158,106,.15)':'rgba(196,162,74,.15)'};color:${isMeal?'#8fbb7a':'#d4b45a'};font-family:sans-serif;letter-spacing:.03em;vertical-align:middle;margin-left:5px">${kw}</span>`;
}

// ═══════════════════════════════════════════════════════════
// STORAGE VAULTS TAB
// ═══════════════════════════════════════════════════════════
const FAVOR_ORDER = ['Despised','Neutral','Tolerated','Comfortable','Friends','CloseFriends','BestFriends','LikeFamily','SoulMates'];

function getCurrentSlots(vaultKey, charNPCs, vaultData) {
  if (!vaultData.levels) return vaultData.numSlots ?? null;
  const favor = charNPCs?.[vaultKey]?.FavorLevel;
  if (!favor) return 0;
  return vaultData.levels[favor] ?? 0;
}

function getNextUpgrade(vaultKey, charNPCs, vaultData) {
  if (!vaultData.levels) return null;
  const favor = charNPCs?.[vaultKey]?.FavorLevel;
  if (!favor) return null;
  const levels = vaultData.levels;
  const curSlots = levels[favor] ?? 0;
  const curIdx = FAVOR_ORDER.indexOf(favor);
  for (const f of FAVOR_ORDER.slice(curIdx + 1)) {
    if (f in levels && levels[f] > curSlots) return { favor: f, slots: levels[f] };
  }
  return null;
}

function renderVaultCard(vaultKey, vaultData, chars, showChar) {
  const npcInfo = NPCS[vaultKey];
  const displayName = npcInfo?.name || vaultData.name || vaultKey.replace('NPC_','').replace('*AccountStorage_','Account: ');
  const area = npcInfo?.area || vaultData.area || '';

  const hasLevels = !!vaultData.levels;

  // Per-character slot info
  const charRows = chars.map(char => {
    const charNPCs = char.charData.NPCs || {};
    const currentSlots = getCurrentSlots(vaultKey, charNPCs, vaultData);
    const next = hasLevels ? getNextUpgrade(vaultKey, charNPCs, vaultData) : null;
    const favor = hasLevels ? (charNPCs[vaultKey]?.FavorLevel || '—') : null;
    const maxSlots = hasLevels ? Math.max(...Object.values(vaultData.levels)) : (vaultData.numSlots ?? null);

    const slotDisplay = currentSlots != null ? currentSlots : '?';
    const pct = (maxSlots && currentSlots != null) ? Math.min(100, (currentSlots / maxSlots) * 100) : 0;

    // Favor progress bar
    let favorHtml = '';
    if (hasLevels && favor && favor !== '—') {
      const fi = FAVOR_ORDER.indexOf(favor);
      const favorPct = Math.max(0, Math.min(100, (fi / (FAVOR_ORDER.length - 1)) * 100));
      favorHtml = `<div class="vault-favor-row">
        <span class="favor-label" style="color:${FAVOR_COLOR(favor)};width:90px">${favor}</span>
        <div class="favor-bar-wrap"><div class="favor-bar" style="width:${favorPct}%"></div></div>
        ${next ? `<span class="favor-label" style="color:var(--gold)">→ ${next.slots} at ${next.favor}</span>` : `<span class="favor-label" style="color:var(--green)">max</span>`}
      </div>`;
    }

    // Level chips for NPC vaults
    let levelsHtml = '';
    if (hasLevels) {
      const chips = FAVOR_ORDER.filter(f => f in vaultData.levels).map(f => {
        const slots = vaultData.levels[f];
        const fi = FAVOR_ORDER.indexOf(favor);
        const fj = FAVOR_ORDER.indexOf(f);
        let chipCls = 'vault-level-chip';
        if (f === favor) chipCls += ' current';
        else if (fj < fi) chipCls += ' unlocked';
        else chipCls += ' locked';
        return `<span class="${chipCls}">${f}: ${slots}</span>`;
      }).join('');
      levelsHtml = `<div class="vault-levels-row">${chips}</div>`;
    }

    // Upgrade hint
    const upgradeHtml = next ? `<div class="vault-upgrade-hint">⬆ ${next.slots - (currentSlots||0)} more slots at ${next.favor}</div>` : '';

    return `<div style="margin-bottom:${chars.length>1?'10px':'0'}">
      ${showChar ? `<div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">${char.charData.Character}</div>` : ''}
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:${favorHtml?'6px':'0'}">
        <div><div style="font-family:'Cinzel',serif;font-size:22px;color:var(--gold-light)">${slotDisplay}</div><div style="font-size:9px;color:var(--text-dim)">SLOTS</div></div>
        ${favorHtml}
      </div>
      ${levelsHtml}
      ${upgradeHtml}
    </div>`;
  }).join('');

  const hasAnyUpgrade = chars.some(char => {
    const next = hasLevels ? getNextUpgrade(vaultKey, char.charData.NPCs||{}, vaultData) : null;
    return next !== null;
  });

  const safeVaultKey = vaultKey.replace(/'/g, "\\'");
  const hasPrefTooltip = !!(NPCS[vaultKey]?.prefs?.length || NPCS[vaultKey]?.desc);
  const prefAttrs = hasPrefTooltip
    ? `onmouseenter="showNpcPrefTooltip('${safeVaultKey}',event)" onmouseleave="hideNpcPrefTooltip()"`
    : '';

  return `<div class="vault-card${hasAnyUpgrade?' has-upgrade':''}" ${prefAttrs}>
    <div class="vault-card-header">
      <div>
        <div class="vault-card-name">${displayName}</div>
        ${area ? `<div class="vault-card-area">${area}</div>` : ''}
        ${npcInfo?.desc ? `<div style="font-size:11px;color:var(--text-dim);margin-top:2px;font-style:italic">${npcInfo.desc}</div>` : ''}
      </div>
    </div>
    ${charRows}
  </div>`;
}

// Helper: get human-readable area for a vault key
function getVaultArea(vaultKey, vaultData) {
  // NPC vaults: prefer NPCS friendly name
  const npcArea = NPCS[vaultKey]?.area;
  if (npcArea) return npcArea;
  // Fall back to vault's area field, strip the "Area" prefix
  const raw = vaultData.area || '';
  return raw.replace(/^Area/, '').replace(/([A-Z])/g, ' $1').trim() || 'Unknown';
}

// ─── Favor tier data ─────────────────────────────────────────────────────────
// Points needed within a tier to advance to the NEXT tier.
// Tiers listed worst→best; SoulMates is the cap (null = no further tier).
const FAVOR_TIER_ORDER = [
  'Despised', 'Hatred', 'Disliked', 'Tolerated',
  'Neutral', 'Comfortable', 'Friends', 'CloseFriends',
  'BestFriends', 'LikeFamily', 'SoulMates',
];
const FAVOR_TIER_CAPS = {
  Despised:    1800,   // → Hated
  Hatred:       300,   // → Disliked
  Disliked:     200,   // → Tolerated
  Tolerated:    100,   // → Neutral
  Neutral:      100,   // → Comfortable
  Comfortable:  200,   // → Friends
  Friends:      300,   // → Close Friends
  CloseFriends: 600,   // → Best Friends
  BestFriends:  800,   // → Like Family
  LikeFamily:  1000,   // → Soul Mates
  SoulMates:   null,   // cap — no further tier
};
// Absolute favor value at the start of each tier (from game table)
const FAVOR_TIER_FLOORS = {
  Despised: -99999, Hatred: -600, Disliked: -300, Tolerated: -100,
  Neutral: 0, Comfortable: 100, Friends: 300, CloseFriends: 600,
  BestFriends: 1200, LikeFamily: 2000, SoulMates: 3000,
};

/**
 * Total favor still needed from (tierKey, currentInTier) to reach Soul Mates.
 * Returns null if the tier is unknown.
 */
function _fcFavorToSoulMates(tierKey, currentInTier) {
  if (tierKey === 'SoulMates') return 0;
  const idx = FAVOR_TIER_ORDER.indexOf(tierKey);
  if (idx < 0) return null;
  const cap = FAVOR_TIER_CAPS[tierKey];
  if (cap == null) return null;
  let total = Math.max(0, cap - currentInTier);
  for (let i = idx + 1; i < FAVOR_TIER_ORDER.length - 1; i++) {
    total += FAVOR_TIER_CAPS[FAVOR_TIER_ORDER[i]] ?? 0;
  }
  return total;
}

/**
 * Build a multi-tier breakdown string for display.
 */
function _fcTierBreakdown(tierKey, currentInTier) {
  const idx = FAVOR_TIER_ORDER.indexOf(tierKey);
  if (idx < 0) return '';
  const parts = [];
  const startRemaining = Math.max(0, FAVOR_TIER_CAPS[tierKey] - currentInTier);
  if (startRemaining > 0)
    parts.push(`${FAVOR_LABELS[tierKey]||tierKey}: ${startRemaining}`);
  for (let i = idx + 1; i < FAVOR_TIER_ORDER.length - 1; i++) {
    const t = FAVOR_TIER_ORDER[i];
    parts.push(`${FAVOR_LABELS[t]||t}: ${FAVOR_TIER_CAPS[t]}`);
  }
  return parts.join(' + ');
}

// ─── Favor Calculator ─────────────────────────────────────────────────────────
function renderFavorCalcTab() {
  // Auto-select first character if none chosen or no longer valid
  if (!favorCalcCharId || !characters.find(c => c.id === favorCalcCharId)) {
    favorCalcCharId = characters[0]?.id || '';
  }
  const selChar = characters.find(c => c.id === favorCalcCharId);

  // Resolve current tier from char data
  let currentTierKey = null;
  if (selChar && favorCalcNpcKey) {
    currentTierKey = selChar.charData?.NPCs?.[favorCalcNpcKey]?.FavorLevel || null;
  }
  const tierLabel = currentTierKey ? (FAVOR_LABELS[currentTierKey] || currentTierKey) : null;
  const tierKnown = currentTierKey ? FAVOR_TIER_ORDER.includes(currentTierKey) : false;

  // Resolved item
  const selItem = favorCalcItemId ? ITEMS[favorCalcItemId] : null;
  const selItemName = selItem ? selItem[0] : '';
  const selItemIcon = favorCalcItemId ? getItemIconUrl(favorCalcItemId) : null;

  // NPC name for display
  const selNpc = favorCalcNpcKey ? NPCS[favorCalcNpcKey] : null;
  const selNpcName = selNpc ? selNpc.name : '';

  // ── Character <select> ──────────────────────────────────────────────────────
  const charOpts = characters.map(c => {
    const name = c.charData?.Character || c.id;
    const server = c.charData?.ServerName ? ` (${c.charData.ServerName})` : '';
    return `<option value="${c.id}" ${c.id === favorCalcCharId ? 'selected' : ''}>${name}${server}</option>`;
  }).join('');

  // ── NPC dropdown list ───────────────────────────────────────────────────────
  const npcDropdown = favorCalcNpcOpen
    ? `<div class="favor-calc-dd-list" id="fcNpcList">${_fcBuildNpcListHtml()}</div>`
    : '';

  // ── Item dropdown list ──────────────────────────────────────────────────────
  const itemDropdown = favorCalcItemOpen
    ? `<div class="favor-calc-dd-list" id="fcItemList">${_fcBuildItemListHtml()}</div>`
    : '';

  // ── Tier info ───────────────────────────────────────────────────────────────
  let tierInfoHtml = '';
  if (tierLabel) {
    const capForTier = FAVOR_TIER_CAPS[currentTierKey];
    const tierCapTxt = tierKnown
      ? (currentTierKey === 'SoulMates'
          ? 'already at max'
          : `${capForTier} pts to next tier`)
      : 'tier not in favor table';
    // Inline gift preferences
    const npcPrefs = NPCS[favorCalcNpcKey]?.prefs || [];
    const prefOrder = ['Love','Like','Dislike','Hate'];
    const sortedPrefs = [...npcPrefs].sort((a,b) => {
      const ai = prefOrder.indexOf(a.desire), bi = prefOrder.indexOf(b.desire);
      if (ai !== bi) return ai - bi;
      return b.pref - a.pref;
    });
    const prefRowsHtml = sortedPrefs.map(p => {
      const dc = DESIRE_COLORS[p.desire] || { dot:'var(--text-dim)', text:'var(--text-dim)' };
      const sign = p.pref > 0 ? '+' : '';
      return `<div class="npc-pref-row">
        <div class="npc-pref-dot" style="background:${dc.dot}"></div>
        <span class="npc-pref-name">${p.name}</span>
        <span class="npc-pref-score" style="color:${dc.text}">${sign}${p.pref}</span>
      </div>`;
    }).join('');
    tierInfoHtml = `<div class="favor-calc-tier-info">
      Current tier: <strong style="color:var(--text)">${tierLabel}</strong>
      &nbsp;·&nbsp; ${tierCapTxt}
      ${prefRowsHtml ? `<div class="favor-calc-prefs">${prefRowsHtml}</div>` : ''}
    </div>`;
  }

  const resultHtml = _fcBuildResultHtml();

  // NPC input display: show name if selected, search text otherwise
  const npcInputVal = favorCalcNpcOpen
    ? favorCalcNpcSearch
    : (selNpcName || favorCalcNpcSearch);
  // Item input display
  const itemCoinValue = !favorCalcItemOpen && selItemName ? _fcGetItemCoinValue(favorCalcItemId) : 0;
  const itemCoinSuffix = itemCoinValue ? `  🪙 ${itemCoinValue.toLocaleString()} ea` : '';
  const itemMatchKw = (!favorCalcItemOpen && selItemName && favorCalcNpcKey) ? _fcMatchItemToNpcPref(favorCalcItemId, favorCalcNpcKey) : null;
  const itemKwSuffix = (itemMatchKw?.quality != null) ? `  Valued as 🪙 ${itemMatchKw.quality}` : '';
  const itemInputVal = favorCalcItemOpen
    ? favorCalcItemSearch
    : (selItemName ? selItemName + itemCoinSuffix + itemKwSuffix : favorCalcItemSearch);
  const itemInputPrefix = (!favorCalcItemOpen && selItemIcon)
    ? `<img class="item-icon" src="${selItemIcon}" alt="" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);pointer-events:none">`
    : '';
  const itemPaddingLeft = (!favorCalcItemOpen && selItemIcon) ? '30px' : '8px';

  document.getElementById('appContent').innerHTML = `<div class="full-panel">
    <div class="favor-calc-panel">
      <div class="favor-calc-title">Favor Calculator</div>

      <div class="favor-calc-row">
        <div class="favor-calc-label">Character</div>
        <select class="favor-calc-num-input" style="width:100%;flex:1"
          onchange="_fcSetChar(this.value)">${charOpts}</select>
      </div>

      <div class="favor-calc-row">
        <div class="favor-calc-label">NPC</div>
        <div class="favor-calc-dd-wrap" id="fcNpcWrap">
          <input class="favor-calc-dd-input" id="fcNpcInput" type="text"
            placeholder="Search NPCs…"
            value="${(npcInputVal).replace(/"/g,'&quot;')}"
            onfocus="_fcNpcFocus()"
            oninput="_fcNpcSearch(this.value)"
            onblur="_fcNpcBlur()">
          <span class="favor-calc-dd-arrow">▾</span>
          ${npcDropdown}
        </div>
      </div>

      ${tierInfoHtml}

      <div class="favor-calc-row">
        <div class="favor-calc-label">Item</div>
        <div class="favor-calc-dd-wrap" id="fcItemWrap" style="position:relative">
          ${itemInputPrefix}
          <input class="favor-calc-dd-input" id="fcItemInput" type="text"
            placeholder="Search items…"
            value="${itemInputVal.replace(/"/g,'&quot;')}"
            style="padding-left:${itemPaddingLeft}"
            onfocus="_fcItemFocus()"
            oninput="_fcItemSearch(this.value)"
            onblur="_fcItemBlur()">
          <span class="favor-calc-dd-arrow">▾</span>
          ${itemDropdown}
        </div>
      </div>

      <div class="favor-calc-row">
        <div class="favor-calc-label">Favor / item</div>
        <input class="favor-calc-num-input" type="number" min="1" step="1"
          placeholder="e.g. 25"
          value="${favorCalcItemFavor.replace(/"/g,'&quot;')}"
          oninput="_fcSetItemFavor(this.value)">
        <span style="font-size:12px;color:var(--text-dim)">favor points per gift</span>
      </div>

      <div class="favor-calc-row">
        <div class="favor-calc-label">Current favor</div>
        <input class="favor-calc-num-input" type="number" min="0" step="1"
          placeholder="e.g. 450"
          value="${favorCalcCurrentFavor.replace(/"/g,'&quot;')}"
          oninput="_fcSetCurrentFavor(this.value)">
        <span style="font-size:12px;color:var(--text-dim)">points within current tier</span>
      </div>

      <hr class="favor-calc-divider">
      <div id="fcResult">${resultHtml}</div>
    </div>
  </div>`;

  _fcEnsureClickOutside();
}

// ── Favor Calculator helpers ──────────────────────────────────────────────────
function _fcSetChar(id)        { favorCalcCharId = id; favorCalcNpcKey = ''; renderFavorCalcTab(); }
function _fcSetItemFavor(v) {
  favorCalcItemFavor = v;
  const el = document.getElementById('fcResult');
  if (el) {
    el.innerHTML = _fcBuildResultHtml();
    _fcUpdateItemInputDisplay();
  } else renderFavorCalcTab();
}
function _fcGetItemCoinValue(itemId) {
  // Prefer ITEMS data (index 3) which covers all items; fall back to inventory value
  const itemData = ITEMS[String(itemId)];
  if (itemData?.[3]) return itemData[3];
  const idStr = String(itemId);
  for (const char of characters) {
    const entry = char.items?.find(i => String(i.typeId) === idStr);
    if (entry?.value) return entry.value;
  }
  return 0;
}
function _fcMatchItemToNpcPref(itemId, npcKey) {
  // Returns {keyword, quality, pref, desire, favorPerGift} or null
  const itemData = ITEMS[String(itemId)];
  const keywords = itemData?.[4]; // array like ["VegetarianDish=84", "Food", ...]
  if (!keywords?.length) return null;
  const npcPrefs = NPCS[npcKey]?.prefs || [];
  let best = null;
  for (const kw of keywords) {
    const eqIdx = kw.indexOf('=');
    const kwName = eqIdx >= 0 ? kw.slice(0, eqIdx) : kw;
    const quality = eqIdx >= 0 ? parseInt(kw.slice(eqIdx + 1)) : null;
    const npcPref = npcPrefs.find(p => p.keywords?.includes(kwName));
    if (!npcPref) continue;
    const favorPerGift = quality != null ? npcPref.pref * quality : null;
    if (!best || (favorPerGift != null && (best.favorPerGift == null || favorPerGift > best.favorPerGift))) {
      best = { keyword: kw, kwName, quality, pref: npcPref.pref, desire: npcPref.desire, favorPerGift };
    }
  }
  return best;
}
function _fcUpdateItemInputDisplay() {
  if (favorCalcItemOpen || !favorCalcItemId) return;
  const selItem = ITEMS[favorCalcItemId];
  const selItemName = selItem?.[0] || '';
  if (!selItemName) return;
  const coinVal = _fcGetItemCoinValue(favorCalcItemId);
  const coinSuffix = coinVal ? `  🪙 ${coinVal.toLocaleString()} ea` : '';
  const matchKw = favorCalcNpcKey ? _fcMatchItemToNpcPref(favorCalcItemId, favorCalcNpcKey) : null;
  const kwSuffix = (matchKw?.quality != null) ? `  Valued as 🪙 ${matchKw.quality}` : '';
  const input = document.getElementById('fcItemInput');
  if (input) input.value = selItemName + coinSuffix + kwSuffix;
}
function _fcSetCurrentFavor(v) { favorCalcCurrentFavor = v; const el = document.getElementById('fcResult'); if (el) el.innerHTML = _fcBuildResultHtml(); else renderFavorCalcTab(); }

function _fcBuildResultHtml() {
  const selChar = characters.find(c => c.id === favorCalcCharId);
  const currentTierKey = (selChar && favorCalcNpcKey)
    ? (selChar.charData?.NPCs?.[favorCalcNpcKey]?.FavorLevel || null) : null;
  const tierKnown = currentTierKey ? FAVOR_TIER_ORDER.includes(currentTierKey) : false;
  const tierLabel = currentTierKey ? (FAVOR_LABELS[currentTierKey] || currentTierKey) : null;
  const curFavor = parseFloat(favorCalcCurrentFavor);
  const perItem  = parseFloat(favorCalcItemFavor);
  const remaining = (!isNaN(curFavor) && currentTierKey && tierKnown)
    ? _fcFavorToSoulMates(currentTierKey, curFavor) : null;
  if (currentTierKey === 'SoulMates') {
    const calcExtra = (!isNaN(perItem) && perItem > 0)
      ? `<div class="favor-calc-result-detail" style="margin-top:6px">0 items needed · already at maximum favor</div>` : '';
    return `<div class="favor-calc-result done">
      <span class="favor-calc-result-num">✓ Soul Mates</span>
      Already at maximum favor with this NPC!${calcExtra}</div>`;
  }
  if (remaining !== null && !isNaN(perItem) && perItem > 0) {
    if (remaining <= 0) return `<div class="favor-calc-result done">
      <span class="favor-calc-result-num">✓ Soul Mates reached!</span>
      You already have enough favor.</div>`;
    const needed = Math.ceil(remaining / perItem);
    const breakdown = _fcTierBreakdown(currentTierKey, curFavor);
    const breakdownHtml = breakdown
      ? `<div class="favor-calc-result-detail" style="margin-top:6px">${breakdown} = ${remaining.toLocaleString()} total</div>` : '';
    return `<div class="favor-calc-result">
      <span class="favor-calc-result-num">${needed.toLocaleString()} items</span>
      ${remaining.toLocaleString()} favor needed to reach Soul Mates
      ${breakdownHtml}
      <div class="favor-calc-result-detail">${perItem} favor/item × ${needed.toLocaleString()} = ${(needed * perItem).toLocaleString()} favor</div>
    </div>`;
  }
  if (!isNaN(curFavor) && !isNaN(perItem) && perItem > 0 && currentTierKey && !tierKnown) {
    return `<div class="favor-calc-result empty">Tier "<strong>${tierLabel}</strong>" is not in the favor table — cannot calculate automatically.</div>`;
  }
  return `<div class="favor-calc-result empty">Select a character, NPC, and item, then fill in the favor values above.</div>`;
}

function _fcBuildNpcListHtml() {
  const selChar = characters.find(c => c.id === favorCalcCharId);
  const npcQ = favorCalcNpcSearch.toLowerCase();
  const npcsByArea = {};
  for (const [key, npc] of Object.entries(NPCS)) {
    if (!npc.name) continue;
    if (npcQ && !npc.name.toLowerCase().includes(npcQ) && !(npc.area||'').toLowerCase().includes(npcQ)) continue;
    const area = npc.area || 'Unknown';
    if (!npcsByArea[area]) npcsByArea[area] = [];
    npcsByArea[area].push({ key, npc });
  }
  const sortedAreas = Object.keys(npcsByArea).sort();
  let html = '';
  for (const area of sortedAreas) {
    html += `<div class="favor-calc-dd-area-hdr">${area}</div>`;
    const entries = npcsByArea[area].sort((a, b) => {
      const aHas = selChar?.charData?.NPCs?.[a.key] ? 1 : 0;
      const bHas = selChar?.charData?.NPCs?.[b.key] ? 1 : 0;
      if (bHas !== aHas) return bHas - aHas;
      return a.npc.name.localeCompare(b.npc.name);
    });
    for (const { key, npc } of entries) {
      const npcData = selChar?.charData?.NPCs?.[key];
      const hasData = npcData ? ' has-data' : '';
      const isSel = key === favorCalcNpcKey ? ' selected' : '';
      const smCheck = npcData?.FavorLevel === 'SoulMates' ? '<span style="color:#7ab880;margin-right:4px">✓</span>' : '';
      html += `<div class="favor-calc-dd-item${hasData}${isSel}" onmousedown="event.preventDefault();_fcSelectNpc('${key.replace(/'/g,"\\'")}')">
        ${smCheck}${npc.name}</div>`;
    }
  }
  return html || '<div class="favor-calc-dd-item" style="color:var(--text-dim)">No NPCs found</div>';
}

function _fcBuildItemListHtml() {
  const itemQ = favorCalcItemSearch.toLowerCase();
  if (itemQ.length < 1) return '<div class="favor-calc-dd-item" style="color:var(--text-dim)">Type to search items…</div>';
  const matches = [];
  for (const [id, v] of Object.entries(ITEMS)) {
    if (!Array.isArray(v) || !v[0]) continue;
    if (!v[0].toLowerCase().includes(itemQ)) continue;
    matches.push({ id, name: v[0] });
  }
  matches.sort((a, b) => a.name.localeCompare(b.name));
  let html = '';
  for (const { id, name } of matches.slice(0, 120)) {
    const iconUrl = getItemIconUrl(id);
    const iconHtml = iconUrl ? `<img class="item-icon" src="${iconUrl}" alt="">` : '';
    const isSel = id === favorCalcItemId ? ' selected' : '';
    html += `<div class="favor-calc-dd-item${isSel}" onmousedown="event.preventDefault();_fcSelectItem('${id}','${name.replace(/'/g,"\\'")}')">
      ${iconHtml}${name}</div>`;
  }
  return html || '<div class="favor-calc-dd-item" style="color:var(--text-dim)">No items found</div>';
}

function setVaultAreaFilter(area) {
  vaultAreaFilter = (vaultAreaFilter === area) ? '' : area;
  renderVaultsTab();
}

function renderVaultsTab() {
  const showAll = activeCharId === '__all__';
  const chars = showAll ? characters : characters.filter(c => c.id === activeCharId);
  if (chars.length === 0) {
    document.getElementById('appContent').innerHTML = '<div class="full-panel"><div class="empty-state"><div class="icon">🗄</div><h3>No character loaded</h3></div></div>';
    return;
  }

  if (!dataLoaded.vaults) {
    document.getElementById('appContent').innerHTML = `<div class="full-panel"><div class="empty-state"><div class="icon">🗄</div><h3>Vault data not loaded</h3><p style="font-size:12px;margin-top:8px">Place pg_storagevaults.json in your watched folder, or sync from Settings</p></div></div>`;
    return;
  }

  // Find all vault keys relevant to selected chars
  const charVaultKeys = new Set();
  for (const char of chars) {
    for (const k of Object.keys(char.charData.NPCs || {})) { if (VAULTS[k]) charVaultKeys.add(k); }
    for (const item of char.items) { for (const v of Object.keys(item.vaults)) { if (VAULTS[v]) charVaultKeys.add(v); } }
  }

  // Separate NPC (have Levels) from fixed
  const npcVaults = [];
  const fixedVaults = [];
  for (const k of [...charVaultKeys].sort()) {
    const vd = VAULTS[k]; if (!vd) continue;
    if (vd.levels) npcVaults.push([k, vd]);
    else fixedVaults.push([k, vd]);
  }

  // Also include NPC vaults where char has favor data even if not in inventory
  const knownNpcKeys = new Set(npcVaults.map(([k])=>k));
  const potentialNpcVaults = Object.entries(VAULTS)
    .filter(([k,v]) => v.levels && !knownNpcKeys.has(k) && chars.some(c => c.charData.NPCs?.[k]));
  const allNpcToShow = [...npcVaults, ...potentialNpcVaults];

  // ── Build area list from all vaults we'll show ──
  const areaSet = new Map(); // area -> count
  for (const [k, vd] of allNpcToShow) {
    const area = getVaultArea(k, vd);
    areaSet.set(area, (areaSet.get(area)||0) + 1);
  }
  for (const [k, vd] of fixedVaults) {
    const area = getVaultArea(k, vd);
    areaSet.set(area, (areaSet.get(area)||0) + 1);
  }
  const sortedAreas = [...areaSet.entries()].sort((a,b) => a[0].localeCompare(b[0]));

  // ── Apply area filter ──
  const filteredNpc   = vaultAreaFilter ? allNpcToShow.filter(([k,vd]) => getVaultArea(k,vd) === vaultAreaFilter) : allNpcToShow;
  const filteredFixed = vaultAreaFilter ? fixedVaults.filter(([k,vd])  => getVaultArea(k,vd) === vaultAreaFilter) : fixedVaults;

  // ── Area filter chips ──
  const areaChips = sortedAreas.map(([area, count]) => {
    const active = vaultAreaFilter === area;
    return `<span class="filter-chip ${active?'active':''}" onclick="setVaultAreaFilter('${area.replace(/'/g,"\\'")}')">
      ${area} <span style="opacity:.6;font-size:10px">${count}</span>
    </span>`;
  }).join('');

  let html = `<div class="full-panel">
    <div class="filter-row" style="margin-bottom:14px">
      <span class="filter-chip ${!vaultAreaFilter?'active':''}" onclick="setVaultAreaFilter('')">All Locations</span>
      <span class="filter-divider"></span>
      ${areaChips}
    </div>`;

  // NPC Storage section
  if (filteredNpc.length > 0) {
    const upgradeCount = filteredNpc.filter(([k,vd]) => chars.some(char => getNextUpgrade(k, char.charData.NPCs||{}, vd))).length;
    html += `<div class="vault-section-title">NPC Storage (${filteredNpc.length}${upgradeCount?` · <span style="color:var(--gold)">⬆ ${upgradeCount} upgradeable</span>`:''}) </div>`;
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px">';
    for (const [k, vd] of filteredNpc) {
      const relevantChars = chars.filter(char => char.charData.NPCs?.[k]);
      if (relevantChars.length === 0 && !showAll) continue;
      html += renderVaultCard(k, vd, relevantChars.length > 0 ? relevantChars : chars, showAll && chars.length > 1);
    }
    html += '</div>';
  }

  // Fixed vaults
  if (filteredFixed.length > 0) {
    html += `<div class="vault-section-title">Fixed Storage (${filteredFixed.length})</div>`;
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">';
    for (const [k, vd] of filteredFixed) {
      const slots = vd.numSlots;
      const displayName = vd.name || k;
      const area = getVaultArea(k, vd);
      html += `<div class="vault-card">
        <div class="vault-card-header">
          <div>
            <div class="vault-card-name">${displayName}</div>
            <div class="vault-card-area">${area}</div>
          </div>
          <div style="text-align:right">
            <div class="vault-card-slots">${slots ?? '?'}</div>
            <div class="vault-card-slots-label">SLOTS</div>
          </div>
        </div>
      </div>`;
    }
    html += '</div>';
  }

  if (filteredNpc.length === 0 && filteredFixed.length === 0) {
    html += '<div class="empty-state"><div class="icon">🗄</div><h3>No vaults in this location</h3></div>';
  }

  html += '</div>';
  document.getElementById('appContent').innerHTML = html;
}

function renderQuestsTab() {
  const showAll = activeCharId === '__all__';
  const chars = showAll ? characters : characters.filter(c => c.id === activeCharId);

  if (chars.length === 0) {
    document.getElementById('appContent').innerHTML = '<div class="full-panel"><div class="empty-state"><div class="icon">📜</div><h3>No character loaded</h3></div></div>';
    return;
  }

  if (!dataLoaded.quests) {
    document.getElementById('appContent').innerHTML = `<div class="full-panel"><div class="empty-state"><div class="icon">📜</div><h3>Quest data not loaded</h3><p style="font-size:12px;margin-top:8px">Place pg_quests.json in your watched folder, or sync from Settings</p></div></div>`;
    return;
  }

  // Collect all active quests across visible chars
  const questEntries = []; // {internalName, quest, chars:[charObj], hasItems}
  const seen = new Map(); // internalName -> entry index

  for (const char of chars) {
    for (const qName of (char.charData.ActiveQuests || [])) {
      const quest = QUESTS[qName];
      if (!quest) continue;
      if (seen.has(qName)) {
        questEntries[seen.get(qName)].chars.push(char);
      } else {
        const hasItems = quest.objs.some(o => o.tid);
        seen.set(qName, questEntries.length);
        questEntries.push({ internalName: qName, quest, chars: [char], hasItems });
      }
    }
  }

  // Collect all locations for filter chips
  const locSet = new Map();
  for (const { quest } of questEntries) {
    const loc = quest.loc || 'Unknown';
    locSet.set(loc, (locSet.get(loc) || 0) + 1);
  }
  const sortedLocs = [...locSet.entries()].sort((a, b) => a[0].localeCompare(b[0]));

  // Apply filters
  const q = questSearchQ.toLowerCase();
  let filtered = questEntries;
  if (questLocationFilter) filtered = filtered.filter(e => (e.quest.loc || 'Unknown') === questLocationFilter);
  if (q) filtered = filtered.filter(e => e.quest.name.toLowerCase().includes(q) || (e.quest.npcName||'').toLowerCase().includes(q));

  // Sort: quests with items first, then alphabetical
  filtered.sort((a, b) => {
    if (a.hasItems !== b.hasItems) return a.hasItems ? -1 : 1;
    return a.quest.name.localeCompare(b.quest.name);
  });

  // Location filter chips
  const locChips = sortedLocs.map(([loc, count]) => {
    const active = questLocationFilter === loc;
    return `<span class="filter-chip ${active?'active':''}" onclick="setQuestLocationFilter('${loc.replace(/'/g,"\\'")}')">
      ${loc} <span style="opacity:.6;font-size:10px">${count}</span>
    </span>`;
  }).join('');

  // Render quest cards
  const cards = filtered.map(({ internalName, quest, chars: qChars }) => {
    const npcKey = quest.npc || '';
    const npcName = quest.npcName || (npcKey ? npcKey.replace('NPC_','').replace(/_/g,' ') : '');
    const npcInfo = NPCS[npcKey];
    const npcArea = npcInfo?.area || quest.loc || '';

    // NPC icon/name with pref tooltip
    const safeNpcKey = npcKey.replace(/'/g,"\\'");
    const hasPrefTooltip = !!(npcInfo?.prefs?.length || npcInfo?.desc);
    const prefAttrs = hasPrefTooltip
      ? `onmouseenter="showNpcPrefTooltip('${safeNpcKey}',event)" onmouseleave="hideNpcPrefTooltip()"`
      : '';

    // Character tags (if multiple chars have this quest)
    const charTags = showAll && qChars.length > 0
      ? qChars.map(c => `<span class="wo-char-tag">${c.charData.Character}</span>`).join(' ')
      : '';

    // Objective progress rows
    const objRows = quest.objs.map(obj => {
      if (!obj.tid) {
        // Non-item objective — just show description
        const icon = obj.t === 'Kill' ? '⚔' : obj.t === 'UseRecipe' ? '🔨' : obj.t === 'Harvest' ? '🌿' : obj.t === 'Collect' ? '📦' : '•';
        return `<div class="quest-obj-row">
          <span class="quest-obj-icon">${icon}</span>
          <span class="quest-obj-desc">${obj.d || obj.t}</span>
          <span class="quest-obj-need">${obj.n > 1 ? `×${obj.n}` : ''}</span>
        </div>`;
      }

      // Item objective — show progress bar
      const need = obj.n;
      const idata = ITEMS[String(obj.tid)];
      const iName = idata ? idata[0] : obj.d || `#${obj.tid}`;
      const iconId = ITEMS_ICONS[String(obj.tid)];
      const iconUrl = iconId ? getIconUrl(iconId) : null;
      const iconHtml = iconUrl ? `<img class="item-icon" src="${iconUrl}" alt="" style="width:14px;height:14px;margin-right:4px;vertical-align:middle;flex-shrink:0">` : '';

      // Count from the relevant chars (single or all)
      const have = showAll
        ? getInventoryQtyAllChars(obj.tid)
        : getInventoryQtyFast(obj.tid, getCharItemMap(qChars[0]));
      const pct = Math.min(100, (have / need) * 100);
      const barCls = have >= need ? 'done' : have > 0 ? 'partial' : 'none';

      // Check if item is craftable — i.e. some recipe produces it as a result
      const isCraftable = dataLoaded.recipes && CRAFTABLE_ITEM_IDS.has(String(obj.tid));
      const safeN = iName.replace(/'/g,"\\'");
      const nameHtml = isCraftable
        ? `<span class="quest-obj-desc quest-item-link" style="flex:1" title="Click to view recipe" onclick="goToRecipe('${safeN}')">${iName} 🔗</span>`
        : `<span class="quest-obj-desc" style="flex:1">${iName}</span>`;

      // Vault storage info — skip if craftable and have none
      let vaultHtml = '';
      if (have > 0 && !(isCraftable && have === 0)) {
        const vaultChars = showAll ? characters : qChars;
        const vaultsMap = getQuestItemVaults(obj.tid, vaultChars);
        if (vaultsMap) {
          const tags = Object.entries(vaultsMap)
            .map(([v, q]) => `<span style="display:inline-flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:10px;color:var(--text-dim);white-space:nowrap">${v}<span style="color:var(--gold-dim)">×${q}</span></span>`)
            .join('');
          vaultHtml = `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${tags}</div>`;
        }
      }

      return `<div class="quest-obj-row">
        <div class="quest-obj-bar-wrap">
          <div style="display:flex;align-items:center;margin-bottom:3px">
            ${iconHtml}${nameHtml}
            <span class="quest-obj-qty ${have >= need ? 'have' : have > 0 ? 'partial' : 'lack'}">${have}/${need}</span>
          </div>
          <div class="wo-bar-wrap" style="height:4px">
            <div class="wo-bar ${barCls}" style="width:${pct}%"></div>
          </div>
          ${vaultHtml}
        </div>
      </div>`;
    }).join('');

    const hasAnyProgress = quest.objs.some(o => o.tid);

    return `<div class="quest-card">
      <div class="quest-card-header">
        <div class="quest-card-title">
          <span class="quest-name">${quest.name}</span>
          ${charTags}
        </div>
        <div class="quest-meta" ${prefAttrs} style="${hasPrefTooltip?'cursor:default':''}">
          ${npcName ? `<span class="quest-npc">${npcName}</span>` : ''}
          ${npcArea ? `<span class="quest-area">${npcArea}</span>` : ''}
        </div>
      </div>
      ${objRows ? `<div class="quest-objectives">${objRows}</div>` : ''}
    </div>`;

const CDN_ROOT = 'https://cdn.projectgorgon.com/';
let _cdnVersion = null; // auto-detected from redirect; fallback set below
async function getCDNVersion() {
  if (_cdnVersion) return _cdnVersion;
  try {
    const res = await fetch(CDN_ROOT);
    const m = res.url.match(/\/(v\d+)\//);
    if (m) { _cdnVersion = m[1]; return _cdnVersion; }
  } catch(e) {}
  _cdnVersion = 'v466'; // fallback if detection fails
  return _cdnVersion;
}

// ── Icon system ──
let iconsFolderHandle = null;       // FileSystemDirectoryHandle for the icons subfolder
let iconCache = new Map();          // iconId (number) -> objectURL string
let iconsDownloading = false;

async function saveIconsFolderHandle(h) { try { await dbPut('folder_handle','icons_folder',h); } catch(e){} }
async function loadIconsFolderHandle() { return dbGet('folder_handle','icons_folder'); }

async function tryRestoreIconsFolder() {
  const h = await loadIconsFolderHandle();
  if (!h) return;
  try {
    const perm = await h.queryPermission({ mode:'readwrite' });
    if (perm === 'granted') { iconsFolderHandle = h; await preloadIconsFromFolder(); }
  } catch(e) {}
}

// Preload all already-downloaded icons into cache as objectURLs
async function preloadIconsFromFolder() {
  if (!iconsFolderHandle) return;
  try {
    for await (const [name, handle] of iconsFolderHandle.entries()) {
      if (handle.kind === 'file' && name.startsWith('icon_') && name.endsWith('.png')) {
        const iconId = parseInt(name.slice(5, -4));
        if (!isNaN(iconId) && !iconCache.has(iconId)) {
          const file = await handle.getFile();
          iconCache.set(iconId, URL.createObjectURL(file));
        }
      }
    }
  } catch(e) {}
}

// Get icon URL for a given iconId — returns cached objectURL or null
function getIconUrl(iconId) {
  if (!iconId) return null;
  return iconCache.get(iconId) || null;
}

// Get icon URL for a typeId via ITEMS lookup
function getItemIconUrl(typeId) {
  if (!typeId || !dataLoaded.items) return null;
  // ITEMS stores [name, maxStack] — we need iconId separately
  // We store iconId in ITEMS_ICONS map built when items load
  const iconId = ITEMS_ICONS[String(typeId)];
  return iconId ? getIconUrl(iconId) : null;
}

let ITEMS_ICONS = {}; // typeId -> iconId (built from items data if available)
let ITEMS_BY_NAME = {}; // lowercase display name -> typeId (fallback for WO icons)
let ITEMS_BY_INTERNAL_NAME = {}; // internalName -> typeId (for quest item lookups)

// Get icon ID for a work order — tries recipe result first, then item name lookup
function getWOIconId(woKey, recipe) {
  const resultId = recipe?.[3]?.[0]?.[0];
  if (resultId && ITEMS_ICONS[String(resultId)]) return ITEMS_ICONS[String(resultId)];
  // Fallback: derive item name from WO key e.g. "Gardening_Dahlias" -> "dahlia"
  const raw = woKey.split('_').slice(1).join('').toLowerCase();
  const itemId = ITEMS_BY_NAME[raw]
    || ITEMS_BY_NAME[raw.replace(/s$/, '')]
    || ITEMS_BY_NAME[raw.replace(/es$/, '')];
  return itemId ? ITEMS_ICONS[String(itemId)] : null;
}

// Try to get icons subfolder from watched folder, or create it
async function getOrCreateIconsFolder() {
  if (iconsFolderHandle) return iconsFolderHandle;
  if (!folderHandle) {
    showToast('Please select a Watch Folder first');
    return null;
  }
  try {
    const h = await folderHandle.getDirectoryHandle('icons', { create: true });
    iconsFolderHandle = h;
    await saveIconsFolderHandle(h);
    return h;
  } catch(e) {
    showToast('Could not create icons folder: ' + e.message);
    return null;
  }
}

async function downloadAllIcons() {
  if (iconsDownloading) return;
  if (!dataLoaded.items) { showToast('Load pg_items.json first'); return; }

  const iconFolder = await getOrCreateIconsFolder();
  if (!iconFolder) return;
  const cdnVer = await getCDNVersion();
  const cdnIconsBase = `${CDN_ROOT}${cdnVer}/icons/`;

  // Collect all unique icon IDs from ITEMS_ICONS
  const allIconIds = [...new Set(Object.values(ITEMS_ICONS))].filter(Boolean);
  if (allIconIds.length === 0) { showToast('No icon IDs found — reload pg_items.json'); return; }

  iconsDownloading = true;
  let done = 0, skipped = 0, failed = 0;
  const total = allIconIds.length;

  updateIconDownloadProgress(done, total, skipped, failed);

  // Process in batches of 10 concurrent
  const BATCH = 10;
  for (let i = 0; i < allIconIds.length; i += BATCH) {
    const batch = allIconIds.slice(i, i + BATCH);
    await Promise.all(batch.map(async iconId => {
      // Skip if already on disk
      try {
        await iconFolder.getFileHandle(`icon_${iconId}.png`);
        skipped++; done++;
        return;
      } catch(e) {}
      // Download
      try {
        const res = await fetch(`${cdnIconsBase}icon_${iconId}.png`);
        if (!res.ok) throw new Error(res.status);
        const blob = await res.blob();
        const fh = await iconFolder.getFileHandle(`icon_${iconId}.png`, { create: true });
        const writable = await fh.createWritable();
        await writable.write(blob);
        await writable.close();
        iconCache.set(iconId, URL.createObjectURL(blob));
        done++;
      } catch(e) {
        failed++; done++;
      }
    }));
    updateIconDownloadProgress(done, total, skipped, failed);
    // Small yield to keep UI responsive
    await new Promise(r => setTimeout(r, 0));
  }

  iconsDownloading = false;
  showToast(`✓ Icons done: ${done - failed} saved, ${failed} failed`);
  updateSettingsStatus();
}

function updateIconDownloadProgress(done, total, skipped, failed) {
  const el = document.getElementById('iconProgressWrap');
  if (!el) return;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
      <div style="flex:1;height:6px;background:var(--bg);border-radius:3px;border:1px solid var(--border);overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;transition:width .2s"></div>
      </div>
      <span style="font-size:11px;color:var(--text-dim);white-space:nowrap">${done}/${total} (${skipped} cached, ${failed} failed)</span>
    </div>`;
}

const API_BASE = location.protocol === 'file:' ? 'http://localhost:3000' : '';

async function checkForUpdate() {
  const btn = document.getElementById('updateCheckBtn');
  const status = document.getElementById('updateStatus');
  if (btn) btn.disabled = true;
  if (status) status.textContent = 'Checking…';
  try {
    const res = await fetch('https://api.github.com/repos/Goozify/GorgonHelper/releases/latest',
      { headers: { 'Accept': 'application/vnd.github+json' } });
    if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
    const data = await res.json();
    const remote = (data.tag_name || '').replace(/^v/, '');
    const releaseUrl = data.html_url || '';
    if (!remote) throw new Error('No release tag found');
    if (remote === APP_VERSION) {
      if (status) status.innerHTML = `<span style="color:var(--green)">✓ Up to date (v${APP_VERSION})</span>`;
    } else {
      if (status) status.innerHTML = `<span style="color:var(--gold)">Update available: v${APP_VERSION} → v${remote}</span>
        <a href="${releaseUrl}" target="_blank" class="ctx-btn" style="margin-left:8px">View release ↗</a>
        <button class="ctx-btn" onclick="doUpdate()" style="margin-left:4px">⬇ Update &amp; Reload</button>`;
    }
  } catch(e) {
    if (status) status.innerHTML = `<span style="color:var(--text-dim)">Could not check for updates: ${e.message}</span>`;
  }
  if (btn) btn.disabled = false;
}

async function doUpdate() {
  const status = document.getElementById('updateStatus');
  if (status) status.innerHTML = `<span style="color:var(--text-dim)">Updating…</span>`;
  try {
    const res = await fetch(API_BASE + '/api/update', { method: 'POST' });
    const data = await res.json();
    if (data.status === 'ok') {
      if (status) status.innerHTML = `<span style="color:var(--green)">✓ Updated — reloading…</span>`;
      setTimeout(() => location.reload(), 1200);
    } else {
      if (status) status.innerHTML = `<span style="color:var(--red)">Update failed: ${data.output}</span>`;
    }
  } catch(e) {
    if (status) status.innerHTML = `<span style="color:var(--red)">Error: ${e.message}</span>`;
  }
}

async function syncFile(key) {
  const df = DATA_FILES.find(d=>d.key===key);
  if (!df) return;
  const statusEl = document.getElementById('status_'+key);
  const btnEl = document.getElementById('syncbtn_'+key);
  if (statusEl) { statusEl.className='settings-status loading'; statusEl.textContent='⟳ Syncing…'; }
  if (btnEl) btnEl.disabled = true;
  try {
    const ver = await getCDNVersion();
    const res = await fetch(`${CDN_ROOT}${ver}/data/${df.cdn}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.json();
    applyGameData(key, processCDNData(key, raw));
    // Save raw file to Json/ folder so it persists across page reloads
    if (folderHandle) {
      try {
        const originalsDir = await folderHandle.getDirectoryHandle('Originals', { create: true });
        const fh = await originalsDir.getFileHandle(df.file, { create: true });
        const writable = await fh.createWritable();
        await writable.write(JSON.stringify(raw));
        await writable.close();
        showToast(`✓ ${df.label} synced & saved`);
      } catch(e2) {
        showToast(`✓ ${df.label} synced (couldn't save: ${e2.message})`);
      }
    } else {
      showToast(`✓ ${df.label} synced (select a folder to save permanently)`);
    }
  } catch(e) {
    showToast(`✗ Sync failed: ${e.message}`);
    if (statusEl) { statusEl.className='settings-status missing'; statusEl.textContent='✗ Sync failed'; }
  }
  if (btnEl) btnEl.disabled = false;
  renderSettingsTab();
}

function processCDNData(key, raw) {
  if (key === 'items') {
    const out = {};
    for (const [k,v] of Object.entries(raw)) { const id=k.split('_')[1]; if(id) out[id]=[v.Name||'',v.MaxStackSize||1,v.IconId||0,v.InternalName||'']; }
    return out;
  }
  if (key === 'recipes') {
    const out = {};
    RECIPE_RID_MAP = {};
    for (const [k,v] of Object.entries(raw)) {
      const internal = v.InternalName||'';
      if (!internal) continue;
      const rid = parseInt(k.split('_')[1]);
      if (rid) RECIPE_RID_MAP[rid] = internal;
      const ings = (v.Ingredients||[]).filter(i=>i.ItemCode).map(i=>[i.ItemCode,i.StackSize]);
      const results = (v.ResultItems||[]).filter(r=>r.ItemCode).map(r=>[r.ItemCode,r.StackSize]);
      const cookKwRaw = (v.Keywords||[]).find(k=>['MealRecipe','SnackRecipe','InstantSnackRecipe'].includes(k)) || '';
      const cookKw = cookKwRaw === 'MealRecipe' ? 'Meal' : cookKwRaw ? 'Snack' : '';
      out[internal] = [v.Name||'', v.Skill||'', ings, results, v.SkillLevelReq||0, cookKw, v.IconId||0];
    }
    return out;
  }
  if (key === 'itemuses') {
    const out = {};
    for (const [k,v] of Object.entries(raw)) {
      const iid = k.split('_')[1]; if (!iid) continue;
      const rids = v.RecipesThatUseItem||[];
      const internals = rids.map(rid => RECIPE_RID_MAP[rid] || String(rid)).filter(Boolean);
      if (internals.length) out[iid] = internals;
    }
    return out;
  }
  if (key === 'sources_recipes') {
    const out = {};
    for (const [k, v] of Object.entries(raw)) {
      const rid = parseInt(k.split('_')[1]);
      const internal = RECIPE_RID_MAP[rid];
      if (!internal) continue;
      const entries = (v.entries||[]).map(e => {
        const entry = {t: e.type};
        if (e.npc) { entry.npc = e.npc; entry.npcName = NPCS[e.npc]?.name || e.npc.replace('NPC_',''); entry.area = NPCS[e.npc]?.area || ''; }
        if (e.skill) entry.skill = e.skill;
        if (e.itemTypeId) entry.item = e.itemTypeId;
        return entry;
      });
      out[internal] = entries;
    }
    return out;
  }
  if (key === 'npcs') {
    const out = {};
    for (const [k,v] of Object.entries(raw)) {
      const prefs = (v.Preferences||[]).map(p => ({
        name: p.Name || (p.Keywords||[]).join(', '),
        desire: p.Desire||'',
        pref: p.Pref||0,
        keywords: p.Keywords||[]
      }));
      let pos = null;
      if (v.Pos) {
        const mx = v.Pos.match(/x:([-\d.]+)/), mz = v.Pos.match(/z:([-\d.]+)/);
        if (mx && mz) pos = { x: Math.round(parseFloat(mx[1]) * 100) / 100, z: Math.round(parseFloat(mz[1]) * 100) / 100 };
      }
      out[k] = {
        name: v.Name||k.replace('NPC_',''),
        area: v.AreaFriendlyName||'',
        areaName: v.AreaName||'',
        desc: v.Desc||'',
        pos,
        services: (v.Services||[]).map(s=>({type:s.Type,favor:s.Favor,skills:s.Skills||[],unlocks:s.Unlocks||[]})),
        prefs
      };
    }
    return out;
  }
  if (key === 'vaults') {
    const out = {};
    for (const [k,v] of Object.entries(raw)) {
      out[k] = { name:v.NpcFriendlyName||k, area:v.Area||'', numSlots:v.NumSlots??null, levels:v.Levels||null, grouping:v.Grouping||null, reqDesc:v.RequirementDescription||null };
    }
    return out;
  }
  if (key === 'landmarks') {
    const out = {};
    for (const [area, entries] of Object.entries(raw)) {
      out[area] = (entries||[]).map(e => {
        const obj = { name: e.Name||'', type: e.Type||'', desc: e.Desc||'' };
        if (e.Loc) {
          const mx = e.Loc.match(/x:([-\d.]+)/), mz = e.Loc.match(/z:([-\d.]+)/);
          if (mx) obj.x = Math.round(parseFloat(mx[1]) * 100) / 100;
          if (mz) obj.z = Math.round(parseFloat(mz[1]) * 100) / 100;
        }
        return obj;
      });
    }
    return out;
  }
  if (key === 'sources_items') {
    const KEEP = new Set(['Vendor','Barter','HangOut','NpcGift','Monster','Angling','CorpseButchering','CorpseSkinning','TreasureMap']);
    const out = {};
    for (const [k,v] of Object.entries(raw)) {
      const tid = k.split('_')[1]; if (!tid) continue;
      const seen = new Set();
      const entries = (v.entries||[]).reduce((acc,e) => {
        const t = e.type||''; if (!KEEP.has(t)) return acc;
        const npcKey = e.npc;
        const npcData = NPCS[npcKey]||{};
        const area = npcData.area||'';
        if (t in {'NpcGift':1,'HangOut':1} && !area) return acc;
        const dk = t+(npcKey||t);
        if (seen.has(dk)) return acc; seen.add(dk);
        const entry = {t};
        if (npcData.name) { entry.n = npcData.name; entry.a = area; }
        acc.push(entry);
        return acc;
      }, []);
      if (entries.length) out[tid] = entries;
    }
    return out;
  }
  if (key === 'quests') {
    const out = {};
    for (const [, v] of Object.entries(raw)) {
      const internal = v.InternalName; if (!internal) continue;
      // Extract NPC key from "AreaFoo/NPC_Bar" format
      const npcPath = v.FavorNpc || v.QuestNpc || '';
      const npcKey = npcPath.includes('/') ? npcPath.split('/')[1] : npcPath;
      const npcData = NPCS[npcKey] || {};
      const objs = (v.Objectives || []).map(o => {
        const obj = { t: o.Type || '', d: o.Description || '', n: o.Number || 1 };
        if (o.ItemName) {
          const tid = ITEMS_BY_INTERNAL_NAME[o.ItemName];
          if (tid) obj.tid = parseInt(tid);
        }
        return obj;
      });
      out[internal] = {
        name: v.Name || internal,
        npc: npcKey || null,
        npcName: npcData.name || (npcKey ? npcKey.replace('NPC_', '') : ''),
        loc: npcData.area || v.DisplayedLocation || '',
        objs,
      };
    }
    return out;
  }
  return raw;
}

function renderMapNpcDetail(npcKey, char) {
  const npc = NPCS[npcKey];
  if (!npc) return '';

  const favorLevel = char?.charData?.NPCs?.[npcKey]?.FavorLevel || '';

  // Player log data for this NPC
  const logCharName = char?.charData?.Character || currentLogChar;
  const logNpc = playerLogData[logCharName]?.npcs?.[npcKey];
  const exactFavor = logNpc?.exactFavor;

  // Favor: use detailed bar when we have a level, else fallback
  const favorHtml = favorLevel
    ? renderFavorCell(favorLevel, exactFavor)
    : `<span style="font-size:12px;color:var(--text-dim)">No character loaded</span>`;

  // Vendor gold section
  let vendorHtml = '';
  if (logNpc?.currentGold != null) {
    const pct = logNpc.maxGold > 0 ? Math.round(logNpc.currentGold / logNpc.maxGold * 100) : 0;
    const goldColor = pct > 60 ? 'var(--gold)' : pct > 20 ? 'var(--orange)' : '#e07070';
    const resetStr = formatGoldReset(logNpc.resetAt);
    const loggedAgo = Math.round((Date.now() - logNpc.loggedAt) / 60000);
    const agoStr = loggedAgo < 60 ? `${loggedAgo}m ago` : `${Math.round(loggedAgo/60)}h ago`;
    vendorHtml = `
      <div style="padding-top:8px;margin-top:8px;border-top:1px solid var(--border)">
        <div style="font-family:'Cinzel',serif;font-size:9px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Vendor Gold <span style="color:var(--text-dim);font-size:9px;font-family:inherit">(seen ${agoStr})</span></div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <div style="flex:1;background:var(--bg3);border-radius:3px;height:7px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${goldColor};border-radius:3px;transition:width .3s"></div>
          </div>
          <span style="font-size:12px;color:var(--gold-light);font-family:'Cinzel',serif;white-space:nowrap">🪙 ${logNpc.currentGold.toLocaleString()} / ${logNpc.maxGold.toLocaleString()}</span>
        </div>
        <div style="font-size:11px;color:var(--text-dim)">Resets: <span style="color:var(--text)">${resetStr}</span></div>
      </div>`;
  }

  // Active quests returnable to this NPC
  const returnableQuests = char ? (char.charData.ActiveQuests || [])
    .map(q => QUESTS[q]).filter(q => q && q.npc === npcKey) : [];

  // Services
  const serviceTypes = [...new Set((npc.services || []).map(s => s.type))];

  // Gift preferences
  const prefs = (npc.prefs || []).slice(0, 4);

  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px">
      <div class="map-panel-npc-name">${npc.name}</div>
      <button onclick="selectMapNpc('${npcKey}')" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:0;line-height:1" title="Close">✕</button>
    </div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">${npc.area || ''}</div>
    ${npc.desc ? `<div style="font-size:11px;color:var(--text);font-style:italic;margin-bottom:8px">${npc.desc}</div>` : ''}

    <div style="margin-bottom:10px">${favorHtml}</div>
    ${vendorHtml}

    ${returnableQuests.length ? `
      <div class="map-panel-section" style="margin-top:10px">Returnable Quests</div>
      <div>${returnableQuests.map(q => `<div class="map-quest-item" onclick="navigateToQuest('${q.name.replace(/'/g,"\\'")}')">${q.name}</div>`).join('')}</div>` : ''}

    ${serviceTypes.length ? `
      <div class="map-panel-section">Services</div>
      <div>${serviceTypes.map(t => `<span class="map-service-chip">${t}</span>`).join('')}</div>` : ''}

    ${prefs.length ? `
      <div class="map-panel-section">Gift Preferences</div>
      <div>${prefs.map(p => `<div style="font-size:11px;color:var(--text-dim);padding:2px 0">${p.name || ''} <span style="color:var(--text)">${p.desire||''}</span></div>`).join('')}</div>` : ''}`;
}

// SKILL PICKER MODAL
// ═══════════════════════════════════════════════════════════
let pickerCharId = null;
let pickerFilter = '';

function openSkillPicker(charId) {
  pickerCharId = charId;
  pickerFilter = '';
  renderSkillPicker();
}

function renderSkillPicker() {
  document.getElementById('ctxPopup')?.remove(); // close any right-click popup
  document.getElementById('skillPickerOverlay')?.remove();

  const char = characters.find(c => c.id === pickerCharId);
  if (!char) return;

  const allSkills = char.charData.Skills || {};
  const pinned = getPinnedSkills(pickerCharId);

  // Filter + sort: pinned first, then alphabetical
  const skillEntries = Object.entries(allSkills)
    .filter(([k]) => k !== 'Unknown')
    .filter(([k]) => !pickerFilter || k.replace(/([A-Z])/g,' $1').trim().toLowerCase().includes(pickerFilter.toLowerCase()))
    .sort((a, b) => {
      const ap = pinned.has(a[0]), bp = pinned.has(b[0]);
      if (ap !== bp) return ap ? -1 : 1;
      return a[0].localeCompare(b[0]);
    });

  const items = skillEntries.map(([name, s]) => {
    const sel = pinned.has(name);
    const displayName = name.replace(/([A-Z])/g,' $1').trim();
    return `<div class="skill-picker-item ${sel?'selected':''}" onclick="pickerToggle('${name}')">
      <input type="checkbox" ${sel?'checked':''} tabindex="-1">
      <span class="skill-picker-item-name">${displayName}</span>
      <span class="skill-picker-item-lvl">${s.Level}</span>
    </div>`;
  }).join('');

  const overlay = document.createElement('div');
  overlay.className = 'skill-picker-overlay';
  overlay.id = 'skillPickerOverlay';
  overlay.innerHTML = `
    <div class="skill-picker-modal" onclick="event.stopPropagation()">
      <div class="skill-picker-header">
        <h3>Pin Skills — ${char.charData.Character}</h3>
        <input class="skill-picker-search" id="pickerSearch" type="text" placeholder="Filter skills…"
          value="${pickerFilter.replace(/"/g,'&quot;')}" oninput="pickerSearchChange(this.value)" autocomplete="off">
        <button class="ctx-btn" onclick="closeSkillPicker()">✕</button>
      </div>
      <div class="skill-picker-body">
        <div class="skill-picker-grid" id="pickerGrid">${items}</div>
      </div>
      <div class="skill-picker-footer">
        <span class="skill-picker-count">${pinned.size} skill${pinned.size!==1?'s':''} pinned</span>
        <button class="ctx-btn danger" onclick="clearAllPins()" ${pinned.size===0?'disabled':''}>Clear all</button>
        <button class="ctx-btn primary" onclick="closeSkillPicker()">Done</button>
      </div>
    </div>`;
  overlay.addEventListener('click', closeSkillPicker);
  document.body.appendChild(overlay);
  // Focus search
  setTimeout(() => document.getElementById('pickerSearch')?.focus(), 50);
}

function pickerSearchChange(val) {
  pickerFilter = val;
  renderSkillPicker();
  // Re-focus and restore cursor at end
  setTimeout(() => {
    const el = document.getElementById('pickerSearch');
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 10);
}

async function pickerToggle(skillName) {
  await togglePinnedSkill(pickerCharId, skillName);
  renderSkillPicker();
  // Re-render sidebar live
  const char = characters.find(c => c.id === pickerCharId);
  if (char && document.getElementById('leftPanel')) renderLeft(char);
}

async function clearAllPins() {
  pinnedSkillsCache[pickerCharId] = new Set();
  await savePinnedSkills(pickerCharId);
  renderSkillPicker();
  const char = characters.find(c => c.id === pickerCharId);
  if (char && document.getElementById('leftPanel')) renderLeft(char);
}

function closeSkillPicker() {
  document.getElementById('skillPickerOverlay')?.remove();
  pickerCharId = null;
  pickerFilter = '';
  // Final re-render of sidebar
  const char = characters.find(c => c.id === activeCharId);
  if (char && document.getElementById('leftPanel')) renderLeft(char);
}
