<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project: Gorgon — Item Helper</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14; --bg2:#13161d; --bg3:#1a1e28;
  --border:#2a2f3f; --border-light:#3a4155;
  --gold:#c9a84c; --gold-light:#e8c97a; --gold-dim:#7a6330;
  --text:#d4cbbf; --text-dim:#8a8070; --text-bright:#f0e8d8;
  --red:#c05050; --blue:#5080c0; --green:#5a9960; --teal:#4a9090; --purple:#8060a0;
  --orange:#c88020;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* ── Header ── */
.header{background:linear-gradient(180deg,#0a0c10 0%,var(--bg) 100%);border-bottom:1px solid var(--gold-dim);padding:14px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:200}
.header-title{font-family:'Cinzel',serif;font-size:19px;color:var(--gold);letter-spacing:.05em;flex:1}
.header-title span{color:var(--text-dim);font-size:12px;font-family:'Crimson Pro',serif;margin-left:8px;font-weight:300}
.hdr-btn{cursor:pointer;background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);padding:5px 11px;border-radius:5px;font-family:inherit;font-size:12px;transition:all .12s;white-space:nowrap}
.hdr-btn:hover,.hdr-btn:disabled{border-color:var(--gold-dim);color:var(--text)}
.hdr-btn:disabled{opacity:.5;cursor:default}

/* ── Main nav tabs (Storage / Work Orders / Recipes / Settings) ── */
.main-nav{display:flex;flex-wrap:nowrap;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:49px;z-index:190;align-items:center}
.nav-tab{font-family:'Cinzel',serif;font-size:12px;padding:10px 18px;cursor:pointer;color:var(--text-dim);border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.05em;white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-hamburger{display:none;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;font-size:16px;border-radius:4px;margin:5px 0;line-height:1;font-family:inherit;flex-shrink:0}
.nav-hamburger:hover{border-color:var(--gold-dim);color:var(--text)}
@media(max-width:860px){.nav-tab{font-size:11px;padding:10px 12px}}
@media(max-width:660px){.nav-tab{font-size:10px;padding:9px 8px;letter-spacing:0}}
@media(max-width:480px){
  .main-nav{padding:0 12px;flex-wrap:wrap}
  .nav-hamburger{display:block}
  .main-nav:not(.nav-open) .nav-tab{display:none}
  .main-nav.nav-open{flex-direction:column;align-items:stretch}
  .main-nav.nav-open .nav-tab{display:block;width:100%;border-bottom:1px solid var(--border);border-left:none;border-right:none;padding:11px 4px;box-sizing:border-box}
}

/* ── Character tabs row ── */
.char-tabs{display:flex;gap:5px;padding:10px 20px 0;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap}
.char-tab{font-family:'Cinzel',serif;font-size:12px;padding:7px 15px;border:1px solid var(--border);border-bottom:none;border-radius:4px 4px 0 0;cursor:pointer;background:var(--bg2);color:var(--text-dim);transition:all .15s;position:relative;bottom:-1px;display:flex;align-items:center;gap:6px}
.char-tab:hover{color:var(--text);border-color:var(--border-light)}
.char-tab.active{background:var(--bg3);color:var(--gold);border-color:var(--gold-dim);border-bottom:1px solid var(--bg3)}
.char-tab .badge{background:var(--bg);border:1px solid var(--border);color:var(--text-dim);font-family:'Crimson Pro',serif;font-size:10px;padding:1px 5px;border-radius:10px}
.char-tab.add-tab{color:var(--text-dim);font-size:15px;padding:5px 12px;font-family:monospace}
.char-tab.add-tab:hover{color:var(--gold)}
.char-tab.all-tab{font-style:italic}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 130px)}
.left-panel{border-right:1px solid var(--border);background:var(--bg2);padding:18px;overflow-y:auto;max-height:calc(100vh - 130px);position:sticky;top:130px}
.right-panel{padding:18px 22px;overflow-y:auto}
.full-panel{grid-column:1/-1;padding:18px 22px;overflow-y:auto}

/* ── Left panel ── */
.panel-section{margin-bottom:22px}
.panel-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.15em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.char-card{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.char-avatar{width:48px;height:48px;border-radius:50%;border:2px solid var(--gold-dim);background:linear-gradient(135deg,#1e2535,#2a3048);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:20px;color:var(--gold);flex-shrink:0}
.char-info h2{font-family:'Cinzel',serif;font-size:15px;color:var(--text-bright)}
.char-info .meta{font-size:12px;color:var(--text-dim)}
.vitals{display:flex;flex-direction:column;gap:6px}
.vital-row{display:flex;align-items:center;gap:7px}
.vital-label{width:46px;font-size:11px;color:var(--text-dim)}
.vital-bar-wrap{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.vital-bar{height:100%;border-radius:2px;transition:width .6s ease}
.vital-bar.health{background:linear-gradient(90deg,#703030,var(--red))}
.vital-bar.armor{background:linear-gradient(90deg,#304870,var(--blue))}
.vital-bar.power{background:linear-gradient(90deg,#604070,var(--purple))}
.vital-val{font-size:11px;color:var(--text);width:34px;text-align:right}
.currencies{display:flex;flex-wrap:wrap;gap:5px}
.currency-chip{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;display:flex;align-items:center;gap:4px}
.currency-chip .cur-name{color:var(--text-dim)}
.currency-chip .cur-val{color:var(--gold-light);font-weight:600}
.skill-list{display:flex;flex-direction:column;gap:5px}
.skill-row{display:flex;align-items:center;gap:7px;padding:3px 0}
.skill-name{flex:1;font-size:12px;color:var(--text)}
.skill-level{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);width:26px;text-align:right}
.skill-xp-wrap{width:60px;height:3px;background:var(--bg);border-radius:2px;border:1px solid var(--border);overflow:hidden}
.skill-xp{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px}

/* ── Search bar ── */
.search-wrap{margin-bottom:10px;display:flex;gap:8px;align-items:center}
.search-input-wrap{position:relative;flex:1}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:9px 36px 9px 34px;font-family:'Crimson Pro',serif;font-size:14px;color:var(--text-bright);outline:none;transition:border-color .15s}
.search-input::placeholder{color:var(--text-dim)}
.search-input:focus{border-color:var(--gold-dim)}
.search-clear{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:17px;height:17px;border-radius:50%;background:var(--border-light);border:none;cursor:pointer;color:var(--text-dim);font-size:10px;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;opacity:0;pointer-events:none}
.search-clear.visible{opacity:1;pointer-events:auto}
.search-clear:hover{background:var(--red);color:#fff}
.search-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px;pointer-events:none}
.search-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:5px}
.search-count{font-size:12px;color:var(--text-dim)}
.search-count span{color:var(--gold)}
.mode-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px;gap:2px;flex-shrink:0}
.mode-btn{font-family:'Crimson Pro',serif;font-size:11px;padding:3px 10px;border-radius:16px;border:none;cursor:pointer;background:none;color:var(--text-dim);transition:all .15s;white-space:nowrap}
.mode-btn.active{background:var(--bg3);color:var(--gold-light);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.mode-btn:hover:not(.active){color:var(--text)}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.filter-chip{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text-dim);cursor:pointer;transition:all .12s;white-space:nowrap}
.filter-chip:hover{border-color:var(--border-light);color:var(--text)}
.filter-chip.active{background:var(--bg3);border-color:var(--gold-dim);color:var(--gold-light)}
.filter-chip.consolidate-chip.active{border-color:rgba(200,128,32,.6);color:var(--orange);background:rgba(200,128,32,.1)}
.filter-divider{width:1px;height:14px;background:var(--border);flex-shrink:0}

/* ── Inventory table ── */
.inv-table{width:100%;border-collapse:collapse}
.inv-table thead tr{border-bottom:1px solid var(--border)}
.inv-table th{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--gold-dim);text-transform:uppercase;padding:5px 9px;text-align:left;white-space:nowrap;user-select:none}
.inv-table th.r{text-align:right}
.item-row{border-bottom:1px solid rgba(42,47,63,.5);transition:background .08s;cursor:default}
.item-row:hover{background:rgba(26,30,40,.8)}
.item-row.needs-consolidation{background:rgba(200,128,32,.04)}
.item-row.needs-consolidation:hover{background:rgba(200,128,32,.09)}
.item-row td{padding:6px 9px;font-size:13px;vertical-align:middle}
.item-name{color:var(--text-bright);font-weight:600}
.item-icon{width:20px;height:20px;object-fit:contain;border-radius:3px;vertical-align:middle;margin-right:6px;image-rendering:pixelated;flex-shrink:0}
.recipe-icon{width:24px;height:24px;object-fit:contain;border-radius:3px;vertical-align:middle;margin-right:7px;image-rendering:pixelated;flex-shrink:0}
.consolidate-warn{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--orange);background:rgba(200,128,32,.12);border:1px solid rgba(200,128,32,.3);border-radius:3px;padding:1px 5px;margin-left:5px;white-space:nowrap}
.char-tag{font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim);white-space:nowrap}
.vault-chips{display:flex;flex-wrap:wrap;gap:3px}
.vault-chip{font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid transparent;white-space:nowrap}
.total-badge{font-family:'Cinzel',serif;font-size:12px;text-align:right;color:var(--gold-light)}
.total-badge.small{font-size:10px;color:var(--text-dim)}

/* ── Item tooltip ── */
.item-tooltip{position:fixed;z-index:600;background:var(--bg2);border:1px solid var(--border-light);border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.7);padding:12px;min-width:220px;max-width:320px;pointer-events:none;animation:fadeIn .1s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.tooltip-title{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.tooltip-recipe{margin-bottom:6px;padding:5px 7px;background:var(--bg3);border-radius:4px;border:1px solid var(--border)}
.tooltip-recipe-name{font-size:12px;color:var(--text-bright);font-weight:600;margin-bottom:3px}
.tooltip-recipe-skill{font-size:10px;color:var(--text-dim);margin-bottom:4px}
.tooltip-ing{font-size:10px;color:var(--text-dim);line-height:1.5}
.tooltip-ing .have{color:var(--green)}
.tooltip-ing .lack{color:var(--red)}
.tooltip-stack{font-size:10px;color:var(--text-dim);margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}

/* ── Work Orders ── */
.wo-section{margin-bottom:28px}
.wo-section-title{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.wo-section-title .badge{font-family:'Crimson Pro',serif;font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);padding:1px 7px;border-radius:10px;letter-spacing:0;text-transform:none}
.wo-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:13px 15px;margin-bottom:10px;cursor:context-menu;transition:border-color .12s}
.wo-card:hover{border-color:var(--border-light)}
.wo-card.complete{border-color:rgba(90,153,96,.35);background:rgba(90,153,96,.05)}
.wo-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px}
.wo-name{flex:1;font-size:14px;font-weight:600;color:var(--text-bright)}
.wo-skill{font-size:11px;color:var(--text-dim);margin-top:2px}
.wo-char-tag{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim);flex-shrink:0}
.wo-progress{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.wo-bar-wrap{flex:1;height:6px;background:var(--bg);border-radius:3px;border:1px solid var(--border);overflow:hidden}
.wo-bar{height:100%;border-radius:2px;transition:width .4s ease}
.wo-bar.done{background:linear-gradient(90deg,#3a7040,var(--green))}
.wo-bar.partial{background:linear-gradient(90deg,#7a6330,var(--gold))}
.wo-bar.none{background:var(--border)}
.wo-qty{font-size:11px;color:var(--text-dim);white-space:nowrap}
.wo-ingredients{display:flex;flex-wrap:wrap;gap:5px}
.wo-ing-chip{font-size:11px;padding:2px 8px;border-radius:3px;border:1px solid transparent;display:flex;align-items:center;gap:4px}
.wo-ing-chip.have{background:rgba(90,153,96,.12);border-color:rgba(90,153,96,.4);color:#7ab880}
.wo-ing-chip.partial{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.35);color:var(--gold)}
.wo-ing-chip.lack{background:rgba(192,80,80,.1);border-color:rgba(192,80,80,.35);color:#e07070}
.wo-ing-chip .qty{font-size:10px;opacity:.8}
.wo-ing-chip{cursor:default;position:relative}
.wo-completed-date{font-size:10px;color:var(--text-dim);margin-top:5px}
.wo-no-recipe{font-size:11px;color:var(--text-dim);font-style:italic}
/* Reset countdown bar */
.wo-reset-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.wo-reset-bar-wrap{flex:1;height:4px;background:var(--bg);border-radius:2px;border:1px solid var(--border);overflow:hidden}
.wo-reset-bar{height:100%;border-radius:2px;transition:width .4s ease;background:linear-gradient(90deg,#7a6330,var(--gold))}
.wo-reset-label{font-size:10px;color:var(--text-dim);white-space:nowrap}
/* Ingredient location tooltip */
.ing-tooltip{position:fixed;z-index:650;background:var(--bg2);border:1px solid var(--border-light);border-radius:6px;box-shadow:0 6px 24px rgba(0,0,0,.7);padding:10px 12px;min-width:180px;max-width:280px;pointer-events:none;animation:fadeIn .1s ease}
.ing-tooltip-title{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.ing-tooltip-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:2px 0;font-size:11px}
.ing-tooltip-char{color:var(--text-dim)}
.ing-tooltip-vault{color:var(--text-dim);font-size:10px;flex:1;text-align:center}
.ing-tooltip-qty{color:var(--text-bright);font-weight:600;text-align:right}
.ing-tooltip-total{border-top:1px solid var(--border);margin-top:4px;padding-top:4px;font-size:10px;color:var(--text-dim)}
/* Available WOs tab */
.avail-wo-table{width:100%;border-collapse:collapse}
.avail-wo-table th{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;color:var(--gold-dim);text-transform:uppercase;padding:5px 9px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
.avail-wo-table td{padding:7px 9px;font-size:13px;vertical-align:middle;border-bottom:1px solid rgba(42,47,63,.4)}
.avail-wo-name{color:var(--text-bright);font-weight:600}
.avail-wo-scroll{font-size:11px;color:var(--text-dim);margin-top:1px}

/* ── Recipes tab ── */
.recipe-controls{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.recipe-skill-filter{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:5px 10px;font-family:'Crimson Pro',serif;font-size:13px;color:var(--text);outline:none;cursor:pointer}
.recipe-skill-filter:focus{border-color:var(--gold-dim)}
.recipe-table{width:100%;border-collapse:collapse}
.recipe-table th{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;color:var(--gold-dim);text-transform:uppercase;padding:5px 9px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
.recipe-table th.c{text-align:center}
.recipe-row{border-bottom:1px solid rgba(42,47,63,.5);transition:background .08s}
.recipe-row:hover{background:rgba(26,30,40,.8)}
.recipe-row td{padding:6px 9px;font-size:13px;vertical-align:middle}
.recipe-name{color:var(--text-bright);font-weight:600}
.recipe-skill-tag{font-size:10px;padding:2px 7px;border-radius:3px;background:var(--bg3);border:1px solid var(--border);color:var(--text-dim)}
.recipe-count{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);text-align:right}
.char-dot{display:inline-block;width:20px;height:20px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);font-family:'Cinzel',serif;font-size:10px;color:var(--gold);text-align:center;line-height:18px;cursor:default}
.char-dot.has{background:rgba(90,153,96,.2);border-color:rgba(90,153,96,.5);color:#7ab880}
.char-dot.no{opacity:.3}

/* ── Settings ── */
.settings-section{max-width:700px;margin-bottom:30px}
.settings-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.settings-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(42,47,63,.4)}
.settings-row:last-child{border-bottom:none}
.settings-label{flex:1;font-size:13px;color:var(--text)}
.settings-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
.settings-status{font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid var(--border)}
.settings-status.ok{color:var(--green);border-color:rgba(90,153,96,.4);background:rgba(90,153,96,.1)}
.settings-status.missing{color:var(--red);border-color:rgba(192,80,80,.4);background:rgba(192,80,80,.1)}
.settings-status.loading{color:var(--gold);border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.1)}
.sync-btn{font-family:'Cinzel',serif;font-size:11px;padding:5px 14px;border-radius:4px;cursor:pointer;border:1px solid var(--gold-dim);background:rgba(201,168,76,.1);color:var(--gold-light);transition:all .12s;letter-spacing:.05em}
.sync-btn:hover{background:rgba(201,168,76,.2)}
.sync-btn:disabled{opacity:.4;cursor:default}

/* ── Context popup ── */
.ctx-popup{position:fixed;z-index:700;background:var(--bg2);border:1px solid var(--border-light);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.6);padding:15px;min-width:250px;max-width:310px;animation:popIn .12s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.ctx-popup h4{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);line-height:1.4}
.ctx-popup label{font-size:11px;color:var(--text-dim);display:block;margin-bottom:5px}
.ctx-popup input[type=number]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:6px 9px;font-family:'Crimson Pro',serif;font-size:13px;color:var(--text-bright);outline:none;margin-bottom:9px;transition:border-color .12s}
.ctx-popup input[type=number]:focus{border-color:var(--gold-dim)}
.ctx-popup .popup-current{font-size:11px;color:var(--text-dim);margin-bottom:9px}
.ctx-popup .popup-current span{color:var(--text)}
.ctx-popup-btns{display:flex;gap:7px;justify-content:flex-end}
.ctx-btn{font-family:'Crimson Pro',serif;font-size:12px;padding:4px 12px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim);transition:all .12s}
.ctx-btn:hover{color:var(--text);border-color:var(--border-light)}
.ctx-btn.primary{background:rgba(201,168,76,.15);border-color:var(--gold-dim);color:var(--gold-light)}

/* ── Favors tab ── */
.favor-calc-panel{max-width:560px;margin:28px auto}
.favor-calc-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.12em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:22px;border-bottom:1px solid var(--border);padding-bottom:8px}
.favor-calc-row{display:flex;align-items:center;margin-bottom:11px;gap:10px}

.favor-calc-dd-input{width:100%;box-sizing:border-box;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 26px 5px 8px;font-size:13px;cursor:pointer;outline:none}

.favor-calc-dd-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--text-dim);pointer-events:none}
.favor-calc-dd-list{position:absolute;top:calc(100% + 2px);left:0;right:0;z-index:300;background:var(--bg2);border:1px solid var(--border);border-radius:5px;max-height:260px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.favor-calc-dd-area-hdr{font-size:10px;color:var(--gold-dim);padding:5px 10px 3px;letter-spacing:.1em;text-transform:uppercase;border-top:1px solid rgba(255,255,255,.05);background:var(--bg3);position:sticky;top:0}

.favor-calc-dd-item{padding:5px 10px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.favor-calc-dd-item:hover{background:rgba(255,255,255,.06)}
.favor-calc-dd-item.selected{color:var(--gold)}
.favor-calc-dd-item.has-data{font-weight:600}
.favor-calc-num-input{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 8px;font-size:13px;width:120px;outline:none}
.favor-calc-num-input:focus{border-color:var(--gold-dim)}
.favor-calc-tier-info{font-size:12px;color:var(--text-dim);margin-left:130px;margin-bottom:14px;margin-top:-4px}
.favor-calc-prefs{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.favor-calc-divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.favor-calc-result{padding:16px 20px;background:rgba(192,80,80,.07);border:1px solid rgba(192,80,80,.22);border-radius:6px;font-size:13px}

.favor-calc-result-num{color:var(--gold);font-size:26px;font-weight:bold;display:block;margin-bottom:4px}
.favor-calc-result-detail{color:var(--text-dim);font-size:12px;margin-top:6px}
.favor-table{width:100%;border-collapse:collapse}
.favor-table thead tr{border-bottom:1px solid var(--border)}
.favor-table th{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--gold-dim);text-transform:uppercase;padding:5px 10px;text-align:left;white-space:nowrap;user-select:none}
.favor-row{border-bottom:1px solid rgba(42,47,63,.4);transition:background .08s}

.favor-npc-name{color:var(--text-bright);font-weight:600}
.favor-npc-area{font-size:11px;color:var(--text-dim);margin-top:1px}
.favor-level-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);white-space:nowrap}
.favor-bar-cell{min-width:140px}
.favor-bar-row{display:flex;align-items:center;gap:7px}
.favor-pbar-wrap{flex:1;height:6px;background:var(--bg);border-radius:3px;border:1px solid var(--border);overflow:hidden}

.pinned-skill-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(42,47,63,.4)}

.pinned-skill-name{flex:1;font-size:13px;color:var(--text-bright);font-weight:600}

.pinned-xp-wrap{width:100%;height:4px;background:var(--bg);border-radius:2px;border:1px solid var(--border);overflow:hidden;margin-top:3px}
.pinned-xp{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px}
.pinned-xp-text{font-size:10px;color:var(--text-dim);margin-top:2px}
.edit-pins-btn{font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim);cursor:pointer;transition:all .12s;font-family:'Crimson Pro',serif}
.edit-pins-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
/* Skill picker modal */
.skill-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:800;display:flex;align-items:center;justify-content:center}

.skill-picker-search{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-family:'Crimson Pro',serif;font-size:13px;color:var(--text-bright);outline:none;width:160px;transition:border-color .12s}

.skill-picker-body{overflow-y:auto;padding:10px 16px;flex:1}

.skill-picker-item.selected{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.3)}

.skill-picker-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.skill-picker-count{font-size:11px;color:var(--text-dim);flex:1}

/* ── Maps tab ── */
.map-outer{overflow:auto;border:1px solid var(--border);border-radius:6px;background:#0a0c10;max-height:calc(100vh - 210px)}
.map-container{position:relative;display:inline-block;font-size:0;user-select:none}
.map-container img{display:block;width:100%}
.map-npc-marker{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10}

.map-npc-marker:hover .map-npc-label,.map-npc-marker.selected .map-npc-label{opacity:1}

.map-landmark-dot{width:7px;height:7px;border-radius:50%;opacity:.75;border:1px solid rgba(0,0,0,.5)}
.map-landmark-marker:hover .map-landmark-dot{opacity:1;transform:scale(1.4)}
.map-npc-panel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;position:sticky;top:0}
.map-panel-npc-name{font-size:15px;font-weight:600;color:var(--text-bright)}
.map-panel-section{font-size:10px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.1em;margin:12px 0 5px}
.map-quest-item{font-size:12px;color:var(--accent);padding:3px 0;border-bottom:1px solid rgba(42,47,63,.4);cursor:pointer}
.map-quest-item:hover{text-decoration:underline}
.map-quest-item:last-child{border-bottom:none}
.map-service-chip{display:inline-flex;font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid var(--border);background:var(--bg2);color:var(--text-dim);margin:2px 3px 2px 0}
.map-legend-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);margin-bottom:3px}
.map-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.4)}

/* ── Quests tab ── */
.quest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
.quest-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;transition:border-color .12s}
.quest-card:hover{border-color:var(--border-light)}
.quest-card-header{margin-bottom:2px}
.quest-card-title{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;margin-bottom:3px}
.quest-name{font-size:13px;font-weight:600;color:var(--text-bright);flex:1;min-width:0}
.quest-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.quest-npc{font-size:11px;color:var(--gold-dim)}
.quest-area{font-size:10px;color:var(--text-dim);padding:1px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:3px}
.quest-objectives{display:flex;flex-direction:column;gap:5px;margin-top:6px;padding-top:6px;border-top:1px solid rgba(42,47,63,.5)}
.quest-obj-row{display:flex;align-items:center;gap:6px;font-size:12px}
.quest-obj-icon{font-size:11px;flex-shrink:0;width:14px;text-align:center}
.quest-obj-desc{color:var(--text);flex:1}
.quest-obj-need{font-size:11px;color:var(--text-dim);flex-shrink:0}
.quest-obj-bar-wrap{flex:1}
.quest-obj-qty{font-size:11px;font-weight:600;flex-shrink:0}
.quest-obj-qty.have{color:var(--green)}
.quest-obj-qty.partial{color:var(--gold)}
.quest-obj-qty.lack{color:var(--red)}
.quest-item-link{cursor:pointer;color:var(--text);transition:color .1s}
.quest-item-link:hover{color:var(--gold)}

/* ── NPC preference tooltip ── */
.npc-pref-tooltip{position:fixed;z-index:650;background:var(--bg2);border:1px solid var(--border-light);border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.7);padding:12px 14px;min-width:200px;max-width:300px;pointer-events:none;animation:fadeIn .1s ease}
.npc-pref-title{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.npc-pref-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px}
.npc-pref-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.npc-pref-name{flex:1;color:var(--text)}
.npc-pref-score{font-family:'Cinzel',serif;font-size:11px;white-space:nowrap}
.npc-desc-line{font-size:11px;color:var(--text-dim);font-style:italic;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.empty-state{padding:50px 20px;text-align:center;color:var(--text-dim)}
.empty-state .icon{font-size:32px;margin-bottom:10px;opacity:.4}
.empty-state h3{font-family:'Cinzel',serif;font-size:13px;margin-bottom:5px;color:var(--text)}
/* Recipe source badges */
.recipe-source{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim);white-space:nowrap;margin:1px 2px 1px 0}
.src-expand-btn{font-size:10px;padding:1px 7px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);color:var(--gold-dim);cursor:pointer;font-family:'Crimson Pro',serif;transition:all .1s;line-height:1.6;white-space:nowrap}
.src-expand-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.recipe-source.training{border-color:rgba(80,120,200,.45);background:rgba(80,120,200,.1);color:#7aa0e8}
.recipe-source.hangout{border-color:rgba(128,96,160,.45);background:rgba(128,96,160,.1);color:#a880d0}
.recipe-source.skill{border-color:rgba(90,153,96,.4);background:rgba(90,153,96,.1);color:#7ab880}
.recipe-source.item{border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.08);color:var(--gold)}
.recipe-source.quest{border-color:rgba(200,128,32,.4);background:rgba(200,128,32,.08);color:var(--orange)}
.recipe-source.gift{border-color:rgba(192,80,80,.4);background:rgba(192,80,80,.08);color:#e07070}
.recipe-source.effect{border-color:rgba(74,144,144,.4);background:rgba(74,144,144,.1);color:#60b0b0}
/* Storage Vaults tab */
.vault-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:13px 15px;margin-bottom:10px;transition:border-color .12s}
.vault-card:hover{border-color:var(--border-light)}
.vault-card.has-upgrade{border-color:rgba(201,168,76,.3)}
.vault-card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.vault-card-name{flex:1;font-size:14px;font-weight:600;color:var(--text-bright)}
.vault-card-area{font-size:11px;color:var(--text-dim);margin-top:2px}
.vault-card-slots{font-family:'Cinzel',serif;font-size:18px;color:var(--gold-light);flex-shrink:0;text-align:right}
.vault-card-slots-label{font-size:9px;color:var(--text-dim);text-align:right;font-family:'Crimson Pro',serif}
.vault-favor-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.favor-bar-wrap{flex:1;height:5px;background:var(--bg);border-radius:3px;border:1px solid var(--border);overflow:hidden}
.favor-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
.favor-label{font-size:11px;color:var(--text-dim);white-space:nowrap}
.vault-levels-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.vault-level-chip{font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim)}
.vault-level-chip.current{border-color:var(--gold-dim);color:var(--gold-light);background:rgba(201,168,76,.1)}
.vault-level-chip.unlocked{border-color:rgba(90,153,96,.4);color:#7ab880;background:rgba(90,153,96,.08)}
.vault-level-chip.locked{opacity:.5}
.vault-upgrade-hint{font-size:11px;color:var(--gold);margin-top:6px;display:flex;align-items:center;gap:5px}
.vault-char-tag{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim);flex-shrink:0}
.vault-section-title{font-family:'Cinzel',serif;font-size:11px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.12em;margin:18px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.toast{position:fixed;bottom:18px;right:18px;background:var(--bg3);border:1px solid var(--gold-dim);color:var(--text);font-size:12px;padding:9px 16px;border-radius:6px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-light)}
@media(max-width:800px){.layout{grid-template-columns:1fr}.left-panel{position:static;max-height:none;border-right:none;border-bottom:1px solid var(--border)}}
</style>

<script>
// ═══════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════
let characters = [];
let activeCharId = null;
let mainTab = 'storage';
let searchQuery = '';
let searchMode = 'single';
let activeVaultFilter = null;

// Tools tab state
let toolsSubTab = 'safecracking'; // 'safecracking' | 'survey' | 'gardening'

// Gardening tab state
let gardenData = {}; // charName → { plots: { id → { cropType, stage, description, plantedAt, updatedAt } } }

const playerOwnedPetIds = new Set(); // entity IDs from LocalPlayer: ProcessSetPetOwner — our plants only

// Module-level slot map — used both in render and in parsePlayerLogLines for slot-fullness checks

  'Pea':{'slot':'Pea','max':2}, 'Soybean':{'slot':'Soybean','max':2},
  'Tomato':{'slot':'Tomato','max':2}, 'Flax':{'slot':'Flax','max':2},
  'Red-Leaf Lettuce':{'slot':'Red Lettuce','max':2},
  'Bluebell':{'slot':'Flowers','max':3},'Red Aster':{'slot':'Flowers','max':3},
  'Violet':{'slot':'Flowers','max':3},'Dahlia':{'slot':'Flowers','max':3},
  'Daisy':{'slot':'Flowers','max':3},'Pansy':{'slot':'Flowers','max':3},
  'Marigold':{'slot':'Flowers','max':3},'Poppy':{'slot':'Flowers','max':3},
  'Red Rose':{'slot':'Flowers','max':3},'Elven Lily':{'slot':'Flowers','max':3},
  'Winterhue':{'slot':'Flowers','max':3},'Desert Rose':{'slot':'Flowers','max':3},
  'Dandelion':{'slot':'Flowers','max':3},'Fae Mysotis':{'slot':'Flowers','max':3},
  'Tulip':{'slot':'Flowers','max':3},'Paleblood':{'slot':'Flowers','max':3},
  'Hyacinth':{'slot':'Flowers','max':3},'Swamp Lily':{'slot':'Flowers','max':3},

  'Cotton':{'slot':'Cotton','max':5},'Cotton Plant':{'slot':'Cotton','max':5},

const IDB_NAME = 'pg_helper_v1';
let db = null;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 4);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('folder_handle'))    d.createObjectStore('folder_handle');
      if (!d.objectStoreNames.contains('wo_limits'))        d.createObjectStore('wo_limits');
      if (!d.objectStoreNames.contains('wo_completed'))     d.createObjectStore('wo_completed');
      if (!d.objectStoreNames.contains('pinned_skills'))    d.createObjectStore('pinned_skills');
      if (!d.objectStoreNames.contains('player_log_handle')) d.createObjectStore('player_log_handle');
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej();
  });
}
async function dbGet(store, key)        { return new Promise((r,j) => { const t=db.transaction(store,'readonly'); const q=t.objectStore(store).get(key); q.onsuccess=()=>r(q.result); q.onerror=()=>r(null); }); }
async function dbPut(store, key, val)   { return new Promise((r,j) => { const t=db.transaction(store,'readwrite'); t.objectStore(store).put(val,key); t.oncomplete=()=>r(); t.onerror=()=>j(); }); }
async function dbDelete(store, key)     { return new Promise((r,j) => { const t=db.transaction(store,'readwrite'); t.objectStore(store).delete(key); t.oncomplete=()=>r(); }); }
async function dbGetAll(store)          { return new Promise((r,j) => { const t=db.transaction(store,'readonly'); const q=t.objectStore(store).getAll(); q.onsuccess=()=>r(q.result); q.onerror=()=>r([]); }); }
async function dbGetAllKeys(store)      { return new Promise((r,j) => { const t=db.transaction(store,'readonly'); const q=t.objectStore(store).getAllKeys(); q.onsuccess=()=>r(q.result); q.onerror=()=>r([]); }); }

// WO completion log
let woCompletedLog = []; // [{woKey,charId,ts,name}]
async function loadWOCompleted() {
  const keys = await dbGetAllKeys('wo_completed');
  const raw = [];
  for (const k of keys) {
    const v = await dbGet('wo_completed', k);
    if (v) raw.push({ key: k, entry: v });
  }

  // Deduplicate: for each woKey+charId keep only the newest timestamp
  // Also migrate old keys (woKey_charId_timestamp) to new format (woKey_charId)
  const best = {}; // "woKey_charId" -> {ts, entry, oldKey}
  for (const { key, entry } of raw) {
    const canonical = `${entry.woKey}_${entry.charId}`;
    if (!best[canonical] || entry.ts > best[canonical].ts) {
      best[canonical] = { ts: entry.ts, entry, oldKey: key };
    }
  }

  // Delete old/duplicate entries, write canonical ones
  const toDelete = raw.filter(({ key }) => !Object.values(best).some(b => b.oldKey === key));
  for (const { key } of toDelete) await dbDelete('wo_completed', key);
  for (const [canonical, { entry, oldKey }] of Object.entries(best)) {
    if (oldKey !== canonical) {
      // Migrate to canonical key
      await dbPut('wo_completed', canonical, entry);
      await dbDelete('wo_completed', oldKey);
    }
  }

  woCompletedLog = Object.values(best).map(b => b.entry);
  woCompletedLog.sort((a, b) => b.ts - a.ts);
}

async function logWOCompletion(woKey, charId, name) {
  const ts = Date.now();
  const entry = { woKey, charId, ts, name };
  const k = `${woKey}_${charId}`; // canonical key — one per WO per char
  await dbPut('wo_completed', k, entry);
  // Update or insert in memory
  const idx = woCompletedLog.findIndex(e => e.woKey === woKey && e.charId === charId);
  if (idx >= 0) woCompletedLog[idx] = entry;
  else woCompletedLog.unshift(entry);
  woCompletedLog.sort((a, b) => b.ts - a.ts);
}

async function deleteWOCompletion(woKey, charId) {
  const k = `${woKey}_${charId}`;
  await dbDelete('wo_completed', k);
  woCompletedLog = woCompletedLog.filter(e => !(e.woKey === woKey && e.charId === charId));
}

async function moveGameExports() {
  if (!folderHandle) return;
  try {
    const exportFolder = await folderHandle.getDirectoryHandle(CHAR_EXPORT_FOLDER, { create: true });
    for await (const [name, handle] of folderHandle.entries()) {
      if (handle.kind !== 'file' || !name.endsWith('.json')) continue;
      const isCharFile  = /^Character_.+\.json$/.test(name);
      const isItemsFile = /^.+_items_.+Z\.json$/.test(name);
      if (!isCharFile && !isItemsFile) continue;
      try {
        const file = await handle.getFile();
        const dest = await exportFolder.getFileHandle(name, { create: true });
        const writable = await dest.createWritable();
        await writable.write(await file.arrayBuffer());
        await writable.close();
        await folderHandle.removeEntry(name);
      } catch(e) {}
    }
  } catch(e) {} // no write access or other error — skip silently
}

async function scanFolder(isInitial) {
  if (!folderHandle) return;

  // Move any game exports from root into character_exports/ subfolder
  await moveGameExports();

  const jsonFiles = [];
  try {
    for await (const [name, handle] of folderHandle.entries()) {
      if (handle.kind === 'file' && name.endsWith('.json')) {
        const file = await handle.getFile();
        jsonFiles.push({ name, handle, file, modified: file.lastModified });
      }
    }
  } catch(e) { showToast('Folder read error: ' + e.message); return; }

  // Also collect character files from character_exports/ subfolder
  try {
    const exportFolder = await folderHandle.getDirectoryHandle(CHAR_EXPORT_FOLDER);
    for await (const [name, handle] of exportFolder.entries()) {
      if (handle.kind === 'file' && name.endsWith('.json')) {
        const file = await handle.getFile();
        jsonFiles.push({ name, handle, file, modified: file.lastModified });
      }
    }
  } catch(e) {} // subfolder doesn't exist yet — fine

  // Try to load game data files from folder
  await tryLoadDataFromFolder(jsonFiles);

  const parsed = [];
  for (const f of jsonFiles) {
    try {
      const text = await f.file.text();
      const json = JSON.parse(text);
      if (json.Character && json.ServerName && json.Report) parsed.push({ ...f, json });
    } catch(e) {}
  }

  const byChar = new Map();
  for (const p of parsed) {
    const key = `${p.json.Character}_${p.json.ServerName}`;
    if (!byChar.has(key)) byChar.set(key, {});
    const entry = byChar.get(key);
    if (p.json.Report === 'CharacterSheet' && (!entry.charMod || p.modified > entry.charMod)) { entry.char = p.json; entry.charMod = p.modified; }
    if (p.json.Report === 'Storage'         && (!entry.invMod  || p.modified > entry.invMod))  { entry.inv  = p.json; entry.invMod  = p.modified; }
  }

  let anyChange = false;
  for (const [key, pair] of byChar.entries()) {
    if (!pair.char || !pair.inv) continue;
    const snap = fileSnapshot.get(key);
    if (!snap || snap.charMod !== pair.charMod || snap.invMod !== pair.invMod) {
      anyChange = true;
      fileSnapshot.set(key, { charMod: pair.charMod, invMod: pair.invMod });
      const id = `${pair.char.Character}_${pair.char.ServerName}`;
      const existing = characters.findIndex(c => c.id === id);

      // Detect new completed WOs (only when we have previous state to compare against)
      if (existing >= 0) {
        const prev = characters[existing].charData.CompletedWorkOrders || [];
        const next = pair.char.CompletedWorkOrders || [];
        const prevSet = new Set(prev);
        const nextSet = new Set(next);

        // Log newly completed WOs (appeared since last scan)
        for (const wo of next) {
          if (!prevSet.has(wo)) {
            await logWOCompletion(wo, id, woKeyToDisplayName(wo));
          }
        }

        // Delete tracked completions that are no longer in the character's list (WO reset)
        for (const entry of woCompletedLog.filter(e => e.charId === id)) {
          if (!nextSet.has(entry.woKey)) {
            await deleteWOCompletion(entry.woKey, id);
          }
        }
      }

      const charObj = { id, charData: pair.char, invData: pair.inv, items: processInventory(pair.inv), topSkills: getTopSkills(pair.char) };
      invalidateCharItemMap(id);
      if (existing >= 0) { characters[existing] = charObj; if (!isInitial) showToast(`↑ ${pair.char.Character} updated`); }
      else { characters.push(charObj); if (!activeCharId) activeCharId = id; if (!isInitial) showToast(`+ ${pair.char.Character} loaded`); }
    }
  }

  if (anyChange) { if (!activeCharId && characters.length > 0) activeCharId = characters[0].id; renderAll(); if (!isInitial) updateAutoStatus('updated'); }
  if (isInitial && byChar.size === 0) showToast('No character JSON pairs found');
}

async function tryLoadDataFromFolder(jsonFiles) {
  // Build lookup: filename → DATA_FILES entry, for root-level pg_ files
  const rootWanted = {};
  for (const df of DATA_FILES) {
    if (!df.originals) rootWanted[df.file] = df;
  }
  for (const f of jsonFiles) {
    const df = rootWanted[f.name];
    if (!df || dataLoaded[df.key]) continue;
    try {
      const raw = JSON.parse(await f.file.text());
      applyGameData(df.key, raw); // pg_ files are already in processed format
    } catch(e) {}
  }

  // Load originals from the Json/ subfolder — read all files in parallel, apply in order
  if (!folderHandle) return;
  let originalsDir;
  try { originalsDir = await folderHandle.getDirectoryHandle('Json'); } catch(e) { return; }
  const toLoad = DATA_FILES.filter(df => df.originals && !dataLoaded[df.key]);
  // Kick off all file reads simultaneously
  const reads = await Promise.all(toLoad.map(async df => {
    try {
      const fh = await originalsDir.getFileHandle(df.file);
      const raw = JSON.parse(await (await fh.getFile()).text());
      return { df, raw };
    } catch(e) { return null; }
  }));
  // Apply in DATA_FILES order so dependency constraints hold
  // (items before quests, npcs before sources_items, etc.)
  for (const result of reads) {
    if (result) applyGameData(result.df.key, processCDNData(result.df.key, result.raw));
  }
}

function applyGameData(key, data) {
  if (key === 'items') {
    ITEMS = data; dataLoaded.items = true;
    _woResolveCache = {}; _resultNormToRecipe = null;
    // Build iconId map from new [name, maxStack, iconId] format
    ITEMS_ICONS = {}; ITEMS_BY_NAME = {}; ITEMS_BY_INTERNAL_NAME = {};
    for (const [id, v] of Object.entries(data)) {
      if (!Array.isArray(v)) continue;
      if (v[2]) ITEMS_ICONS[id] = v[2];
      if (v[0]) ITEMS_BY_NAME[v[0].toLowerCase()] = id;
      if (v[3]) ITEMS_BY_INTERNAL_NAME[v[3]] = id;
    }
  }
  if (key === 'recipes')         { RECIPES = data; dataLoaded.recipes = true; buildRecipeCaches(); }
  if (key === 'itemuses')        { ITEMUSES = data; dataLoaded.itemuses = true; }
  if (key === 'sources_recipes') {
    SOURCES_RECIPES = data; dataLoaded.sources_recipes = true;
    // Build inverted map: npcKey -> [recipeInternalName, ...]
    NPC_RECIPES_MAP = {};
    for (const [recipeKey, entries] of Object.entries(data)) {
      for (const e of entries) {
        if (e.t === 'Training' && e.npc) {
          if (!NPC_RECIPES_MAP[e.npc]) NPC_RECIPES_MAP[e.npc] = [];
          NPC_RECIPES_MAP[e.npc].push(recipeKey);
        }
      }
    }
  }
  if (key === 'sources_items')   { SOURCES_ITEMS = data;   dataLoaded.sources_items = true; }
  if (key === 'npcs')            { NPCS = data; dataLoaded.npcs = true; }
  if (key === 'vaults')          { VAULTS = data; dataLoaded.vaults = true; }
  if (key === 'quests')          { QUESTS = data; dataLoaded.quests = true; }
  if (key === 'landmarks')       { LANDMARKS = data; dataLoaded.landmarks = true; }
  if (key === 'npc_training')    { NPC_TRAINING = data; dataLoaded.npc_training = true; }
  if (data._version) dataVersions[key] = data._version;
  updateSettingsStatus();
}

function processInventory(invData) {
  const g = {};
  for (const item of invData.Items) {
    const name = item.Name || 'Unknown';
    const vault = item.StorageVault || (item.IsInInventory ? 'Inventory' : 'Unknown');
    const size = item.StackSize || 1;
    const tid = item.TypeID;
    const val = item.Value || 0;
    if (!g[name]) g[name] = { name, total:0, vaults:{}, typeId: tid, value: val };
    g[name].total += size;
    g[name].vaults[vault] = (g[name].vaults[vault] || 0) + size;
  }
  return Object.values(g).sort((a,b) => a.name.localeCompare(b.name));
}

function getTopSkills(charData, n=12) {
  return Object.entries(charData.Skills || {})
    .filter(([k]) => !k.startsWith('Anatomy') && !k.startsWith('NPC') && k !== 'Unknown')
    .sort((a,b) => (b[1].Level+b[1].BonusLevels)-(a[1].Level+a[1].BonusLevels))
    .slice(0, n);
}

function getMaxStack(itemName, typeId) {
  // First try items DB by typeId
  if (typeId && ITEMS[String(typeId)]) return ITEMS[String(typeId)][1];
  // Fallback: search by name
  const entry = Object.entries(ITEMS).find(([,v]) => v[0] === itemName);
  return entry ? entry[1][1] : null;
}

function getConsolidationInfo(itemName, vaults, typeId) {
  if (!vaults) return null;
  const maxStack = getMaxStack(itemName, typeId);
  if (!maxStack) return null;
  const vaultList = Object.entries(vaults);
  if (vaultList.length < 2) return null;
  const nonFull = vaultList.filter(([,amt]) => amt < maxStack);
  if (nonFull.length === 0) return null;
  return { maxStack, vaultCount: vaultList.length };
}

// ── Performance caches (rebuilt when data loads) ──
let _woResolveCache = {};          // woKey -> recipe object (or null)
let _recipeKeyByRef = new Map();   // recipe array ref -> internalName
let _resultNormToRecipe = null;    // normalized result item name -> recipe (built lazily)

let CRAFTABLE_ITEM_IDS = new Set(); // typeIds that are produced by at least one recipe

function buildRecipeCaches() {
  _woResolveCache = {};
  _recipeKeyByRef = new Map();
  _resultNormToRecipe = null; // will be built on first use
  CRAFTABLE_ITEM_IDS = new Set();
  for (const [k, v] of Object.entries(RECIPES)) {
    _recipeKeyByRef.set(v, k);
    for (const [rid] of (v[3] || [])) {
      CRAFTABLE_ITEM_IDS.add(String(rid));
    }
  }
}

function getResultNormMap() {
  if (_resultNormToRecipe) return _resultNormToRecipe;
  _resultNormToRecipe = new Map();
  const norm = s => s.replace(/[\s\-]/g,'').toLowerCase();
  for (const [, rv] of Object.entries(RECIPES)) {
    for (const [rid] of (rv[3] || [])) {
      const itemData = ITEMS[String(rid)];
      if (itemData) {
        const n = norm(itemData[0]);
        if (!_resultNormToRecipe.has(n)) _resultNormToRecipe.set(n, rv);
      }
    }
  }
  return _resultNormToRecipe;
}

// Per-character item lookup map (typeId -> item), rebuilt when characters update
let _charItemMaps = new Map(); // charId -> Map<typeId, item>

function getCharItemMap(char) {
  if (!_charItemMaps.has(char.id)) {
    const m = new Map();
    for (const item of char.items) if (item.typeId) m.set(item.typeId, item);
    _charItemMaps.set(char.id, m);
  }
  return _charItemMaps.get(char.id);
}

function invalidateCharItemMap(charId) { _charItemMaps.delete(charId); }

// Returns merged {vaultName: qty} for a typeId across the given chars, or null if none found
function getQuestItemVaults(tid, chars) {
  const merged = {};
  for (const char of chars) {
    const item = getCharItemMap(char).get(tid);
    if (!item) continue;
    for (const [vault, qty] of Object.entries(item.vaults)) {
      merged[vault] = (merged[vault] || 0) + qty;
    }
  }
  return Object.keys(merged).length ? merged : null;
}
function woKeyToDisplayName(woKey) {
  const parts = woKey.split('_');
  const skill = parts[0];
  const itemRaw = parts.slice(1).join('_');
  // Insert spaces before capitals and after hyphens
  const humanized = itemRaw.replace(/([A-Z])/g,' $1').replace(/-/g,'- ').trim();
  return `${humanized} (${skill})`;
}

function resolveWORecipe(woKey) {
  if (_woResolveCache.hasOwnProperty(woKey)) return _woResolveCache[woKey];

  const parts = woKey.split('_');
  const itemKey = parts.slice(1).join(''); // strips underscores but keeps hyphens: "Soft-BoiledEggs"
  const norm = s => s.replace(/[\s\-]/g,'').toLowerCase();
  const keyNorm = norm(itemKey);

  let result = null;

  // Try 1: exact internalName match
  if (RECIPES[itemKey]) { result = RECIPES[itemKey]; }
  // Try 2: strip trailing s/es
  else if (RECIPES[itemKey.replace(/s$/,'')]) { result = RECIPES[itemKey.replace(/s$/,'')]; }
  else if (RECIPES[itemKey.replace(/es$/,'')]) { result = RECIPES[itemKey.replace(/es$/,'')]; }
  // Try 3: result item name match via prebuilt map
  else {
    const rnMap = getResultNormMap();
    result = rnMap.get(keyNorm)
          || rnMap.get(norm(itemKey.replace(/s$/,'')))
          || rnMap.get(norm(itemKey.replace(/es$/,'')))
          || null;
  }

  _woResolveCache[woKey] = result;
  return result;
}

function getInventoryQty(itemId, charItems) {
  // charItems here can be either array or a char object — normalise
  if (Array.isArray(charItems)) {
    // Fast path: use cached map if we can find the char
    for (const char of characters) {
      if (char.items === charItems) {
        const m = getCharItemMap(char);
        const item = m.get(itemId);
        return item ? item.total : 0;
      }
    }
    // Fallback linear scan
    const item = charItems.find(i => i.typeId === itemId);
    return item ? item.total : 0;
  }
  return 0;
}

function getInventoryQtyFast(itemId, itemMap) {
  const item = itemMap.get(itemId);
  return item ? item.total : 0;
}

function getInventoryQtyAllChars(itemId) {
  let total = 0;
  for (const char of characters) total += getInventoryQty(itemId, char.items);
  return total;
}

// Get per-character, per-vault breakdown of an item by typeId
function getItemLocationBreakdown(itemId) {
  // returns [{charName, charId, vaults: {vaultName: qty}, total}]
  const rows = [];
  for (const char of characters) {
    const item = char.items.find(i => i.typeId === itemId);
    if (item && item.total > 0) {
      rows.push({ charName: char.charData.Character, charId: char.id, vaults: item.vaults, total: item.total });
    }
  }
  return rows;
}

// ── Ingredient hover tooltip ──
let ingTooltipTimer = null;
function showIngTooltip(itemId, itemName, neededPerCraft, limitQty, e) {
  hideIngTooltip();
  ingTooltipTimer = setTimeout(() => {
    const breakdown = getItemLocationBreakdown(itemId);
    const totalHave = breakdown.reduce((s,r)=>s+r.total, 0);
    const totalNeeded = neededPerCraft * limitQty;
    _renderIngTooltip(itemId, itemName, totalHave, totalNeeded, breakdown, e);
  }, 250);
}

function _renderIngTooltip(itemId, itemName, totalHave, totalNeeded, breakdown, e) {
  const tip = document.createElement('div');
  tip.className = 'ing-tooltip'; tip.id = 'ingTooltip';
  const rowsHtml = breakdown.flatMap(r =>
    Object.entries(r.vaults).map(([v, qty]) =>
      `<div class="ing-tooltip-row">
        <span class="ing-tooltip-char">${r.charName}</span>
        <span class="ing-tooltip-vault">${fvn(v)}</span>
        <span class="ing-tooltip-qty">${qty}</span>
      </div>`
    )
  ).join('');
  const cls = totalHave >= totalNeeded ? 'color:var(--green)' : totalHave > 0 ? 'color:var(--gold)' : 'color:var(--red)';
  const sourcesHtml = renderItemSources(itemId, 5, 'ing');
  tip.innerHTML = `
    <div class="ing-tooltip-title">${itemName}</div>
    ${rowsHtml || '<div style="font-size:11px;color:var(--text-dim);font-style:italic">Not in any storage</div>'}
    <div class="ing-tooltip-total">Total: <strong style="${cls}">${totalHave}</strong> / ${totalNeeded} needed</div>
    ${sourcesHtml ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">${sourcesHtml}</div>` : ''}`;
  document.body.appendChild(tip);
  const W=window.innerWidth, H=window.innerHeight;
  const tw=tip.offsetWidth||240, th=tip.offsetHeight||120;
  let x=e.clientX+14, y=e.clientY+10;
  if (x+tw>W-8) x=e.clientX-tw-14;
  if (y+th>H-8) y=e.clientY-th-10;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}

function hideIngTooltip() {
  clearTimeout(ingTooltipTimer);
  document.getElementById('ingTooltip')?.remove();
}

// ── Recipe source tooltip (used on WO recipe chip) ──
let recipeSourceTooltipTimer = null;

// Build recipeKey → training entries lookup from NPC_TRAINING
function getTrainingForRecipe(recipeKey) {
  if (!dataLoaded.npc_training) return [];
  const results = [];
  for (const [npcKey, entries] of Object.entries(NPC_TRAINING)) {
    if (npcKey.startsWith('_')) continue;
    for (const e of entries) {
      if (e.recipeKey === recipeKey) {
        const npc = NPCS[npcKey];
        results.push({ npcKey, npcName: npc?.name || e.name, area: npc?.area || '', favor: e.favor, cost: e.cost, skillLevel: e.skillLevel });
        break;
      }
    }
  }
  return results;
}

const FAVOR_LABELS = { Despised:'Despised', Hatred:'Hatred', Neutral:'Neutral', Comfortable:'Comfortable', Friends:'Friends', CloseFriends:'Close Friends', BestFriends:'Best Friends', LikeFamily:'Like Family', SoulMates:'Soul Mates' };

function showRecipeSourceTooltip(recipeKey, e) {
  hideRecipeSourceTooltip();
  recipeSourceTooltipTimer = setTimeout(() => {
    const sources = dataLoaded.sources_recipes ? (SOURCES_RECIPES[recipeKey] || []) : [];
    const trainingData = getTrainingForRecipe(recipeKey); // per-NPC favor+cost
    const recipe = RECIPES[recipeKey];
    const rName = recipe ? recipe[0] : recipeKey;

    const sourceRows = sources.map(s => {
      if (s.t === 'Training') {
        // Look up accurate favor+cost from NPC_TRAINING
        const td = trainingData.find(t => t.npcKey === s.npc || t.npcName === (s.npcName||s.npc));
        const favorLabel = td ? (FAVOR_LABELS[td.favor] || td.favor) : null;
        const favorColor = td ? (FAVOR_COLORS[td.favor]?.text || '#aaa') : '#7aa0e8';
        const costStr = td?.cost != null ? `<span style="color:var(--gold);margin-left:6px">${td.cost.toLocaleString()} 🪙</span>` : '';
        const favorStr = favorLabel ? `<span style="color:${favorColor};margin-left:6px">${favorLabel}</span>` : '';
        return `<div class="ing-tooltip-row"><span style="color:#7aa0e8">🎓 ${s.npcName||s.npc||'?'}</span><span class="ing-tooltip-vault">${s.area||''}</span>${favorStr}${costStr}</div>`;
      }
      if (s.t === 'HangOut')  return `<div class="ing-tooltip-row"><span style="color:#a880d0">🤝 ${s.npcName||s.npc||'?'}</span><span class="ing-tooltip-vault">${s.area||''}</span></div>`;
      if (s.t === 'Skill')    return `<div class="ing-tooltip-row"><span style="color:#7ab880">📚 Skill: ${s.skill||'?'}</span></div>`;
      if (s.t === 'Item')     return `<div class="ing-tooltip-row"><span style="color:var(--gold)">📦 ${ITEMS[String(s.item)]?.[0]||`item #${s.item}`}</span></div>`;
      if (s.t === 'NpcGift')  return `<div class="ing-tooltip-row"><span style="color:#e07070">🎁 ${s.npcName||s.npc||'Gift'}</span><span class="ing-tooltip-vault">${s.area||''}</span></div>`;
      if (s.t === 'Quest')    return `<div class="ing-tooltip-row"><span style="color:var(--orange)">📜 Quest</span></div>`;
      if (s.t === 'Effect')   return `<div class="ing-tooltip-row"><span style="color:#60b0b0">✨ Effect</span></div>`;
      return '';
    }).filter(Boolean).join('');

    const tip = document.createElement('div');
    tip.className = 'ing-tooltip'; tip.id = 'recipeSourceTooltip';
    tip.innerHTML = `
      <div class="ing-tooltip-title">📖 ${rName}</div>
      ${sourceRows || '<div style="font-size:11px;color:var(--text-dim);font-style:italic">No source data found</div>'}`;
    document.body.appendChild(tip);

    const W = window.innerWidth, H = window.innerHeight;
    const tw = tip.offsetWidth || 240, th = tip.offsetHeight || 100;
    let x = e.clientX + 14, y = e.clientY + 10;
    if (x + tw > W - 8) x = e.clientX - tw - 14;
    if (y + th > H - 8) y = e.clientY - th - 10;
    tip.style.left = x + 'px'; tip.style.top = y + 'px';
  }, 250);
}

function hideRecipeSourceTooltip() {
  clearTimeout(recipeSourceTooltipTimer);
  document.getElementById('recipeSourceTooltip')?.remove();
}

function setMainTab(tab) {
  mainTab = tab;
  if (tab !== 'tools' || toolsSubTab !== 'gardening') stopGardenRefresh();
  else startGardenRefresh();
  if (tab === 'tools' && toolsSubTab === 'survey') surveyConnect();
  clearExpandedSources();
  expandedAvailWOs.clear();
  expandedWOs.clear();
  expandedRecipes.clear();
  _availWOEntries = null;
  // Tabs that don't support __all__ or __availwo__ — fall back to first char
  const supportsAll   = new Set(['workorders','vaults','favors','quests']);
  const supportsAvail = new Set(['workorders']);
  if (activeCharId === '__all__'     && !supportsAll.has(tab))   activeCharId = characters[0]?.id || null;
  if (activeCharId === '__availwo__' && !supportsAvail.has(tab)) activeCharId = characters[0]?.id || null;
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + tab)?.classList.add('active');
  document.getElementById('main-nav')?.classList.remove('nav-open');
  // Update settings button highlight
  const sb = document.getElementById('hdr-settings-btn');
  if (sb) sb.style.borderColor = tab === 'settings' ? 'var(--gold-dim)' : 'var(--border)';
  const showCharTabs = (tab === 'storage' || tab === 'workorders' || tab === 'vaults' || tab === 'favors' || tab === 'quests' || tab === 'recipes');
  document.getElementById('charTabsRow').style.display = showCharTabs ? '' : 'none';
  renderAll();
}

function renderAll() {
  // Always ensure activeCharId points to a valid character (or a known special value)
  const specialIds = new Set(['__all__', '__availwo__', '__favorcalc__']);
  const validChar = characters.find(c => c.id === activeCharId);
  if (!validChar && !specialIds.has(activeCharId) && characters.length > 0) {
    activeCharId = characters[0].id;
  }
  renderCharTabs();
  if (mainTab === 'storage')         renderStorageTab();
  else if (mainTab === 'workorders') {
    if (activeCharId === '__availwo__') renderAvailableWOsTab();
    else renderWorkOrdersTab();
  }
  else if (mainTab === 'recipes')    renderRecipesTab();
  else if (mainTab === 'vaults')     renderVaultsTab();
  else if (mainTab === 'favors')     renderFavorsTab();
  else if (mainTab === 'quests')     renderQuestsTab();
  else if (mainTab === 'maps')       renderMapsTab();
  else if (mainTab === 'settings')   renderSettingsTab();
  else if (mainTab === 'tools')         renderToolsTab();
}

function renderCharTabs() {
  const el = document.getElementById('charTabsRow');
  if (mainTab !== 'storage' && mainTab !== 'workorders' && mainTab !== 'vaults' && mainTab !== 'favors' && mainTab !== 'quests' && mainTab !== 'maps' && mainTab !== 'recipes') { el.innerHTML=''; return; }
  const isWO = (mainTab === 'workorders');
  const isVault = (mainTab === 'vaults');
  const isFavor = (mainTab === 'favors');
  const isQuest = (mainTab === 'quests');
  const isRecipes = (mainTab === 'recipes');
  el.innerHTML = characters.map(c => `
    <div class="char-tab ${c.id===activeCharId?'active':''}" onclick="setActiveChar('${c.id}')">
      ${c.charData.Character}
      <span style="font-size:10px;color:var(--text-dim)">${c.charData.ServerName}</span>
      <span class="badge">${c.items.length}</span>
      ${characters.length>1?`<span onclick="removeChar('${c.id}',event)" style="margin-left:1px;color:var(--text-dim);font-size:11px;opacity:.5" title="Remove">✕</span>`:''}
    </div>`).join('')
    + ((isWO || isVault || isFavor || isQuest || isRecipes) && characters.length > 1 ? `<div class="char-tab all-tab ${activeCharId==='__all__'?'active':''}" onclick="setActiveChar('__all__')">All Characters</div>` : '')
    + (isWO ? `<div class="char-tab ${activeCharId==='__availwo__'?'active':''}" onclick="setActiveChar('__availwo__')" title="Work Order scrolls in storage">📜 Available</div>` : '')
    + (isFavor ? `<div class="char-tab ${activeCharId==='__favorcalc__'?'active':''}" onclick="setActiveChar('__favorcalc__')" title="Favor Calculator"><span style="color:var(--gold);font-size:16px;line-height:1">Σ</span> Calculator</div>` : '')
    + `<div class="char-tab add-tab" onclick="pickFolder()" title="Watch folder">＋</div>`;
}

function setActiveChar(id) { activeCharId = id; activeVaultFilter = null; activeTownFilter = ''; vaultAreaFilter = ''; favorAreaFilter = ''; questLocationFilter = ''; questSearchQ = ''; completedWOSearch = ''; renderAll(); }
function removeChar(id, e) {
  e.stopPropagation();
  if (characters.length===1) { showToast("Can't remove last character"); return; }
  characters = characters.filter(c => c.id !== id);
  if (activeCharId === id) activeCharId = characters[0].id;
  renderAll();
}
