// ── Icon system ──
let iconsFolderHandle = null;       // FileSystemDirectoryHandle for the icons subfolder
let iconCache = new Map();          // iconId (number) -> objectURL string
let iconsDownloading = false;

async function saveIconsFolderHandle(h) { try { await dbPut('folder_handle','icons_folder',h); } catch(e){} }
async function loadIconsFolderHandle() { return dbGet('folder_handle','icons_folder'); }

async function tryRestoreIconsFolder() {
  const h = await loadIconsFolderHandle();
  if (!h) return;
  try {
    const perm = await h.queryPermission({ mode:'readwrite' });
    if (perm === 'granted') { iconsFolderHandle = h; await preloadIconsFromFolder(); }
  } catch(e) {}
}

// Preload all already-downloaded icons into cache as objectURLs
async function preloadIconsFromFolder() {
  if (!iconsFolderHandle) return;
  try {
    for await (const [name, handle] of iconsFolderHandle.entries()) {
      if (handle.kind === 'file' && name.startsWith('icon_') && name.endsWith('.png')) {
        const iconId = parseInt(name.slice(5, -4));
        if (!isNaN(iconId) && !iconCache.has(iconId)) {
          const file = await handle.getFile();
          iconCache.set(iconId, URL.createObjectURL(file));
        }
      }
    }
  } catch(e) {}
}

// Get icon URL for a given iconId — returns cached objectURL or null
function getIconUrl(iconId) {
  if (!iconId) return null;
  return iconCache.get(iconId) || null;
}

// Get icon URL for a typeId via ITEMS lookup
function getItemIconUrl(typeId) {
  if (!typeId || !dataLoaded.items) return null;
  // ITEMS stores [name, maxStack] — we need iconId separately
  // We store iconId in ITEMS_ICONS map built when items load
  const iconId = ITEMS_ICONS[String(typeId)];
  return iconId ? getIconUrl(iconId) : null;
}

let ITEMS_ICONS = {}; // typeId -> iconId (built from items data if available)
let ITEMS_BY_NAME = {}; // lowercase item name -> typeId (fallback for WO icons)

// Get icon ID for a work order — tries recipe result first, then item name lookup
function getWOIconId(woKey, recipe) {
  const resultId = recipe?.[3]?.[0]?.[0];
  if (resultId && ITEMS_ICONS[String(resultId)]) return ITEMS_ICONS[String(resultId)];
  // Fallback: derive item name from WO key e.g. "Gardening_Dahlias" -> "dahlia"
  const raw = woKey.split('_').slice(1).join('').toLowerCase();
  const itemId = ITEMS_BY_NAME[raw]
    || ITEMS_BY_NAME[raw.replace(/s$/, '')]
    || ITEMS_BY_NAME[raw.replace(/es$/, '')];
  return itemId ? ITEMS_ICONS[String(itemId)] : null;
}

// Try to get icons subfolder from watched folder, or create it
async function getOrCreateIconsFolder() {
  if (iconsFolderHandle) return iconsFolderHandle;
  if (!folderHandle) {
    showToast('Please select a Watch Folder first');
    return null;
  }
  try {
    const h = await folderHandle.getDirectoryHandle('icons', { create: true });
    iconsFolderHandle = h;
    await saveIconsFolderHandle(h);
    return h;
  } catch(e) {
    showToast('Could not create icons folder: ' + e.message);
    return null;
  }
}

async function downloadAllIcons() {
  if (iconsDownloading) return;
  if (!dataLoaded.items) { showToast('Load pg_items.json first'); return; }

  const iconFolder = await getOrCreateIconsFolder();
  if (!iconFolder) return;

  // Collect all unique icon IDs from ITEMS_ICONS
  const allIconIds = [...new Set(Object.values(ITEMS_ICONS))].filter(Boolean);
  if (allIconIds.length === 0) { showToast('No icon IDs found — reload pg_items.json'); return; }

  iconsDownloading = true;
  let done = 0, skipped = 0, failed = 0;
  const total = allIconIds.length;

  updateIconDownloadProgress(done, total, skipped, failed);

  // Process in batches of 10 concurrent
  const BATCH = 10;
  for (let i = 0; i < allIconIds.length; i += BATCH) {
    const batch = allIconIds.slice(i, i + BATCH);
    await Promise.all(batch.map(async iconId => {
      // Skip if already on disk
      try {
        await iconFolder.getFileHandle(`icon_${iconId}.png`);
        skipped++; done++;
        return;
      } catch(e) {}
      // Download
      try {
        const res = await fetch(`${CDN_ICONS_BASE}icon_${iconId}.png`);
        if (!res.ok) throw new Error(res.status);
        const blob = await res.blob();
        const fh = await iconFolder.getFileHandle(`icon_${iconId}.png`, { create: true });
        const writable = await fh.createWritable();
        await writable.write(blob);
        await writable.close();
        iconCache.set(iconId, URL.createObjectURL(blob));
        done++;
      } catch(e) {
        failed++; done++;
      }
    }));
    updateIconDownloadProgress(done, total, skipped, failed);
    // Small yield to keep UI responsive
    await new Promise(r => setTimeout(r, 0));
  }

  iconsDownloading = false;
  showToast(`✓ Icons done: ${done - failed} saved, ${failed} failed`);
  updateSettingsStatus();
}

function updateIconDownloadProgress(done, total, skipped, failed) {
  const el = document.getElementById('iconProgressWrap');
  if (!el) return;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
      <div style="flex:1;height:6px;background:var(--bg);border-radius:3px;border:1px solid var(--border);overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;transition:width .2s"></div>
      </div>
      <span style="font-size:11px;color:var(--text-dim);white-space:nowrap">${done}/${total} (${skipped} cached, ${failed} failed)</span>
    </div>`;
}

// When opened as file://, relative fetch has no origin — use absolute URL instead.
const API_BASE = location.protocol === 'file:' ? 'http://localhost:3000' : '';

async function checkForUpdate() {
  const btn = document.getElementById('updateCheckBtn');
  const status = document.getElementById('updateStatus');
  if (btn) btn.disabled = true;
  if (status) status.textContent = 'Checking…';
  try {
    const res = await fetch(API_BASE + '/api/check-update');
    const data = await res.json();
    if (data.error) {
      if (status) status.innerHTML = `<span style="color:var(--red)">Could not reach GitHub: ${data.error}</span>`;
    } else if (data.upToDate) {
      if (status) status.innerHTML = `<span style="color:var(--green)">✓ Up to date (v${data.local})</span>`;
    } else {
      if (status) status.innerHTML = `<span style="color:var(--gold)">Update available: v${data.local} → v${data.remote}</span>
        <button class="ctx-btn" onclick="doUpdate()" style="margin-left:8px">⬇ Update &amp; Reload</button>`;
    }
  } catch(e) {
    if (status) status.innerHTML = `<span style="color:var(--text-dim)">Could not reach server — make sure Survey Helper is running (${e.message})</span>`;
  }
  if (btn) btn.disabled = false;
}

async function doUpdate() {
  const status = document.getElementById('updateStatus');
  if (status) status.innerHTML = `<span style="color:var(--text-dim)">Updating…</span>`;
  try {
    const res = await fetch(API_BASE + '/api/update', { method: 'POST' });
    const data = await res.json();
    if (data.status === 'ok') {
      if (status) status.innerHTML = `<span style="color:var(--green)">✓ Updated — reloading…</span>`;
      setTimeout(() => location.reload(), 1200);
    } else {
      if (status) status.innerHTML = `<span style="color:var(--red)">Update failed: ${data.output}</span>`;
    }
  } catch(e) {
    if (status) status.innerHTML = `<span style="color:var(--red)">Error: ${e.message}</span>`;
  }
}

async function clearWOLimit(woKey) {
  delete woLimitsCache[woKey];
  await dbDelete('wo_limits', woKey);

async function syncFile(key) {
  const df = DATA_FILES.find(d=>d.key===key);
  if (!df) return;
  const statusEl = document.getElementById('status_'+key);
  const btnEl = document.getElementById('syncbtn_'+key);
  if (statusEl) { statusEl.className='settings-status loading'; statusEl.textContent='⟳ Syncing…'; }
  if (btnEl) btnEl.disabled = true;
  try {
    const res = await fetch(CDN_BASE + df.cdn);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.json();
    // Process into our minimal format
    const processed = processCDNData(key, raw);
    applyGameData(key, processed);
    // Save to folder if we have write access (we don't — read only), just keep in memory
    showToast(`✓ ${df.label} synced`);
  } catch(e) {
    showToast(`✗ Sync failed: ${e.message}`);
    if (statusEl) { statusEl.className='settings-status missing'; statusEl.textContent='✗ Sync failed'; }
  }
  if (btnEl) btnEl.disabled = false;
  renderSettingsTab();
}

async function syncAllFiles() { for (const df of DATA_FILES) await syncFile(df.key); }

function processCDNData(key, raw) {
  if (key === 'items') {
    const out = {};
    for (const [k,v] of Object.entries(raw)) { const id=k.split('_')[1]; if(id) out[id]=[v.Name||'',v.MaxStackSize||1]; }
    return out;
  }
  if (key === 'recipes') {
    const out = {};
    for (const [,v] of Object.entries(raw)) {
      const internal = v.InternalName||'';
      if (!internal) continue;
      const ings = (v.Ingredients||[]).filter(i=>i.ItemCode).map(i=>[i.ItemCode,i.StackSize]);
      const results = (v.ResultItems||[]).filter(r=>r.ItemCode).map(r=>[r.ItemCode,r.StackSize]);
      out[internal] = [v.Name||'', v.Skill||'', ings, results];
    }
    return out;
  }
  if (key === 'itemuses') {
    const out = {};
    for (const [k,v] of Object.entries(raw)) {
      const iid = k.split('_')[1]; if (!iid) continue;
      const rids = v.RecipesThatUseItem||[];
      const internals = rids.map(rid=>{
        for (const [rk,rv] of Object.entries(RECIPES)) { if (rv && rv._rid === rid) return rk; }
        return String(rid);
      }).filter(Boolean);
      if (internals.length) out[iid] = internals;
    }
    return out;
  }
  if (key === 'sources_recipes') {
    // Build rid -> internalName from loaded RECIPES, then map sources
    const ridToInternal = {};
    // We can't easily reverse RECIPES here — return raw keyed by recipe_NNN for now and resolve lazily
    // Actually process same as pg_sources_recipes.json format using RECIPES if available
    const out = {};
    for (const [k, v] of Object.entries(raw)) {
      const rid = parseInt(k.split('_')[1]);
      // Find internal name from RECIPES
      let internal = '';
      for (const [rk, rv] of Object.entries(RECIPES)) {
        // RECIPES doesn't store rid, so we skip CDN processing — user should use local files
        break;
      }
      if (!internal) continue;
      const entries = (v.entries||[]).map(e => {
        const entry = {t: e.type};
        if (e.npc) { entry.npc = e.npc; entry.npcName = NPCS[e.npc]?.name || e.npc.replace('NPC_',''); entry.area = NPCS[e.npc]?.area || ''; }
        if (e.skill) entry.skill = e.skill;
        if (e.itemTypeId) entry.item = e.itemTypeId;
        return entry;
      });
      out[internal] = entries;
    }
    return out;
  }
  if (key === 'npcs') {
    const out = {};
    for (const [k,v] of Object.entries(raw)) {
      const prefs = (v.Preferences||[]).map(p => ({
        name: p.Name || (p.Keywords||[]).join(', '),
        desire: p.Desire||'',
        pref: p.Pref||0,
        keywords: p.Keywords||[]
      }));
      out[k] = {
        name: v.Name||k.replace('NPC_',''),
        area: v.AreaFriendlyName||'',
        desc: v.Desc||'',
        services: (v.Services||[]).map(s=>({type:s.Type,favor:s.Favor,skills:s.Skills||[],unlocks:s.Unlocks||[]})),
        prefs
      };
    }
    return out;
  }
  if (key === 'vaults') {
    const out = {};
    for (const [k,v] of Object.entries(raw)) {
      out[k] = { name:v.NpcFriendlyName||k, area:v.Area||'', numSlots:v.NumSlots??null, levels:v.Levels||null, grouping:v.Grouping||null, reqDesc:v.RequirementDescription||null };
    }
    return out;
  }
  if (key === 'sources_items') {
    const KEEP = new Set(['Vendor','Barter','HangOut','NpcGift','Monster','Angling','CorpseButchering','CorpseSkinning','TreasureMap']);
    const out = {};
    for (const [k,v] of Object.entries(raw)) {
      const tid = k.split('_')[1]; if (!tid) continue;
      const seen = new Set();
      const entries = (v.entries||[]).reduce((acc,e) => {
        const t = e.type||''; if (!KEEP.has(t)) return acc;
        const npcKey = e.npc;
        const npcData = NPCS[npcKey]||{};
        const area = npcData.area||'';
        if (t in {'NpcGift':1,'HangOut':1} && !area) return acc;
        const dk = t+(npcKey||t);
        if (seen.has(dk)) return acc; seen.add(dk);
        const entry = {t};
        if (npcData.name) { entry.n = npcData.name; entry.a = area; }
        acc.push(entry);
        return acc;
      }, []);
      if (entries.length) out[tid] = entries;
    }
    return out;
  }
  return raw;
}

}

// SKILL PICKER MODAL
// ═══════════════════════════════════════════════════════════
let pickerCharId = null;
let pickerFilter = '';

function openSkillPicker(charId) {
  pickerCharId = charId;
  pickerFilter = '';
  renderSkillPicker();
}

function renderSkillPicker() {
  document.getElementById('ctxPopup')?.remove(); // close any right-click popup
  document.getElementById('skillPickerOverlay')?.remove();

  const char = characters.find(c => c.id === pickerCharId);
  if (!char) return;

  const allSkills = char.charData.Skills || {};
  const pinned = getPinnedSkills(pickerCharId);

  // Filter + sort: pinned first, then alphabetical
  const skillEntries = Object.entries(allSkills)
    .filter(([k]) => k !== 'Unknown')
    .filter(([k]) => !pickerFilter || k.replace(/([A-Z])/g,' $1').trim().toLowerCase().includes(pickerFilter.toLowerCase()))
    .sort((a, b) => {
      const ap = pinned.has(a[0]), bp = pinned.has(b[0]);
      if (ap !== bp) return ap ? -1 : 1;
      return a[0].localeCompare(b[0]);
    });

  const items = skillEntries.map(([name, s]) => {
    const sel = pinned.has(name);
    const displayName = name.replace(/([A-Z])/g,' $1').trim();
    return `<div class="skill-picker-item ${sel?'selected':''}" onclick="pickerToggle('${name}')">
      <input type="checkbox" ${sel?'checked':''} tabindex="-1">
      <span class="skill-picker-item-name">${displayName}</span>
      <span class="skill-picker-item-lvl">${s.Level}</span>
    </div>`;
  }).join('');

  const overlay = document.createElement('div');
  overlay.className = 'skill-picker-overlay';
  overlay.id = 'skillPickerOverlay';
  overlay.innerHTML = `
    <div class="skill-picker-modal" onclick="event.stopPropagation()">
      <div class="skill-picker-header">
        <h3>Pin Skills — ${char.charData.Character}</h3>
        <input class="skill-picker-search" id="pickerSearch" type="text" placeholder="Filter skills…"
          value="${pickerFilter.replace(/"/g,'&quot;')}" oninput="pickerSearchChange(this.value)" autocomplete="off">
        <button class="ctx-btn" onclick="closeSkillPicker()">✕</button>
      </div>
      <div class="skill-picker-body">
        <div class="skill-picker-grid" id="pickerGrid">${items}</div>
      </div>
      <div class="skill-picker-footer">
        <span class="skill-picker-count">${pinned.size} skill${pinned.size!==1?'s':''} pinned</span>
        <button class="ctx-btn danger" onclick="clearAllPins()" ${pinned.size===0?'disabled':''}>Clear all</button>
        <button class="ctx-btn primary" onclick="closeSkillPicker()">Done</button>
      </div>
    </div>`;
  overlay.addEventListener('click', closeSkillPicker);
  document.body.appendChild(overlay);
  // Focus search
  setTimeout(() => document.getElementById('pickerSearch')?.focus(), 50);
}

function pickerSearchChange(val) {
  pickerFilter = val;
  renderSkillPicker();
  // Re-focus and restore cursor at end
  setTimeout(() => {
    const el = document.getElementById('pickerSearch');
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 10);
}

async function pickerToggle(skillName) {
  await togglePinnedSkill(pickerCharId, skillName);
  renderSkillPicker();
  // Re-render sidebar live
  const char = characters.find(c => c.id === pickerCharId);
  if (char && document.getElementById('leftPanel')) renderLeft(char);
}

async function clearAllPins() {
  pinnedSkillsCache[pickerCharId] = new Set();
  await savePinnedSkills(pickerCharId);
  renderSkillPicker();
  const char = characters.find(c => c.id === pickerCharId);
  if (char && document.getElementById('leftPanel')) renderLeft(char);
}

function closeSkillPicker() {
  document.getElementById('skillPickerOverlay')?.remove();
  pickerCharId = null;
  pickerFilter = '';
  // Final re-render of sidebar
  const char = characters.find(c => c.id === activeCharId);
  if (char && document.getElementById('leftPanel')) renderLeft(char);
}

// SURVEY TAB
// ═══════════════════════════════════════════════════════════

const SURVEY_WS_URL = 'ws://localhost:8765';

function setSurveyTabVisible(visible, saveToStorage = true) {
  showSurveyTab = visible;
  const el = document.getElementById('nav-survey');
  if (el) el.style.display = visible ? '' : 'none';
  if (saveToStorage) localStorage.setItem('showSurveyTab', visible ? '1' : '0');
  if (visible) surveyConnect();
  if (mainTab === 'settings') renderSettingsTab();
}

function surveyConnect() {
  if (!showSurveyTab) return;
  if (surveyWs && surveyWs.readyState <= 1) return; // already open or connecting
  try {
    surveyWs = new WebSocket(SURVEY_WS_URL);
    surveyWs.onopen = () => {
      surveyConnected = true;
      if (mainTab === 'survey') renderSurveyTab();
    };
    surveyWs.onclose = () => {
      surveyConnected = false;
      surveyWs = null;
      if (mainTab === 'survey') renderSurveyTab();
      if (showSurveyTab && !surveyShuttingDown) setTimeout(surveyConnect, 3000);
      surveyShuttingDown = false;
    };
    surveyWs.onerror = () => {};
    surveyWs.onmessage = e => { try { surveyHandleMessage(JSON.parse(e.data)); } catch(_) {} };
  } catch(e) {
    if (showSurveyTab) setTimeout(surveyConnect, 3000);
  }
}

function surveyLaunch() {
  const btn = document.getElementById('surveyLaunchBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Starting…'; }

  // Fire the custom URL protocol registered by:  py Survey/setup_protocol.py
  // Works from any browser (file:// or http://), no HTTP server needed.
  const a = document.createElement('a');
  a.href = 'gorgon-survey://launch';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // Silent fallback: also hit start_server.py endpoint if it happens to be running.
  fetch('/api/start-survey', { method: 'POST' }).catch(() => {});

  // Poll for WebSocket connection — main.pyw takes ~1-2 s to bind port 8765.
  showToast('Survey Helper starting…');
  let attempts = 0;
  const poll = setInterval(() => {
    attempts++;
    surveyConnect();
    if (surveyConnected || attempts >= 10) {
      clearInterval(poll);
      if (btn) { btn.disabled = false; btn.textContent = '▶ Start Survey Helper'; }
    }
  }, 1500);
}

function surveySend(obj) {
  if (surveyWs && surveyWs.readyState === WebSocket.OPEN) surveyWs.send(JSON.stringify(obj));
}

function surveySetHotkey(id, vkField, modsField) {
  const sel = document.getElementById('hkSel_' + id);
  const vk = sel ? +sel.value : 0;
  if (!vk) return;
  let mods = 0;
  [1, 2, 4].forEach(bit => {
    const cb = document.getElementById('hkMod_' + id + '_' + bit);
    if (cb && cb.checked) mods |= bit;
  });
  surveySend({type: 'cmd_update_config', [vkField]: vk, [modsField]: mods});
}

function surveyHandleMessage(msg) {
  switch(msg.type) {
    case 'shutdown_ack':
      surveyShuttingDown = true;
      if (surveyWs) surveyWs.close();
      return;
    case 'state_full':
      surveyLocations = msg.locations || [];
      surveyRouteOrder = msg.route_id_order || [];
      surveySlotLabels = msg.slot_labels || {};
      surveySetupActive = msg.surveying && !msg.setup_complete;
      surveySetupComplete = msg.setup_complete;
      surveyActiveArea = msg.active_area || surveyActiveArea;
      surveyStatus = msg.status || '';
      surveyConfig = msg.config || surveyConfig;
      if (msg.player_east != null) surveyConfig.player_east = msg.player_east;
      if (msg.player_south != null) surveyConfig.player_south = msg.player_south;
      surveyCirclePins = [];
      if (mainTab === 'survey') renderSurveyTab();
      break;
    case 'survey_detected':
      surveyLocations.push(msg.location);
      surveyStatus = msg.status || '';
      if (mainTab === 'survey') { surveyRenderList(); surveyDrawCanvas(); surveyUpdateStatus(); }
      break;
    case 'survey_duplicate':
      surveyStatus = msg.status || '';
      if (mainTab === 'survey') surveyUpdateStatus();
      break;
    case 'survey_completed':
    case 'survey_unmarked':
      surveyLocations = msg.locations || surveyLocations;
      surveySlotLabels = msg.slot_labels || surveySlotLabels;
      surveyStatus = msg.status || '';
      if (mainTab === 'survey') { surveyRenderList(); surveyDrawCanvas(); surveyUpdateStatus(); }
      break;
    case 'area_changed':
      surveyActiveArea = msg.area;
      surveyStatus = msg.status || '';
      if (mainTab === 'survey') surveyUpdateStatus();
      break;
    case 'setup_stopped':
      // Sent by server whenever Stop Setup is pressed, even with 0 locations.
      // route_calculated may follow immediately if there are locations to route.
      surveyLocations = msg.locations || [];
      surveySetupActive = false;
      surveySetupComplete = true;
      if (mainTab === 'survey') renderSurveyTab();
      break;
    case 'route_calculated':
      surveyLocations = msg.locations || [];
      surveyRouteOrder = msg.route_id_order || [];
      surveySlotLabels = msg.slot_labels || {};
      surveySetupActive = false;
      surveySetupComplete = true;
      surveyStatus = msg.status || '';
      if (mainTab === 'survey') renderSurveyTab();
      break;
    case 'player_pos':
      if (msg.east != null) surveyPlayerMeters = {east: msg.east, south: msg.south};
      if (mainTab === 'survey') surveyDrawCanvas();
      break;
    case 'circle_pin_added':
      surveyCirclePins.push({px: msg.pixel_x, py: msg.pixel_y});
      if (mainTab === 'survey') surveyDrawCanvas();
      break;
    case 'status':
    case 'error':
    case 'pong':
      if (msg.message) surveyStatus = msg.message;
      if (mainTab === 'survey') surveyUpdateStatus();
      break;
  }
}

function surveyUpdateStatus() {
  const el = document.getElementById('surveyStatusMsg');
  if (el) el.textContent = surveyStatus;
}

// ── Survey list ───────────────────────────────────────────

function surveyRenderList() {
  const el = document.getElementById('surveyList');
  if (!el) return;

  if (!surveyLocations.length) {
    el.innerHTML = `<div style="padding:20px 16px;color:var(--text-dim);font-size:12px;text-align:center">
      ${surveySetupActive ? 'Use survey items in-game to add locations…' : 'No locations yet'}
    </div>`;
    return;
  }

  // Build route-number lookup: location id → route number
  const routeNum = {};
  surveyRouteOrder.forEach((id, i) => { routeNum[id] = i + 1; });

  // Sort: unvisited in route order first, then visited
  const unvisited = surveyLocations.filter(l => !l.visited).sort((a,b) => (routeNum[a.id]||99) - (routeNum[b.id]||99));
  const visited   = surveyLocations.filter(l =>  l.visited);
  const sorted = [...unvisited, ...visited];

  el.innerHTML = sorted.map(loc => {
    const num = routeNum[loc.id] || '–';
    const ew = (loc.east_absolute||0) >= 0 ? 'E' : 'W';
    const ns = (loc.south_absolute||0) >= 0 ? 'S' : 'N';
    const ea = Math.abs(loc.east_absolute||0).toFixed(0);
    const sa = Math.abs(loc.south_absolute||0).toFixed(0);
    const visitBtn = loc.visited
      ? `<button onclick="event.stopPropagation();surveySend({type:'cmd_unmark_visited',location_id:${loc.id}})"
           title="Unmark as visited"
           style="background:none;border:1px solid #4c4;border-radius:3px;color:#4c4;font-size:11px;padding:1px 5px;cursor:pointer;line-height:1.4"
           onmouseenter="this.style.background='rgba(68,204,68,.15)'" onmouseleave="this.style.background='none'">✓</button>`
      : '';
    return `<div onclick="${loc.visited ? '' : `surveySend({type:'cmd_mark_visited',location_id:${loc.id}})`}"
      style="display:flex;align-items:center;gap:8px;padding:7px 12px;${loc.visited?'':'cursor:pointer;'}border-bottom:1px solid var(--border);opacity:${loc.visited?'.55':'1'}"
      ${loc.visited ? '' : `onmouseenter="this.style.background='var(--bg2)'" onmouseleave="this.style.background=''"`}>
      <span style="font-family:'Cinzel',serif;font-size:11px;color:${loc.visited?'var(--text-dim)':'var(--gold)'};min-width:22px;text-align:right">#${num}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${loc.visited?'var(--text-dim)':'var(--text)'}">${loc.item_name}</div>
        <div style="font-size:11px;color:var(--text-dim)">${ea}${ew}, ${sa}${ns}</div>
      </div>
      ${visitBtn}
    </div>`;
  }).join('');
}

// ── Survey canvas ─────────────────────────────────────────

function surveyDrawCanvas() {
  const canvas = document.getElementById('surveyCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  if (!W || !H) return;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1a1f';
  ctx.fillRect(0, 0, W, H);

  const locs = surveyLocations.filter(l => l.east_absolute != null);

  if (surveySetupActive && surveyCirclePins.length > 0) {
    // Setup mode: show crosshairs for detected red circles (pixel coords — just draw in centre area)
    const pad = 40;
    surveyCirclePins.forEach((pin, i) => {
      const x = pad + (i % 5) * ((W - pad*2) / 5);
      const y = pad + Math.floor(i / 5) * 40;
      ctx.strokeStyle = '#ffe600cc';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-12,y); ctx.lineTo(x+12,y); ctx.moveTo(x,y-12); ctx.lineTo(x,y+12); ctx.stroke();
    });
    if (!locs.length) {
      ctx.fillStyle = '#ffffff44';
      ctx.font = '12px Crimson Pro, serif';
      ctx.textAlign = 'center';
      ctx.fillText(`${surveyCirclePins.length} pin${surveyCirclePins.length!==1?'s':''} detected`, W/2, H-20);
    }
  }

  if (!locs.length) {
    ctx.fillStyle = '#ffffff33';
    ctx.font = '13px Crimson Pro, serif';
    ctx.textAlign = 'center';
    ctx.fillText(surveySetupActive ? 'Use survey items — locations will appear here' : 'No locations', W/2, H/2);
    return;
  }

  // Compute bounding box
  let minE = Infinity, maxE = -Infinity, minS = Infinity, maxS = -Infinity;
  locs.forEach(l => {
    minE = Math.min(minE, l.east_absolute); maxE = Math.max(maxE, l.east_absolute);
    minS = Math.min(minS, l.south_absolute); maxS = Math.max(maxS, l.south_absolute);
  });
  if (surveyPlayerMeters) {
    minE = Math.min(minE, surveyPlayerMeters.east); maxE = Math.max(maxE, surveyPlayerMeters.east);
    minS = Math.min(minS, surveyPlayerMeters.south); maxS = Math.max(maxS, surveyPlayerMeters.south);
  }

  const pad = 45;
  const rangeE = maxE - minE || 100;
  const rangeS = maxS - minS || 100;
  const scale = Math.min((W - pad*2) / rangeE, (H - pad*2) / rangeS);

  function toCanvas(e, s) {
    return [pad + (e - minE) * scale, pad + (s - minS) * scale];
  }

  // Build route-number lookup
  const routeNum = {};
  surveyRouteOrder.forEach((id, i) => { routeNum[id] = i + 1; });

  // Unvisited in route order
  const unvisited = surveyLocations
    .filter(l => !l.visited && l.east_absolute != null)
    .sort((a,b) => (routeNum[a.id]||99) - (routeNum[b.id]||99));

  // Draw route lines
  if (unvisited.length > 1 || (unvisited.length === 1 && surveyPlayerMeters)) {
    ctx.strokeStyle = '#46a0ff88';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    if (surveyPlayerMeters) {
      const [px, py] = toCanvas(surveyPlayerMeters.east, surveyPlayerMeters.south);
      if (unvisited.length) {
        const [fx, fy] = toCanvas(unvisited[0].east_absolute, unvisited[0].south_absolute);
        ctx.moveTo(px, py); ctx.lineTo(fx, fy);
      }
    }
    for (let i = 0; i < unvisited.length - 1; i++) {
      const [ax, ay] = toCanvas(unvisited[i].east_absolute, unvisited[i].south_absolute);
      const [bx, by] = toCanvas(unvisited[i+1].east_absolute, unvisited[i+1].south_absolute);
      ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw location markers
  locs.forEach(loc => {
    const [x, y] = toCanvas(loc.east_absolute, loc.south_absolute);
    const num = routeNum[loc.id] || '?';
    const r = loc.visited ? 9 : 11;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = loc.visited ? '#3c7a3c' : '#cc8800';
    ctx.fill();
    ctx.strokeStyle = loc.visited ? '#4c4' : '#ffd700';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = loc.visited ? '#aaffaa' : '#000';
    ctx.font = `bold ${loc.visited?9:10}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(num), x, y);
  });

  // Draw player dot
  if (surveyPlayerMeters) {
    const [px, py] = toCanvas(surveyPlayerMeters.east, surveyPlayerMeters.south);
    ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI*2);
    ctx.fillStyle = '#00c8ffcc';
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

  const inv = surveyConfig.inventory || {};
  const mc  = surveyConfig.map_capture || {};
  const r   = purpose === 'inventory'
    ? { x: inv.screen_x|0, y: inv.screen_y|0, w: inv.slot_width|0, h: inv.slot_height|0 }
    : { x: mc.x|0,         y: mc.y|0,         w: mc.w|0,           h: mc.h|0 };
  surveySend({ type: 'cmd_highlight_region', ...r });
}

function surveyRegionBlur() {
  // Short delay so switching between sibling inputs doesn't flicker
  _surveyHighlightBlurTimer = setTimeout(() => {
    surveySend({ type: 'cmd_hide_highlight' });
  }, 300);
}

function surveyRegionInput(purpose, field, value) {
  clearTimeout(_surveyHighlightBlurTimer);
  // Update local cache
  if (purpose === 'inventory') {
    if (!surveyConfig.inventory) surveyConfig.inventory = {};
    surveyConfig.inventory[field] = value;
    const inv = surveyConfig.inventory;
    surveySend({ type: 'cmd_highlight_region', x: inv.screen_x|0, y: inv.screen_y|0, w: inv.slot_width|0, h: inv.slot_height|0 });
    surveySend({ type: 'cmd_update_config', inventory: { [field]: value } });
  } else {
    if (!surveyConfig.map_capture) surveyConfig.map_capture = {};
    surveyConfig.map_capture[field] = value;
    const mc = surveyConfig.map_capture;
    surveySend({ type: 'cmd_highlight_region', x: mc.x|0, y: mc.y|0, w: mc.w|0, h: mc.h|0 });
    surveySend({ type: 'cmd_update_config', map_capture: { [field]: value } });
  }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  await openDB();
  await loadWOLimits();
  await loadWOCompleted();
  await loadPinnedSkills();

  // Restore survey tab visibility preference
  if (localStorage.getItem('showSurveyTab') === '1') setSurveyTabVisible(true, false);

  // Try restore folder (will also load game data files)
  await tryRestoreFolder();
  await tryRestoreIconsFolder();
  renderAll();
});
</script>
