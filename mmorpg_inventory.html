// ═══════════════════════════════════════════════════════════
// WORK ORDERS TAB
// ═══════════════════════════════════════════════════════════
function renderWorkOrdersTab() {
  const showAll = activeCharId === '__all__';
  const chars = showAll ? characters : characters.filter(c=>c.id===activeCharId);
  if (chars.length === 0) { document.getElementById('appContent').innerHTML='<div class="full-panel"><div class="empty-state"><div class="icon">📋</div><h3>No character loaded</h3></div></div>'; return; }

  let html = '<div class="full-panel">';

  // ── Active Work Orders ──
  const activeWOs = [];
  for (const char of chars) {
    for (const woKey of (char.charData.ActiveWorkOrders||[])) {
      const limit = woLimitsCache[woKey] || 10;
      const recipe = resolveWORecipe(woKey);
      activeWOs.push({ woKey, char, limit, recipe, charItems: char.items });
    }
  }

  html += `<div class="wo-section"><div class="wo-section-title">Active Work Orders <span class="badge">${activeWOs.length}</span></div>`;
  if (activeWOs.length === 0) {
    html += '<div class="empty-state" style="padding:20px"><div class="icon">📋</div><h3>No active work orders</h3></div>';
  } else {
    for (const { woKey, char, limit, recipe, charItems } of activeWOs) {
      html += renderWOCard(woKey, char, limit, recipe, charItems, showAll, false, null);
    }
  }
  html += '</div>';

  // ── Completed Work Orders ──
  const THIRTY_DAYS = 30*24*60*60*1000;
  const now = Date.now();
  const charIds = new Set(chars.map(c=>c.id));
  // Sort soonest-to-reset first (smallest remaining time at top)
  const recentCompleted = woCompletedLog
    .filter(e => charIds.has(e.charId) && (now - e.ts) < THIRTY_DAYS)
    .sort((a, b) => b.ts - a.ts); // older = less remaining = sort first

  // Static completed (from char data, not yet tracked with timestamp)
  const loggedKeys = new Set(recentCompleted.map(e=>e.woKey+'_'+e.charId));
  const staticCompleted = [];
  for (const char of chars) {
    for (const woKey of (char.charData.CompletedWorkOrders||[])) {
      if (!loggedKeys.has(woKey+'_'+char.id))
        staticCompleted.push({ woKey, char, name: woKeyToDisplayName(woKey) });
    }
  }

  const totalCompleted = recentCompleted.length + staticCompleted.length;

  // Filter by search
  const cq = completedWOSearch.toLowerCase().trim();
  const filteredRecent  = cq ? recentCompleted.filter(e  => (resolveWORecipe(e.woKey)?.[0] || woKeyToDisplayName(e.woKey)).toLowerCase().includes(cq)) : recentCompleted;
  const filteredStatic  = cq ? staticCompleted.filter(e  => e.name.toLowerCase().includes(cq)) : staticCompleted;
  const filteredTotal   = filteredRecent.length + filteredStatic.length;

  html += `<div class="wo-section">
    <div class="wo-section-title">Completed Work Orders <span class="badge">${totalCompleted}</span></div>
    <div class="search-input-wrap" style="max-width:280px;margin-bottom:12px">
      <button class="search-clear ${completedWOSearch?'visible':''}" onclick="clearCompletedWOSearch()">✕</button>
      <input class="search-input" id="completedWOSearchInput" style="padding-left:34px" placeholder="Search completed…"
        value="${completedWOSearch.replace(/"/g,'&quot;')}" oninput="onCompletedWOSearch(this.value)">
      <span class="search-icon">⌕</span>
    </div>`;

  if (filteredRecent.length > 0) {
    html += `<div style="font-size:11px;color:var(--text-dim);margin-bottom:10px">Tracked completions — bar shows time until 30-day reset:</div>`;
    for (const entry of filteredRecent) {
      const char = characters.find(c=>c.id===entry.charId) || chars[0];
      const recipe = resolveWORecipe(entry.woKey);
      const limit = woLimitsCache[entry.woKey] || 10;
      html += renderWOCard(entry.woKey, char, limit, recipe, char.items, showAll, true, entry.ts);
    }
  }

  if (filteredStatic.length > 0) {
    html += `<div style="font-size:11px;color:var(--text-dim);margin:${filteredRecent.length?14:0}px 0 8px">All completed (from character data — completion date unknown):</div>`;
    html += '<div style="display:flex;flex-direction:column;gap:3px">';
    for (const { woKey, char, name } of filteredStatic.slice(0, 120)) {
      const iconId = getWOIconId(woKey, resolveWORecipe(woKey));
      const iconUrl = iconId ? getIconUrl(iconId) : null;
      const iconHtml = iconUrl ? `<img class="item-icon" src="${iconUrl}" alt="" style="width:16px;height:16px;margin-right:6px;vertical-align:middle">` : '';
      html += `<div class="wo-card complete" style="padding:7px 12px">
        <div class="wo-header" style="margin-bottom:0">
          <div style="display:flex;align-items:center">${iconHtml}<div class="wo-name" style="font-size:13px">${name}</div></div>
          ${showAll?`<span class="wo-char-tag">${char.charData.Character}</span>`:''}
        </div>
      </div>`;
    }
    html += '</div>';
    if (filteredStatic.length > 120) html += `<div style="font-size:11px;color:var(--text-dim);padding:6px 0">…and ${filteredStatic.length-120} more</div>`;
  }

  if (totalCompleted === 0) {
    html += '<div class="empty-state" style="padding:20px"><div class="icon">✓</div><h3>No completed work orders yet</h3><p style="font-size:12px;margin-top:6px">Completions will be tracked when detected from your character file</p></div>';
  } else if (filteredTotal === 0) {
    html += `<div style="font-size:12px;color:var(--text-dim);padding:10px 0">No completed work orders match "<strong>${completedWOSearch}</strong>"</div>`;
  }
  html += '</div></div>';
  document.getElementById('appContent').innerHTML = html;
}

function toggleWOCard(expandKey) {
  if (expandedWOs.has(expandKey)) expandedWOs.delete(expandKey);
  else expandedWOs.add(expandKey);
  renderAll();
}

function onCompletedWOSearch(v) {
  completedWOSearch = v;
  // Partial re-render: preserve search focus — just re-render the WO tab
  renderWorkOrdersTab();
  // Restore focus
  setTimeout(() => {
    const el = document.getElementById('completedWOSearchInput');
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 10);
}
function clearCompletedWOSearch() { completedWOSearch = ''; renderWorkOrdersTab(); }

function renderWOCard(woKey, char, limit, recipe, charItems, showChar, isCompleted, completedTs, extraHtml = '') {
  const displayName = woKeyToDisplayName(woKey);
  const skill = woKey.split('_')[0];
  const expandKey = woKey + '_' + char.id + (isCompleted ? '_c' : '');
  const expanded = expandedWOs.has(expandKey);
  const safeExpandKey = expandKey.replace(/'/g, "\\'");

  // No recipe found — show minimal card silently
  if (!recipe) {
    const resetHtml = buildResetHtml(isCompleted, completedTs);
    return `<div class="wo-card${isCompleted?' complete':''}" oncontextmenu="openWOLimitPopup('${woKey}',${limit},event)">
      <div class="wo-header"><div><div class="wo-name">${displayName}</div><div class="wo-skill">${skill}</div></div></div>
      ${resetHtml}
    </div>`;
  }

  const [rName, rSkill, ings] = recipe;
  const recipeKey = _recipeKeyByRef.get(recipe) || '';
  const rc = char.charData.RecipeCompletions || {};
  const recipeUnlocked = recipeKey && (rc[recipeKey] !== undefined);
  const recipeCount = rc[recipeKey] || 0;
  const itemMap = getCharItemMap(char);

  const resultIconId = getWOIconId(woKey, recipe);
  const resultIconUrl = resultIconId ? getIconUrl(resultIconId) : null;
  const resultIconHtml = resultIconUrl ? `<img class="item-icon" src="${resultIconUrl}" alt="" style="width:18px;height:18px;margin-right:6px;vertical-align:middle">` : '';

  if (isCompleted) {
    const resetHtml = buildResetHtml(isCompleted, completedTs);
    return `<div class="wo-card complete" oncontextmenu="openWOLimitPopup('${woKey}',${limit},event)">
      <div class="wo-header" style="margin-bottom:0">
        <div style="display:flex;align-items:center">${resultIconHtml}<div><div class="wo-name">${rName}</div><div class="wo-skill">${rSkill}</div></div></div>
        ${showChar?`<span class="wo-char-tag">${char.charData.Character}</span>`:''}
      </div>
      ${resetHtml}
    </div>`;
  }

  // ── Active WO ──
  let canCraft = Infinity;
  for (const [ingId, qty] of ings) canCraft = Math.min(canCraft, Math.floor(getInventoryQtyFast(ingId, itemMap) / qty));
  canCraft = Math.min(canCraft === Infinity ? 0 : canCraft, limit);
  const pct = Math.min(100, (canCraft / limit) * 100);
  const barClass = pct >= 100 ? 'done' : pct > 0 ? 'partial' : 'none';

  // Collapsed: header + progress only
  if (!expanded) {
    return `<div class="wo-card" style="cursor:pointer" onclick="toggleWOCard('${safeExpandKey}')" oncontextmenu="openWOLimitPopup('${woKey}',${limit},event)">
      <div class="wo-header">
        <div style="display:flex;align-items:center">${resultIconHtml}<div><div class="wo-name">${rName}</div><div class="wo-skill">${rSkill}</div></div></div>
        <div style="display:flex;align-items:center;gap:8px">
          ${showChar?`<span class="wo-char-tag">${char.charData.Character}</span>`:''}
          <span style="font-size:11px;color:var(--text-dim);user-select:none">▼</span>
        </div>
      </div>
      <div class="wo-progress">
        <div class="wo-bar-wrap"><div class="wo-bar ${barClass}" style="width:${pct}%"></div></div>
        <span class="wo-qty">${canCraft}/${limit} craftable</span>
      </div>
    </div>`;
  }

  // Expanded: full detail
  const recipeCls = recipeUnlocked ? 'have' : 'lack';
  const recipeLabel = recipeUnlocked ? `✓ Recipe (×${recipeCount})` : `✗ Recipe (not learned)`;
  const safeRecipeKey = recipeKey.replace(/'/g, "\\'");
  const recipeChip = `<span class="wo-ing-chip ${recipeCls}" style="cursor:default"
    onmouseenter="showRecipeSourceTooltip('${safeRecipeKey}',event)"
    onmouseleave="hideRecipeSourceTooltip()">${recipeLabel}</span>`;

  const ingChips = ings.map(([ingId, qty]) => {
    const idata = ITEMS[String(ingId)];
    const iName = idata ? idata[0] : `#${ingId}`;
    const have = getInventoryQtyFast(ingId, itemMap);
    const needed = qty * limit;
    const cls = have >= needed ? 'have' : have >= qty ? 'partial' : 'lack';
    const safeN = iName.replace(/'/g,"\\'");
    const iconId = ITEMS_ICONS[String(ingId)];
    const iconUrl = iconId ? getIconUrl(iconId) : null;
    const iconHtml = iconUrl ? `<img class="item-icon" src="${iconUrl}" alt="" style="width:14px;height:14px">` : '';
    return `<span class="wo-ing-chip ${cls}"
      onmouseenter="showIngTooltip(${ingId},'${safeN}',${qty},${limit},event)"
      onmouseleave="hideIngTooltip()">${iconHtml}${iName} <span class="qty">${have}/${needed}</span></span>`;
  }).join('');

  return `<div class="wo-card" style="cursor:pointer" onclick="toggleWOCard('${safeExpandKey}')" oncontextmenu="openWOLimitPopup('${woKey}',${limit},event)">
    <div class="wo-header">
      <div style="display:flex;align-items:center">${resultIconHtml}<div><div class="wo-name">${rName}</div><div class="wo-skill">${rSkill}</div></div></div>
      <div style="display:flex;align-items:center;gap:8px">
        ${showChar?`<span class="wo-char-tag">${char.charData.Character}</span>`:''}
        <span style="font-size:11px;color:var(--text-dim);user-select:none">▲</span>
      </div>
    </div>
    <div class="wo-progress">
      <div class="wo-bar-wrap"><div class="wo-bar ${barClass}" style="width:${pct}%"></div></div>
      <span class="wo-qty">${canCraft}/${limit} craftable</span>
    </div>
    <div class="wo-ingredients" onclick="event.stopPropagation()">${recipeChip}${ingChips}</div>
    <div style="font-size:10px;color:var(--text-dim);margin-top:5px">Right-click to change max quantity (default: 10)</div>
    ${extraHtml}
  </div>`;
}

function buildResetHtml(isCompleted, completedTs) {
  if (!isCompleted || !completedTs) return '';
  const THIRTY_DAYS = 30*24*60*60*1000;
  const elapsed = Math.min(THIRTY_DAYS, Date.now() - completedTs);
  const remaining = Math.max(0, THIRTY_DAYS - elapsed);
  const fillPct = Math.min(100, (elapsed / THIRTY_DAYS) * 100); // fills up over time
  const days = Math.ceil(remaining / (24*60*60*1000));
  const date = new Date(completedTs).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  return `<div class="wo-completed-date">Completed ${date}</div>
    <div class="wo-reset-row">
      <div class="wo-reset-bar-wrap"><div class="wo-reset-bar" style="width:${fillPct}%"></div></div>
      <span class="wo-reset-label">${remaining > 0 ? `resets in ~${days}d` : 'reset available'}</span>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// AVAILABLE WORK ORDERS TAB
// ═══════════════════════════════════════════════════════════
function scrollNameToWOKey(scrollName) {
  const m = scrollName.match(/^Work Order for (.+?)(?:\s*\((.+?)\))?$/);
  if (!m) return null;
  const skill = m[2] || 'Unknown';
  const itemKey = m[1].replace(/-/g,' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
  return `${skill}_${itemKey}`;
}

const expandedAvailWOs = new Set();
const expandedWOs = new Set();       // woKey_charId -> expanded active/completed WOs
const expandedRecipes = new Set();   // recipe internalName -> expanded recipe rows
const expandedFavorNpcs = new Set(); // npcKey -> expanded training panel

function toggleAvailWO(woKey) {
  if (expandedAvailWOs.has(woKey)) expandedAvailWOs.delete(woKey);
  else expandedAvailWOs.add(woKey);

  const el = document.getElementById('avail_' + CSS.escape(woKey));

    const entry = _availWOEntries?.find(e => e.woKey === woKey);

let _availWOEntries = null; // cache for toggle re-renders
let availWOSearchQ = '';

function onAvailWOSearch(v) {
  availWOSearchQ = v;
  filterAvailWOs();
  setTimeout(() => {
    const el = document.getElementById('availWOSearch');
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 10);
}
function clearAvailWOSearch() { availWOSearchQ = ''; renderAvailableWOsTab(); }

function filterAvailWOs() {
  const q = availWOSearchQ.toLowerCase();
  const entries = _availWOEntries;
  if (!entries) return;

  const bySkill = {};
  for (const entry of entries) {
    const skill = entry.woKey.split('_')[0];
    const recipe = entry.recipe;
    const name = recipe ? recipe[0] : woKeyToDisplayName(entry.woKey);
    if (q && !name.toLowerCase().includes(q) && !skill.toLowerCase().includes(q)) continue;
    if (!bySkill[skill]) bySkill[skill] = [];
    bySkill[skill].push(entry);
  }

  const container = document.getElementById('availWOList');
  if (!container) return;
  let filtered = 0;
  let html = '';
  for (const [skill, skillEntries] of Object.entries(bySkill).sort()) {
    html += `<div style="font-family:'Cinzel',serif;font-size:10px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.12em;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)">${skill}</div>`;
    for (const entry of skillEntries) { html += renderAvailWOCard(entry); filtered++; }
  }
  container.innerHTML = html || '<div style="color:var(--text-dim);padding:16px;font-size:13px">No results</div>';
  const badge = document.getElementById('availWOBadge');
  if (badge) badge.textContent = filtered;
  const clearBtn = document.querySelector('#availWOSearch')?.previousElementSibling;
  if (clearBtn) clearBtn.classList.toggle('visible', !!q);
}

function renderAvailableWOsTab() {
  const allChars = characters;
  if (allChars.length === 0) {
    document.getElementById('appContent').innerHTML = '<div class="full-panel"><div class="empty-state"><div class="icon">📜</div><h3>No character loaded</h3></div></div>';
    return;
  }

  // Collect all WO scrolls — group by derived WO key
  const byWOKey = {};
  for (const char of allChars) {
    for (const item of char.items) {
      if (!item.name.startsWith('Work Order for')) continue;
      const woKey = scrollNameToWOKey(item.name);
      if (!woKey) continue;
      if (!byWOKey[woKey]) {
        byWOKey[woKey] = { woKey, recipe: resolveWORecipe(woKey), scrolls: [] };
      }
      byWOKey[woKey].scrolls.push({
        charName: char.charData.Character,
        charObj: char,
        qty: item.total,
        vaults: item.vaults
      });
    }
  }

  const entries = Object.values(byWOKey).sort((a, b) => {
    const [aSkill, aItem = ''] = a.woKey.split('_');
    const [bSkill, bItem = ''] = b.woKey.split('_');
    return aSkill.localeCompare(bSkill) || aItem.localeCompare(bItem);
  });

  _availWOEntries = entries;

  if (entries.length === 0) {
    document.getElementById('appContent').innerHTML = `<div class="full-panel"><div class="empty-state"><div class="icon">📜</div><h3>No work order scrolls found</h3><p style="font-size:12px;margin-top:6px">Items named "Work Order for…" will appear here</p></div></div>`;
    return;
  }

  // Group by skill
  const bySkill = {};
  for (const entry of entries) {
    const skill = entry.woKey.split('_')[0];
    if (!bySkill[skill]) bySkill[skill] = [];
    bySkill[skill].push(entry);
  }

  let skillRows = '';
  for (const [skill, skillEntries] of Object.entries(bySkill).sort()) {
    skillRows += `<div style="font-family:'Cinzel',serif;font-size:10px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.12em;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)">${skill}</div>`;
    for (const entry of skillEntries) skillRows += renderAvailWOCard(entry);
  }

  const html = `<div class="full-panel"><div class="wo-section">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <div class="wo-section-title" style="margin:0">Available Work Order Scrolls <span id="availWOBadge" class="badge">${entries.length}</span></div>
      <div class="search-input-wrap" style="max-width:260px">
        <button class="search-clear ${availWOSearchQ?'visible':''}" onclick="clearAvailWOSearch()">✕</button>
        <input class="search-input" id="availWOSearch" style="padding-left:34px" placeholder="Search…"
          value="${availWOSearchQ.replace(/"/g,'&quot;')}" oninput="onAvailWOSearch(this.value)">
        <span class="search-icon">⌕</span>
      </div>
    </div>
    <div id="availWOList">${skillRows}</div>
  </div></div>`;
  document.getElementById('appContent').innerHTML = html;
  if (availWOSearchQ) filterAvailWOs();
}

function renderAvailWOCard(entry) {
  const { woKey, recipe, scrolls } = entry;
  const limit = woLimitsCache[woKey] || 10;
  const expanded = expandedAvailWOs.has(woKey);
  const safeKey = woKey.replace(/'/g, "\\'");
  const escapedKey = CSS.escape(woKey);

  // Header: icon + name + skill (no char tag)
  const skill = woKey.split('_')[0];
  let rName = woKeyToDisplayName(woKey).replace(` (${skill})`, '');
  let rSkill = skill;
  if (recipe) { rName = recipe[0]; rSkill = recipe[1]; }

  const resultIconId = getWOIconId(woKey, recipe);
  const resultIconUrl = resultIconId ? getIconUrl(resultIconId) : null;
  const resultIconHtml = resultIconUrl ? `<img class="item-icon" src="${resultIconUrl}" alt="" style="width:18px;height:18px;margin-right:6px;vertical-align:middle">` : '';

  // Progress bar — count across ALL characters
  let canCraft = 0;
  let pct = 0, barClass = 'none';
  if (recipe) {
    const ings = recipe[2] || [];
    let craftable = Infinity;
    for (const [ingId, qty] of ings) {
      const totalHave = getInventoryQtyAllChars(ingId);
      craftable = Math.min(craftable, Math.floor(totalHave / qty));
    }
    canCraft = Math.min(craftable === Infinity ? 0 : craftable, limit);
    pct = Math.min(100, (canCraft / limit) * 100);
    barClass = pct >= 100 ? 'done' : pct > 0 ? 'partial' : 'none';
  }

  // Collapsed view: header + progress bar only
  let expandedSection = '';
  if (expanded && recipe) {
    const ings = recipe[2] || [];
    const recipeKey = _recipeKeyByRef.get(recipe) || '';
    const recipeCls = characters.some(c => (c.charData.RecipeCompletions||{})[recipeKey] !== undefined) ? 'have' : 'lack';
    const recipeLabel = recipeCls === 'have' ? `✓ Recipe` : `✗ Recipe (not learned)`;
    const safeRecipeKey = recipeKey.replace(/'/g,"\\'");
    const recipeChip = `<span class="wo-ing-chip ${recipeCls}" style="cursor:default"
      onmouseenter="showRecipeSourceTooltip('${safeRecipeKey}',event)"
      onmouseleave="hideRecipeSourceTooltip()">${recipeLabel}</span>`;

    const ingChips = ings.map(([ingId, qty]) => {
      const idata = ITEMS[String(ingId)];
      const iName = idata ? idata[0] : `#${ingId}`;
      const have = getInventoryQtyAllChars(ingId);
      const needed = qty * limit;
      const cls = have >= needed ? 'have' : have >= qty ? 'partial' : 'lack';
      const safeN = iName.replace(/'/g,"\\'");
      const iconId = ITEMS_ICONS[String(ingId)];
      const iconUrl = iconId ? getIconUrl(iconId) : null;
      const iconHtml = iconUrl ? `<img class="item-icon" src="${iconUrl}" alt="" style="width:14px;height:14px">` : '';
      return `<span class="wo-ing-chip ${cls}"
        onmouseenter="showIngTooltip(${ingId},'${safeN}',${qty},${limit},event)"
        onmouseleave="hideIngTooltip()">${iconHtml}${iName} <span class="qty">${have}/${needed}</span></span>`;
    }).join('');

    // Scroll location
    const scrollChips = scrolls.map(s => {
      const vaultChips = Object.entries(s.vaults).map(([v]) => {
        const col = vc(v);
        return `<span style="font-size:10px;padding:1px 6px;border-radius:3px;border:1px solid ${col.border};background:${col.bg};color:${col.text};white-space:nowrap">${fvn(v)}</span>`;
      }).join(' ');
      const charTag = characters.length > 1 ? `<span style="font-size:10px;color:var(--text-dim);margin-right:4px">${s.charName}:</span>` : '';
      return `<span style="display:inline-flex;align-items:center;gap:4px">${charTag}${vaultChips}</span>`;
    }).join(' ');

    // Craftable by — which chars have all ingredients (single-craft basis)
    const craftableBy = characters.filter(char => {
      if (!ings.length) return false;
      return ings.every(([ingId, qty]) => getInventoryQtyFast(ingId, getCharItemMap(char)) >= qty);
    }).map(c => c.charData.Character);
    const craftableHtml = craftableBy.length
      ? `<span style="color:var(--green)">${craftableBy.join(', ')}</span>`
      : `<span style="color:var(--text-dim)">No one (missing ingredients)</span>`;

    expandedSection = `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(42,47,63,.5)">
      <div class="wo-ingredients" style="margin-bottom:8px">${recipeChip}${ingChips}</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:5px 8px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:4px">
          <span style="font-size:10px;color:var(--gold-dim);flex-shrink:0">📜 Scroll in:</span>
          ${scrollChips}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:5px 8px;background:rgba(90,153,96,.06);border:1px solid rgba(90,153,96,.25);border-radius:4px">
          <span style="font-size:10px;color:var(--green);flex-shrink:0">🔨 Craftable by:</span>
          <span style="font-size:11px">${craftableHtml}</span>
        </div>
      </div>
      <div style="font-size:10px;color:var(--text-dim);margin-top:6px">Right-click to change max quantity (default: 10)</div>
    </div>`;
  }

  return `<div class="wo-card" id="avail_${escapedKey}" style="cursor:pointer" oncontextmenu="openWOLimitPopup('${safeKey}',${limit},event)" onclick="toggleAvailWO('${safeKey}')">
    <div class="wo-header">
      <div style="display:flex;align-items:center">${resultIconHtml}<div><div class="wo-name">${rName}</div><div class="wo-skill">${rSkill}</div></div></div>
      <span style="font-size:11px;color:var(--text-dim);user-select:none">${expanded ? '▲' : '▼'}</span>
    </div>
    <div class="wo-progress">
      <div class="wo-bar-wrap"><div class="wo-bar ${barClass}" style="width:${pct}%"></div></div>
      <span class="wo-qty">${canCraft}/${limit} craftable (all chars)</span>
    </div>
    ${expandedSection}
  </div>`;
}

// FAVORS TAB
// ═══════════════════════════════════════════════════════════

// Favor level order and display colours
const FAVOR_LEVELS_ALL = ['Neutral','Tolerated','Comfortable','Friends','CloseFriends','BestFriends','LikeFamily','SoulMates'];
const FAVOR_PCT = { Neutral:0, Tolerated:12, Comfortable:25, Friends:38, CloseFriends:55, BestFriends:70, LikeFamily:85, SoulMates:100 };
const FAVOR_COLORS = {
  Neutral:    { bar:'rgba(138,128,112,.4)',  text:'var(--text-dim)',   bg:'rgba(138,128,112,.08)',  border:'rgba(138,128,112,.3)'  },
  Tolerated:  { bar:'rgba(74,144,144,.6)',   text:'#60b0b0',           bg:'rgba(74,144,144,.08)',   border:'rgba(74,144,144,.35)'  },
  Comfortable:{ bar:'rgba(80,120,200,.6)',   text:'#7aa0e8',           bg:'rgba(80,120,200,.08)',   border:'rgba(80,120,200,.35)'  },
  Friends:    { bar:'rgba(90,153,96,.7)',    text:'#7ab880',           bg:'rgba(90,153,96,.08)',    border:'rgba(90,153,96,.35)'   },
  CloseFriends:{ bar:'rgba(201,168,76,.7)', text:'var(--gold)',        bg:'rgba(201,168,76,.08)',   border:'rgba(201,168,76,.35)'  },
  BestFriends:{ bar:'rgba(200,168,76,.85)', text:'var(--gold-light)',  bg:'rgba(200,168,76,.12)',   border:'rgba(200,168,76,.4)'   },
  LikeFamily: { bar:'rgba(128,96,160,.8)',  text:'#a880d0',           bg:'rgba(128,96,160,.1)',    border:'rgba(128,96,160,.45)'  },
  SoulMates:  { bar:'rgba(192,80,80,.8)',   text:'#e07070',           bg:'rgba(192,80,80,.1)',     border:'rgba(192,80,80,.45)'   },
};

function setFavorAreaFilter(area) {
  favorAreaFilter = (favorAreaFilter === area) ? '' : area;
  // Area change must re-render the chips too — clear shell so full re-render runs
  const ac = document.getElementById('appContent');
  if (ac) ac.innerHTML = '';
  renderFavorsTab();
}

function onFavorSearch(v) { favorSearchQ = v; renderFavorsTab(); }
function clearFavorSearch() { favorSearchQ = ''; renderFavorsTab(); }

function toggleFavorNpc(key) {
  if (expandedFavorNpcs.has(key)) expandedFavorNpcs.delete(key);
  else expandedFavorNpcs.add(key);
  // Partial re-render — just rebuild tbody to avoid losing search focus
  const tbody = document.getElementById('favorTbody');
  if (tbody) {
    const showAll = activeCharId === '__all__';
    const chars = showAll ? characters : characters.filter(c => c.id === activeCharId);
    tbody.innerHTML = _lastFavorRows ? _lastFavorRows(chars, showAll) : '';
  }
}
let _lastFavorRows = null; // stored builder fn for partial re-renders

function buildFavorTrainingPanel(npcKey, chars) {
  const entries = NPC_TRAINING[npcKey];
  if (!entries || entries.length === 0) return '';

  // Get recipe completions across all chars: recipeKey -> Set of charIds that know it
  const known = {};
  for (const char of chars) {
    const completions = char.charData.RecipeCompletions || {};
    for (const rk of Object.keys(completions)) {
      if (!known[rk]) known[rk] = new Set();
      known[rk].add(char.id);
    }
  }
  const singleChar = chars.length === 1;

  // Group entries by skill (from RECIPES lookup, else 'Other')
  const bySkill = {};
  for (const e of entries) {
    const skill = (e.recipeKey && RECIPES[e.recipeKey]) ? RECIPES[e.recipeKey][1] : 'Abilities';
    if (!bySkill[skill]) bySkill[skill] = [];
    bySkill[skill].push(e);
  }

  let html = `<div style="padding:8px 4px 4px">`;
  for (const [skill, skillEntries] of Object.entries(bySkill).sort()) {
    html += `<div style="font-family:'Cinzel',serif;font-size:9px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.1em;margin:8px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--border)">${skill}</div>`;
    html += `<div style="display:flex;flex-direction:column;gap:3px">`;
    for (const e of skillEntries.sort((a,b) => (a.skillLevel||0)-(b.skillLevel||0))) {
      const fc = FAVOR_COLORS[e.favor] || FAVOR_COLORS.Neutral;
      const favorLabel = FAVOR_LABELS[e.favor] || e.favor || '?';
      const costStr = e.cost != null ? `<span style="color:var(--gold-dim);font-size:10px;margin-left:6px">${e.cost.toLocaleString()} 🪙</span>` : '';
      const lvlStr = e.skillLevel != null ? `<span style="font-size:10px;color:var(--text-dim);margin-left:4px">Lv.${e.skillLevel}</span>` : '';

      // Learned indicator (only for recipe entries)
      let learnedHtml = '';
      if (e.recipeKey) {
        if (singleChar) {
          const isKnown = !!known[e.recipeKey]?.size;
          learnedHtml = `<span style="font-size:11px;margin-right:5px;color:${isKnown ? 'var(--green)' : 'var(--text-dim)'}">${isKnown ? '✓' : '✗'}</span>`;
        } else {
          const knownCount = known[e.recipeKey]?.size || 0;
          if (knownCount > 0) learnedHtml = `<span style="font-size:10px;margin-right:5px;color:var(--green)">✓${knownCount}</span>`;
          else learnedHtml = `<span style="font-size:10px;margin-right:5px;color:var(--text-dim)">✗</span>`;
        }
      }

      const kwTag = e.recipeKey && RECIPES[e.recipeKey] ? cookingKwTag(RECIPES[e.recipeKey]) : '';
      html += `<div style="display:flex;align-items:center;gap:0;padding:1px 0">
        ${learnedHtml}
        <span style="font-size:12px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.name}</span>${kwTag}
        <span style="flex:1"></span>
        ${lvlStr}
        ${costStr}
        <span style="font-size:10px;margin-left:8px;padding:1px 6px;border-radius:3px;background:${fc.bg};color:${fc.text};border:1px solid ${fc.border};white-space:nowrap">${favorLabel}</span>
      </div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function renderFavorsTab() {
  const showAll = activeCharId === '__all__';
  const chars = showAll ? characters : characters.filter(c => c.id === activeCharId);
  if (chars.length === 0) {
    document.getElementById('appContent').innerHTML = '<div class="full-panel"><div class="empty-state"><div class="icon">🤝</div><h3>No character loaded</h3></div></div>';
    return;
  }

  // Build merged NPC list: npcKey -> { name, area, desc, chars: {charId: favorLevel} }
  const npcMap = {};
  for (const char of chars) {
    for (const [npcKey, npcData] of Object.entries(char.charData.NPCs || {})) {
      const favor = npcData.FavorLevel;
      if (!npcMap[npcKey]) {
        const info = NPCS[npcKey];
        npcMap[npcKey] = {
          key: npcKey,
          name: info?.name || npcKey.replace('NPC_','').replace(/_/g,' '),
          area: info?.area || '',
          desc: info?.desc || '',
          prefs: info?.prefs || [],
          chars: {}
        };
      }
      npcMap[npcKey].chars[char.id] = favor;
    }
  }

  // Collect all areas
  const areaSet = new Map();
  for (const npc of Object.values(npcMap)) {
    if (npc.area) areaSet.set(npc.area, (areaSet.get(npc.area)||0)+1);
  }
  const sortedAreas = [...areaSet.entries()].sort((a,b)=>a[0].localeCompare(b[0]));

  // Filter
  let npcs = Object.values(npcMap);
  if (favorAreaFilter) npcs = npcs.filter(n => n.area === favorAreaFilter);
  if (favorSearchQ) {
    const q = favorSearchQ.toLowerCase();
    npcs = npcs.filter(n => n.name.toLowerCase().includes(q) || n.area.toLowerCase().includes(q));
  }
  // Sort: by highest favor (across chars) desc, then name
  const favorRank = f => FAVOR_LEVELS_ALL.indexOf(f);
  npcs.sort((a, b) => {
    const aMax = Math.max(...Object.values(a.chars).map(favorRank));
    const bMax = Math.max(...Object.values(b.chars).map(favorRank));
    if (bMax !== aMax) return bMax - aMax;
    return a.name.localeCompare(b.name);
  });

  // Area filter chips
  const areaChips = sortedAreas.map(([area, count]) => {
    const active = favorAreaFilter === area;
    return `<span class="filter-chip ${active?'active':''}" onclick="setFavorAreaFilter('${area.replace(/'/g,"\\'")}')">
      ${area} <span style="opacity:.6;font-size:10px">${count}</span>
    </span>`;
  }).join('');

  // Character column headers — single col in all-chars mode
  const charHeaders = showAll ? '<th>Favor by Character</th>' : '';

  // Table rows builder (stored for partial re-renders on toggle)
  const buildRows = (charList, isAll) => npcs.map(npc => {
    const favorCell = isAll
      ? `<td class="favor-bar-cell">${charList.map(c => {
          const favor = npc.chars[c.id];
          if (!favor) return '';
          return `<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">
            <span style="font-size:10px;color:var(--text-dim);min-width:70px;flex-shrink:0">${c.charData.Character}</span>
            ${renderFavorCell(favor)}
          </div>`;
        }).filter(Boolean).join('')}</td>`
      : `<td class="favor-bar-cell">${renderFavorCell(Object.values(npc.chars)[0] || 'Neutral')}</td>`;

    const safeKey = npc.key.replace(/'/g,"\\'");
    const hasTraining = dataLoaded.npc_training && NPC_TRAINING[npc.key]?.length > 0;
    const expanded = expandedFavorNpcs.has(npc.key);
    const toggleIcon = hasTraining ? `<span style="font-size:10px;color:var(--text-dim);margin-left:5px">${expanded ? '▲' : '▼'}</span>` : '';

    const detailRow = (hasTraining && expanded)
      ? `<tr><td colspan="2" style="padding:0 8px 10px 12px;background:var(--bg2);border-bottom:1px solid var(--border)">${buildFavorTrainingPanel(npc.key, charList)}</td></tr>`
      : '';

    return `<tr class="favor-row" style="${hasTraining ? 'cursor:pointer' : ''}"
      onclick="${hasTraining ? `toggleFavorNpc('${safeKey}')` : ''}"
      onmouseenter="showNpcPrefTooltip('${safeKey}', event)"
      onmouseleave="hideNpcPrefTooltip()">
      <td>
        <div class="favor-npc-name">${npc.name}${toggleIcon}</div>
        ${npc.area ? `<div class="favor-npc-area">${npc.area}</div>` : ''}
      </td>
      ${favorCell}
    </tr>${detailRow}`;
  }).join('');

  _lastFavorRows = buildRows;
  const rows = buildRows(chars, showAll);

  // If shell already exists (user is typing in search), only update the body parts
  const existingTbodyWrap = document.getElementById('favorTbodyWrap');
  if (existingTbodyWrap) {
    existingTbodyWrap.innerHTML = npcs.length === 0
      ? `<div class="empty-state"><div class="icon">🤝</div><h3>No NPCs found</h3></div>`
      : `<table class="favor-table">
          <thead><tr><th>NPC</th>${showAll ? charHeaders : '<th>Favor</th>'}</tr></thead>
          <tbody id="favorTbody">${rows}</tbody>
        </table>`;
    const countEl = document.getElementById('favorCount');
    if (countEl) countEl.textContent = npcs.length;
    const clearBtn = document.getElementById('favorClearBtn');
    if (clearBtn) clearBtn.className = `search-clear ${favorSearchQ ? 'visible' : ''}`;
    return;
  }

  document.getElementById('appContent').innerHTML = `<div class="full-panel">
    <div class="search-wrap" style="margin-bottom:10px">
      <div class="search-input-wrap">
        <button id="favorClearBtn" class="search-clear ${favorSearchQ?'visible':''}" onclick="clearFavorSearch()">✕</button>
        <input class="search-input" id="favorSearchInput" type="text"
          placeholder="Search NPCs…"
          value="${favorSearchQ.replace(/"/g,'&quot;')}"
          oninput="onFavorSearch(this.value)">
        <span class="search-icon">⌕</span>
      </div>
    </div>
    <div class="filter-row" style="margin-bottom:14px">
      <span class="filter-chip ${!favorAreaFilter?'active':''}" onclick="setFavorAreaFilter('')">All Locations</span>
      <span class="filter-divider"></span>
      ${areaChips}
    </div>
    <div id="favorCountRow" style="font-size:12px;color:var(--text-dim);margin-bottom:10px">
      Showing <span id="favorCount" style="color:var(--gold)">${npcs.length}</span> NPCs${favorAreaFilter ? ` in <strong style="color:var(--text)">${favorAreaFilter}</strong>` : ''}
    </div>
    ${npcs.length === 0
      ? `<div id="favorTbodyWrap"><div class="empty-state"><div class="icon">🤝</div><h3>No NPCs found</h3></div></div>`
      : `<div id="favorTbodyWrap"><table class="favor-table">
          <thead><tr>
            <th>NPC</th>
            ${showAll ? charHeaders : '<th>Favor</th>'}
          </tr></thead>
          <tbody id="favorTbody">${rows}</tbody>
        </table></div>`}
  </div>`;
}

function renderFavorCell(favor) {
  const fc = FAVOR_COLORS[favor] || FAVOR_COLORS.Neutral;
  const pct = FAVOR_PCT[favor] ?? 0;
  const displayName = favor.replace(/([A-Z])/g,' $1').trim();
  return `<div class="favor-bar-row">
    <div class="favor-pbar-wrap"><div class="favor-pbar" style="width:${pct}%;background:${fc.bar}"></div></div>
    <span class="favor-level-badge" style="color:${fc.text};background:${fc.bg};border-color:${fc.border}">${displayName}</span>
  </div>`;
}

// NPC preference tooltip
const DESIRE_COLORS = {
  Love:    { dot:'#e8c97a', text:'var(--gold-light)' },
  Like:    { dot:'#7ab880', text:'#7ab880' },
  Dislike: { dot:'#d08848', text:'var(--orange)' },
  Hate:    { dot:'#e07070', text:'#e07070' },
};

let npcPrefTimer = null;

function showNpcPrefTooltip(npcKey, e) {
  hideNpcPrefTooltip();
  npcPrefTimer = setTimeout(() => {
    const npc = NPCS[npcKey];
    const prefs = npc?.prefs || [];
    const desc = npc?.desc || '';
    if (!prefs.length && !desc) return;

    // Sort: Love first, then Like, then Dislike, then Hate
    const order = ['Love','Like','Dislike','Hate'];
    const sorted = [...prefs].sort((a,b) => {
      const ai = order.indexOf(a.desire), bi = order.indexOf(b.desire);
      if (ai !== bi) return ai - bi;
      return b.pref - a.pref; // higher score first within same desire
    });

    const rows = sorted.map(p => {
      const dc = DESIRE_COLORS[p.desire] || { dot:'var(--text-dim)', text:'var(--text-dim)' };
      const sign = p.pref > 0 ? '+' : '';
      return `<div class="npc-pref-row">
        <div class="npc-pref-dot" style="background:${dc.dot}"></div>
        <span class="npc-pref-name">${p.name}</span>
        <span class="npc-pref-score" style="color:${dc.text}">${sign}${p.pref}</span>
      </div>`;
    }).join('');

    const tip = document.createElement('div');
    tip.className = 'npc-pref-tooltip';
    tip.id = 'npcPrefTooltip';
    tip.innerHTML = `
      <div class="npc-pref-title">🎁 Gift Preferences</div>
      ${desc ? `<div class="npc-desc-line">${desc}</div>` : ''}
      ${rows || '<div style="font-size:11px;color:var(--text-dim)">No preferences listed</div>'}`;
    document.body.appendChild(tip);

    // Position near cursor, keep on screen
    const W = window.innerWidth, H = window.innerHeight;
    const tw = tip.offsetWidth || 260, th = tip.offsetHeight || 150;
    let x = e.clientX + 16, y = e.clientY + 8;
    if (x + tw > W - 8) x = e.clientX - tw - 16;
    if (y + th > H - 8) y = e.clientY - th - 8;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }, 300);
}

function hideNpcPrefTooltip() {
  clearTimeout(npcPrefTimer);
  document.getElementById('npcPrefTooltip')?.remove();
}

const MAP_ZOOM_MIN = 0.2, MAP_ZOOM_MAX = 5.0;
let _mapScrollPending = false;

function getMapBaseWidth() {
  const sidebarW = 256 + 14 + 32; // panel + gap + padding
  return Math.max(400, window.innerWidth - sidebarW);
}
function setMapZoom(z, pivotX, pivotY) {
  const outer = document.querySelector('.map-outer');
  const newZoom = Math.max(MAP_ZOOM_MIN, Math.min(MAP_ZOOM_MAX, z));
  if (newZoom === mapZoom && outer) return;
  const ratio = newZoom / mapZoom;
  const sx = outer ? (outer.scrollLeft + (pivotX ?? outer.clientWidth/2))  * ratio - (pivotX ?? outer.clientWidth/2)  : 0;
  const sy = outer ? (outer.scrollTop  + (pivotY ?? outer.clientHeight/2)) * ratio - (pivotY ?? outer.clientHeight/2) : 0;
  mapZoom = newZoom;
  renderMapsTab();
  requestAnimationFrame(() => { const o = document.querySelector('.map-outer'); if (o) { o.scrollLeft = sx; o.scrollTop = sy; } });
}
function fitMapToWindow() {
  const availW = getMapBaseWidth();
  const availH = window.innerHeight - 220;
  const img = document.querySelector('.map-container img');
  const w = img?.naturalWidth || 1961, h = img?.naturalHeight || 2048;
  mapZoom = Math.min(availW / w, availH / h, 1.0);
  renderMapsTab();
}
function handleMapWheel(e) {
  e.preventDefault();
  if (_mapScrollPending) return;
  _mapScrollPending = true;
  requestAnimationFrame(() => {
    _mapScrollPending = false;
    const outer = document.querySelector('.map-outer');
    if (!outer) return;
    const rect = outer.getBoundingClientRect();
    const pivotX = e.clientX - rect.left, pivotY = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
    setMapZoom(mapZoom * factor, pivotX, pivotY);
  });
}
function setupMapScrollHandler() {
  const outer = document.querySelector('.map-outer');
  if (!outer || outer._wheelBound) return;
  outer._wheelBound = true;
  outer.addEventListener('wheel', handleMapWheel, {passive: false});
}

// File-based overrides loaded from pg_map_overrides.json (shared base layer)
let fileMapOverrides = { npcs: {}, landmarks: {} };

function loadMapNpcOverrides() {
  try { const s = localStorage.getItem('mapNpcOverrides'); if (s) Object.assign(mapNpcOverrides, JSON.parse(s)); } catch(e) {}
}
function saveMapNpcOverrides() {
  try { localStorage.setItem('mapNpcOverrides', JSON.stringify(mapNpcOverrides)); } catch(e) {}
}
function loadMapLandmarkOverrides() {
  try { const s = localStorage.getItem('mapLandmarkOverrides'); if (s) Object.assign(mapLandmarkOverrides, JSON.parse(s)); } catch(e) {}
}
function saveMapLandmarkOverrides() {
  try { localStorage.setItem('mapLandmarkOverrides', JSON.stringify(mapLandmarkOverrides)); } catch(e) {}
}
// localStorage takes priority over file data per-marker
function getNpcOverride(areaKey, npcKey) {
  return mapNpcOverrides[areaKey]?.[npcKey] || fileMapOverrides.npcs?.[areaKey]?.[npcKey] || null;
}
function getLandmarkOverride(areaKey, lmName) {
  return mapLandmarkOverrides[areaKey]?.[lmName] || fileMapOverrides.landmarks?.[areaKey]?.[lmName] || null;
}
async function fetchMapOverrides() {
  try {
    const r = await fetch('pg_map_overrides.json');
    if (!r.ok) return;
    const data = await r.json();
    fileMapOverrides = { npcs: data.npcs || {}, landmarks: data.landmarks || {} };
    if (document.querySelector('.map-outer')) renderMapsTab(); // refresh if map is open
  } catch(e) {}
}
function exportMapOverrides() {
  // Merge file base with localStorage edits (localStorage wins per-marker)
  const merged = { npcs: {}, landmarks: {} };
  for (const [area, npcs] of Object.entries(fileMapOverrides.npcs)) {
    merged.npcs[area] = {...npcs};
  }
  for (const [area, npcs] of Object.entries(mapNpcOverrides)) {
    if (!merged.npcs[area]) merged.npcs[area] = {};
    Object.assign(merged.npcs[area], npcs);
  }
  for (const [area, lms] of Object.entries(fileMapOverrides.landmarks)) {
    merged.landmarks[area] = {...lms};
  }
  for (const [area, lms] of Object.entries(mapLandmarkOverrides)) {
    if (!merged.landmarks[area]) merged.landmarks[area] = {};
    Object.assign(merged.landmarks[area], lms);
  }
  const blob = new Blob([JSON.stringify(merged, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pg_map_overrides.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function worldToMapPct(x, z, cfg) {
  let px = (x - cfg.worldMinX) / (cfg.worldMaxX - cfg.worldMinX) * 100;
  let py = (1 - (z - cfg.worldMinZ) / (cfg.worldMaxZ - cfg.worldMinZ)) * 100;
  if (cfg.rotate180) { px = 100 - px; py = 100 - py; }
  return { x: Math.max(-2, Math.min(102, px)), y: Math.max(-2, Math.min(102, py)) };
}

function toggleRecipeRow(k) {
  if (expandedRecipes.has(k)) expandedRecipes.delete(k);
  else expandedRecipes.add(k);
  // Only update the tbody, not the whole tab (preserves search focus)
  const { display, allRecipeKeys } = getRecipeDisplayList();
  const tbody = document.getElementById('recipeTableBody');
  if (tbody) tbody.innerHTML = buildRecipeRows(display, allRecipeKeys);
}

function buildRecipeRows(displayList, allRecipeKeys) {
  return displayList.map(([k, r]) => {
    const [rName, rSkill, , resultItems, skillLevelReq] = r;
    const expanded = expandedRecipes.has(k);
    const safeK = k.replace(/'/g, "\\'");

    // Icon from first result item
    let recipeIconHtml = '';
    if (resultItems?.length) {
      const [firstResultId] = resultItems[0];
      const iconId = ITEMS_ICONS[String(firstResultId)];
      const iconUrl = iconId ? getIconUrl(iconId) : null;
      if (iconUrl) recipeIconHtml = `<img class="recipe-icon" src="${iconUrl}" alt="">`;
    }

    // Characters stacked vertically — always visible
    const charStack = characters.map(char => {
      const rc = char.charData.RecipeCompletions || {};
      const has = (rc[k] || 0) > 0;
      return `<div style="display:flex;align-items:center;gap:5px;padding:1px 0">
        <span style="font-size:11px;color:${has?'var(--green)':'var(--red)'};flex-shrink:0">${has?'✓':'✗'}</span>
        <span style="font-size:11px;color:${has?'var(--text)':'var(--text-dim)'}">${char.charData.Character}</span>
      </div>`;
    }).join('');

    if (!expanded) {
      return `<tr class="recipe-row" style="cursor:pointer" onclick="toggleRecipeRow('${safeK}')">
        <td><div style="display:flex;align-items:center;gap:4px">${recipeIconHtml}<span class="recipe-name">${rName}</span>${cookingKwTag(r)}<span style="font-size:11px;color:var(--text-dim);margin-left:4px">▼</span></div></td>
        <td><span class="recipe-skill-tag">${rSkill}</span>${skillLevelReq > 0 ? `<span style="font-size:10px;color:var(--text-dim);margin-left:4px">Lv.${skillLevelReq}</span>` : ''}</td>
        <td style="white-space:nowrap">${charStack}</td>
      </tr>`;
    }

    // Expanded: sources, NPC detail, ingredients
    const sources = SOURCES_RECIPES[k] || [];
    const sourceBadges = sources.map(s => {
      const t = s.t; let cls = 'recipe-source', label = '', extra = '';
      if (t === 'Training')  { cls += ' training'; label = `🎓 ${s.npcName||s.npc||'?'}`; extra = s.area?` <span style="opacity:.7">(${s.area})</span>`:''; }
      else if (t === 'HangOut') { cls += ' hangout'; label = `🤝 ${s.npcName||s.npc||'?'}`; extra = s.area?` <span style="opacity:.7">(${s.area})</span>`:''; }
      else if (t === 'Skill')   { cls += ' skill';   label = `📚 Skill: ${s.skill||'?'}`; }
      else if (t === 'Item')    { cls += ' item';    label = `📦 ${ITEMS[String(s.item)]?.[0]||`item #${s.item}`}`; }
      else if (t === 'NpcGift') { cls += ' gift';    label = `🎁 ${s.npcName||s.npc||'Gift'}`; extra = s.area?` <span style="opacity:.7">(${s.area})</span>`:''; }
      else if (t === 'Quest')   { cls += ' quest';   label = `📜 Quest`; }
      else if (t === 'Effect')  { cls += ' effect';  label = `✨ Effect`; }
      else { label = t; }
      return `<span class="${cls}">${label}${extra}</span>`;
    }).join('');

    const npcSources = sources.filter(s => s.t === 'Training' || s.t === 'HangOut');
    let npcDetailHtml = '';
    if (dataLoaded.npcs && npcSources.length > 0) {
      const npcDetails = npcSources.map(s => {
        const npc = NPCS[s.npc]; if (!npc) return '';
        // For Training, use per-recipe favor from NPC_TRAINING; fall back to service-level favor
        const perRecipeEntry = s.t === 'Training' && dataLoaded.npc_training
          ? NPC_TRAINING[s.npc]?.find(e => e.recipeKey === k) : null;
        const reqFavor = perRecipeEntry?.favor
          || npc.services?.find(sv => sv.type === 'Training' || sv.type === 'HangOut')?.favor
          || '—';
        const favorLabel = FAVOR_LABELS[reqFavor] || reqFavor;
        const costStr = perRecipeEntry?.cost != null
          ? ` · <span style="color:var(--gold)">${perRecipeEntry.cost.toLocaleString()} 🪙</span>` : '';
        return `<span style="font-size:10px;color:var(--text-dim)">${npc.name}: <span style="color:var(--text)">${npc.area}</span> · favor needed: <span style="color:${FAVOR_COLOR(reqFavor)}">${favorLabel}</span>${costStr}</span>`;
      }).filter(Boolean).join('<br>');
      if (npcDetails) npcDetailHtml = `<div style="margin-top:3px">${npcDetails}</div>`;
    }

    let ingsHtml = '';
    if (dataLoaded.sources_items) {
      const [,,ings] = r;
      if (ings?.length) {
        const ingLines = ings.map(([ingId, qty, chance]) => {
          const idata = ITEMS[String(ingId)];
          const iName = idata ? idata[0] : `#${ingId}`;
          const iconId = ITEMS_ICONS[String(ingId)];
          const iconUrl = iconId ? getIconUrl(iconId) : null;
          const iconHtml = iconUrl ? `<img class="item-icon" src="${iconUrl}" alt="" style="width:14px;height:14px;margin-right:4px;vertical-align:middle">` : '';
          const srcBadges = renderItemSources(ingId, 4, `rec_${k}`, ['NpcGift']);
          const chanceHtml = chance != null ? `<span style="font-size:10px;color:var(--orange);margin-left:4px">${Math.round(chance*100)}% consumed</span>` : '';
          return `<div style="display:flex;align-items:flex-start;gap:4px;padding:2px 0">
            <span style="font-size:11px;color:var(--text-dim);white-space:nowrap;min-width:14px">${qty}×</span>
            <div>${iconHtml}<span style="font-size:11px;color:var(--text)">${iName}</span>${chanceHtml}${srcBadges}</div>
          </div>`;
        }).join('');
        ingsHtml = `<div style="margin-top:5px;padding-top:5px;border-top:1px solid rgba(42,47,63,.5)">${ingLines}</div>`;
      }
    }

    return `<tr class="recipe-row" style="cursor:pointer" onclick="toggleRecipeRow('${safeK}')">
      <td onclick="event.stopPropagation()">
        <div style="display:flex;align-items:flex-start;gap:4px" onclick="toggleRecipeRow('${safeK}');event.stopPropagation()">
          ${recipeIconHtml}
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px">
              <span class="recipe-name">${rName}</span>
              ${cookingKwTag(r)}
              <span style="font-size:11px;color:var(--text-dim);cursor:pointer">▲</span>
            </div>
            <div style="margin-top:3px;display:flex;flex-wrap:wrap;gap:2px" onclick="event.stopPropagation()">${sourceBadges}</div>
            ${npcDetailHtml}
            <div onclick="event.stopPropagation()">${ingsHtml}</div>
          </div>
        </div>
      </td>
      <td><span class="recipe-skill-tag">${rSkill}</span>${skillLevelReq > 0 ? `<span style="font-size:10px;color:var(--text-dim);margin-left:4px">Lv.${skillLevelReq}</span>` : ''}</td>
      <td style="white-space:nowrap">${charStack}</td>
    </tr>`;
  }).join('');
}

function getRecipeDisplayList() {
  const allRecipeKeys = new Set();
  for (const char of characters) Object.keys(char.charData.RecipeCompletions||{}).forEach(k=>allRecipeKeys.add(k));
  let pool = Object.entries(RECIPES);
  if (recipeSkillFilter) pool = pool.filter(([,r])=>r[1]===recipeSkillFilter);
  if (recipeSearchQ) {
    const q = recipeSearchQ.toLowerCase();
    pool = pool.filter(([,r]) => r[0].toLowerCase().includes(q) || (r[5]||'').toLowerCase().includes(q));
  }
  const known  = pool.filter(([k])=>allRecipeKeys.has(k));
  const locked = pool.filter(([k])=>!allRecipeKeys.has(k));
  let display = recipeShowLocked === 'all' ? pool
              : recipeShowLocked === 'locked' ? locked
              : known;
  if (recipeSkillSort) {
    const dir = recipeSkillSort === 'asc' ? 1 : -1;
    display = [...display].sort(([,a],[,b]) => {
      const bySkill = (a[1]||'').localeCompare(b[1]||'');
      return dir * (bySkill || (a[4]||0) - (b[4]||0));
    });
  }
  return { known, locked, display, allRecipeKeys };
}

function renderRecipesTab() {
  if (!dataLoaded.recipes) {
    document.getElementById('appContent').innerHTML = `<div class="full-panel"><div class="empty-state"><div class="icon">📖</div><h3>Recipe data not loaded</h3><p style="margin-top:8px;font-size:12px">Place pg_recipes.json in your watched folder, or sync from Settings</p></div></div>`;
    return;
  }

  const { known, locked, display, allRecipeKeys } = getRecipeDisplayList();
  const skills = [...new Set(Object.values(RECIPES).map(r=>r[1]))].filter(Boolean).sort();
  const skillOpts = skills.map(s=>`<option value="${s}" ${s===recipeSkillFilter?'selected':''}>${s}</option>`).join('');

  // If the shell is already rendered (same tab, user is just typing) — only update the body
  const existingShell = document.getElementById('recipeTableBody');
  if (existingShell) {
    updateRecipeBody(display, allRecipeKeys, known.length, locked.length);
    return;
  }

  // Full render (first load or tab switch)
  document.getElementById('appContent').innerHTML = `<div class="full-panel">
    <div class="recipe-controls">
      <div class="search-input-wrap" style="max-width:260px">
        <button class="search-clear ${recipeSearchQ?'visible':''}" id="recipeClearBtn" onclick="clearRecipeSearch()">✕</button>
        <input class="search-input" id="recipeSearchInput" style="padding-left:34px" placeholder="Search recipes…"
          value="${recipeSearchQ.replace(/"/g,'&quot;')}" oninput="onRecipeSearch(this.value)">
        <span class="search-icon">⌕</span>
      </div>
      <select class="recipe-skill-filter" id="recipeSkillSelect" onchange="onRecipeSkillFilter(this.value)">
        <option value="">All Skills</option>${skillOpts}
      </select>
      <div class="mode-toggle" id="recipeModToggle">
        <button class="mode-btn ${recipeShowLocked==='known'?'active':''}" id="recipeBtnKnown" onclick="setRecipeLocked('known')">Known (<span id="recipeKnownCount">${known.length}</span>)</button>
        <button class="mode-btn ${recipeShowLocked==='all'?'active':''}" id="recipeBtnAll" onclick="setRecipeLocked('all')">All (<span id="recipeAllCount">${known.length+locked.length}</span>)</button>
        <button class="mode-btn ${recipeShowLocked==='locked'?'active':''}" id="recipeBtnLocked" onclick="setRecipeLocked('locked')">Locked (<span id="recipeLockedCount">${locked.length}</span>)</button>
      </div>
    </div>
    <div id="recipeTableWrap">
      ${display.length===0
        ? `<div class="empty-state" id="recipeEmpty"><div class="icon">📖</div><h3>No recipes found</h3></div>`
        : `<table class="recipe-table">
            <thead><tr><th>Recipe</th><th style="cursor:pointer;user-select:none" onclick="cycleRecipeSkillSort()" id="recipeSkillTh">Skill ${recipeSkillSort==='asc'?'▲':recipeSkillSort==='desc'?'▼':'⇅'}</th><th>Characters</th></tr></thead>
            <tbody id="recipeTableBody">${buildRecipeRows(display, allRecipeKeys)}</tbody>
          </table>`}
    </div>
  </div>`;
}

function updateRecipeBody(display, allRecipeKeys, knownCount, lockedCount, allCount) {
  // Update counts
  const kEl = document.getElementById('recipeKnownCount');
  const lEl = document.getElementById('recipeLockedCount');
  const aEl = document.getElementById('recipeAllCount');
  if (kEl) kEl.textContent = knownCount;
  if (lEl) lEl.textContent = lockedCount;
  if (aEl) aEl.textContent = allCount ?? (knownCount + lockedCount);
  // Update known/locked/all button active state
  document.getElementById('recipeBtnKnown')?.classList.toggle('active', recipeShowLocked==='known');
  document.getElementById('recipeBtnAll')?.classList.toggle('active', recipeShowLocked==='all');
  document.getElementById('recipeBtnLocked')?.classList.toggle('active', recipeShowLocked==='locked');
  // Update clear button visibility
  const clearBtn = document.getElementById('recipeClearBtn');
  if (clearBtn) clearBtn.classList.toggle('visible', !!recipeSearchQ);
  // Update table body (or swap empty state)
  const wrap = document.getElementById('recipeTableWrap');
  if (!wrap) return;
  if (display.length === 0) {
    wrap.innerHTML = `<div class="empty-state" id="recipeEmpty"><div class="icon">📖</div><h3>No recipes found</h3></div>`;
    return;
  }
  const thEl = document.getElementById('recipeSkillTh');
  if (thEl) thEl.textContent = `Skill ${recipeSkillSort==='asc'?'▲':recipeSkillSort==='desc'?'▼':'⇅'}`;
  const tbody = document.getElementById('recipeTableBody');
  if (tbody) {
    tbody.innerHTML = buildRecipeRows(display, allRecipeKeys);
  } else {
    // Table didn't exist before (was showing empty state), rebuild fully
    wrap.innerHTML = `<table class="recipe-table"><thead><tr><th>Recipe</th><th style="cursor:pointer;user-select:none" onclick="cycleRecipeSkillSort()" id="recipeSkillTh">Skill ${recipeSkillSort==='asc'?'▲':recipeSkillSort==='desc'?'▼':'⇅'}</th><th>Characters</th></tr></thead><tbody id="recipeTableBody">${buildRecipeRows(display, allRecipeKeys)}</tbody></table>`;
  }
}

function FAVOR_COLOR(favor) {
  const map = {
    'Despised':'#c05050','Neutral':'var(--text-dim)','Tolerated':'#8a8070',
    'Comfortable':'#7aa0e8','Friends':'#7ab880','CloseFriends':'var(--gold)',
    'BestFriends':'#e8c97a','LikeFamily':'#a880d0','SoulMates':'#60b0b0'
  };
  return map[favor] || 'var(--text-dim)';
}

function setRecipeLocked(v) { recipeShowLocked = v; renderRecipesTab(); }
function onRecipeSearch(v) {
  recipeSearchQ = v;
  const { known, locked, display, allRecipeKeys } = getRecipeDisplayList();
  updateRecipeBody(display, allRecipeKeys, known.length, locked.length);
}
function clearRecipeSearch() { recipeSearchQ = ''; renderRecipesTab(); }
function onRecipeSkillFilter(v) { recipeSkillFilter = v; renderRecipesTab(); }
function cycleRecipeSkillSort() {
  recipeSkillSort = recipeSkillSort === null ? 'asc' : recipeSkillSort === 'asc' ? 'desc' : null;
  const { known, locked, display, allRecipeKeys } = getRecipeDisplayList();
  updateRecipeBody(display, allRecipeKeys, known.length, locked.length);
}
function cookingKwTag(r) {
  const kw = r[5];
  if (!kw) return '';
  const isMeal = kw === 'Meal';
  return `<span style="font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid ${isMeal?'#7a9e6a':'#c4a24a'};background:${isMeal?'rgba(122,158,106,.15)':'rgba(196,162,74,.15)'};color:${isMeal?'#8fbb7a':'#d4b45a'};font-family:sans-serif;letter-spacing:.03em;vertical-align:middle;margin-left:5px">${kw}</span>`;
}

// STORAGE VAULTS TAB
// ═══════════════════════════════════════════════════════════
const FAVOR_ORDER = ['Despised','Neutral','Tolerated','Comfortable','Friends','CloseFriends','BestFriends','LikeFamily','SoulMates'];

function getCurrentSlots(vaultKey, charNPCs, vaultData) {
  if (!vaultData.levels) return vaultData.numSlots ?? null;
  const favor = charNPCs?.[vaultKey]?.FavorLevel;
  if (!favor) return 0;
  return vaultData.levels[favor] ?? 0;
}

function getNextUpgrade(vaultKey, charNPCs, vaultData) {
  if (!vaultData.levels) return null;
  const favor = charNPCs?.[vaultKey]?.FavorLevel;
  if (!favor) return null;
  const levels = vaultData.levels;
  const curSlots = levels[favor] ?? 0;
  const curIdx = FAVOR_ORDER.indexOf(favor);
  for (const f of FAVOR_ORDER.slice(curIdx + 1)) {
    if (f in levels && levels[f] > curSlots) return { favor: f, slots: levels[f] };
  }
  return null;
}

function renderVaultCard(vaultKey, vaultData, chars, showChar) {
  const npcInfo = NPCS[vaultKey];
  const displayName = npcInfo?.name || vaultData.name || vaultKey.replace('NPC_','').replace('*AccountStorage_','Account: ');
  const area = npcInfo?.area || vaultData.area || '';

  const hasLevels = !!vaultData.levels;

  // Per-character slot info
  const charRows = chars.map(char => {
    const charNPCs = char.charData.NPCs || {};
    const currentSlots = getCurrentSlots(vaultKey, charNPCs, vaultData);
    const next = hasLevels ? getNextUpgrade(vaultKey, charNPCs, vaultData) : null;
    const favor = hasLevels ? (charNPCs[vaultKey]?.FavorLevel || '—') : null;
    const maxSlots = hasLevels ? Math.max(...Object.values(vaultData.levels)) : (vaultData.numSlots ?? null);

    const slotDisplay = currentSlots != null ? currentSlots : '?';
    const pct = (maxSlots && currentSlots != null) ? Math.min(100, (currentSlots / maxSlots) * 100) : 0;

    // Favor progress bar
    let favorHtml = '';
    if (hasLevels && favor && favor !== '—') {
      const fi = FAVOR_ORDER.indexOf(favor);
      const favorPct = Math.max(0, Math.min(100, (fi / (FAVOR_ORDER.length - 1)) * 100));
      favorHtml = `<div class="vault-favor-row">
        <span class="favor-label" style="color:${FAVOR_COLOR(favor)};width:90px">${favor}</span>
        <div class="favor-bar-wrap"><div class="favor-bar" style="width:${favorPct}%"></div></div>
        ${next ? `<span class="favor-label" style="color:var(--gold)">→ ${next.slots} at ${next.favor}</span>` : `<span class="favor-label" style="color:var(--green)">max</span>`}
      </div>`;
    }

    // Level chips for NPC vaults
    let levelsHtml = '';
    if (hasLevels) {
      const chips = FAVOR_ORDER.filter(f => f in vaultData.levels).map(f => {
        const slots = vaultData.levels[f];
        const fi = FAVOR_ORDER.indexOf(favor);
        const fj = FAVOR_ORDER.indexOf(f);
        let chipCls = 'vault-level-chip';
        if (f === favor) chipCls += ' current';
        else if (fj < fi) chipCls += ' unlocked';
        else chipCls += ' locked';
        return `<span class="${chipCls}">${f}: ${slots}</span>`;
      }).join('');
      levelsHtml = `<div class="vault-levels-row">${chips}</div>`;
    }

    // Upgrade hint
    const upgradeHtml = next ? `<div class="vault-upgrade-hint">⬆ ${next.slots - (currentSlots||0)} more slots at ${next.favor}</div>` : '';

    return `<div style="margin-bottom:${chars.length>1?'10px':'0'}">
      ${showChar ? `<div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">${char.charData.Character}</div>` : ''}
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:${favorHtml?'6px':'0'}">
        <div><div style="font-family:'Cinzel',serif;font-size:22px;color:var(--gold-light)">${slotDisplay}</div><div style="font-size:9px;color:var(--text-dim)">SLOTS</div></div>
        ${favorHtml}
      </div>
      ${levelsHtml}
      ${upgradeHtml}
    </div>`;
  }).join('');

  const hasAnyUpgrade = chars.some(char => {
    const next = hasLevels ? getNextUpgrade(vaultKey, char.charData.NPCs||{}, vaultData) : null;
    return next !== null;
  });

  const safeVaultKey = vaultKey.replace(/'/g, "\\'");
  const hasPrefTooltip = !!(NPCS[vaultKey]?.prefs?.length || NPCS[vaultKey]?.desc);
  const prefAttrs = hasPrefTooltip
    ? `onmouseenter="showNpcPrefTooltip('${safeVaultKey}',event)" onmouseleave="hideNpcPrefTooltip()"`
    : '';

  return `<div class="vault-card${hasAnyUpgrade?' has-upgrade':''}" ${prefAttrs}>
    <div class="vault-card-header">
      <div>
        <div class="vault-card-name">${displayName}</div>
        ${area ? `<div class="vault-card-area">${area}</div>` : ''}
        ${npcInfo?.desc ? `<div style="font-size:11px;color:var(--text-dim);margin-top:2px;font-style:italic">${npcInfo.desc}</div>` : ''}
      </div>
    </div>
    ${charRows}
  </div>`;
}

// Helper: get human-readable area for a vault key
function getVaultArea(vaultKey, vaultData) {
  // NPC vaults: prefer NPCS friendly name
  const npcArea = NPCS[vaultKey]?.area;
  if (npcArea) return npcArea;
  // Fall back to vault's area field, strip the "Area" prefix
  const raw = vaultData.area || '';
  return raw.replace(/^Area/, '').replace(/([A-Z])/g, ' $1').trim() || 'Unknown';
}

function setVaultAreaFilter(area) {
  vaultAreaFilter = (vaultAreaFilter === area) ? '' : area;
  renderVaultsTab();
}

function renderVaultsTab() {
  const showAll = activeCharId === '__all__';
  const chars = showAll ? characters : characters.filter(c => c.id === activeCharId);
  if (chars.length === 0) {
    document.getElementById('appContent').innerHTML = '<div class="full-panel"><div class="empty-state"><div class="icon">🗄</div><h3>No character loaded</h3></div></div>';
    return;
  }

  if (!dataLoaded.vaults) {
    document.getElementById('appContent').innerHTML = `<div class="full-panel"><div class="empty-state"><div class="icon">🗄</div><h3>Vault data not loaded</h3><p style="font-size:12px;margin-top:8px">Place pg_storagevaults.json in your watched folder, or sync from Settings</p></div></div>`;
    return;
  }

  // Find all vault keys relevant to selected chars
  const charVaultKeys = new Set();
  for (const char of chars) {
    for (const k of Object.keys(char.charData.NPCs || {})) { if (VAULTS[k]) charVaultKeys.add(k); }
    for (const item of char.items) { for (const v of Object.keys(item.vaults)) { if (VAULTS[v]) charVaultKeys.add(v); } }
  }

  // Separate NPC (have Levels) from fixed
  const npcVaults = [];
  const fixedVaults = [];
  for (const k of [...charVaultKeys].sort()) {
    const vd = VAULTS[k]; if (!vd) continue;
    if (vd.levels) npcVaults.push([k, vd]);
    else fixedVaults.push([k, vd]);
  }

  // Also include NPC vaults where char has favor data even if not in inventory
  const knownNpcKeys = new Set(npcVaults.map(([k])=>k));
  const potentialNpcVaults = Object.entries(VAULTS)
    .filter(([k,v]) => v.levels && !knownNpcKeys.has(k) && chars.some(c => c.charData.NPCs?.[k]));
  const allNpcToShow = [...npcVaults, ...potentialNpcVaults];

  // ── Build area list from all vaults we'll show ──
  const areaSet = new Map(); // area -> count
  for (const [k, vd] of allNpcToShow) {
    const area = getVaultArea(k, vd);
    areaSet.set(area, (areaSet.get(area)||0) + 1);
  }
  for (const [k, vd] of fixedVaults) {
    const area = getVaultArea(k, vd);
    areaSet.set(area, (areaSet.get(area)||0) + 1);
  }
  const sortedAreas = [...areaSet.entries()].sort((a,b) => a[0].localeCompare(b[0]));

  // ── Apply area filter ──
  const filteredNpc   = vaultAreaFilter ? allNpcToShow.filter(([k,vd]) => getVaultArea(k,vd) === vaultAreaFilter) : allNpcToShow;
  const filteredFixed = vaultAreaFilter ? fixedVaults.filter(([k,vd])  => getVaultArea(k,vd) === vaultAreaFilter) : fixedVaults;

  // ── Area filter chips ──
  const areaChips = sortedAreas.map(([area, count]) => {
    const active = vaultAreaFilter === area;
    return `<span class="filter-chip ${active?'active':''}" onclick="setVaultAreaFilter('${area.replace(/'/g,"\\'")}')">
      ${area} <span style="opacity:.6;font-size:10px">${count}</span>
    </span>`;
  }).join('');

  let html = `<div class="full-panel">
    <div class="filter-row" style="margin-bottom:14px">
      <span class="filter-chip ${!vaultAreaFilter?'active':''}" onclick="setVaultAreaFilter('')">All Locations</span>
      <span class="filter-divider"></span>
      ${areaChips}
    </div>`;

  // NPC Storage section
  if (filteredNpc.length > 0) {
    const upgradeCount = filteredNpc.filter(([k,vd]) => chars.some(char => getNextUpgrade(k, char.charData.NPCs||{}, vd))).length;
    html += `<div class="vault-section-title">NPC Storage (${filteredNpc.length}${upgradeCount?` · <span style="color:var(--gold)">⬆ ${upgradeCount} upgradeable</span>`:''}) </div>`;
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px">';
    for (const [k, vd] of filteredNpc) {
      const relevantChars = chars.filter(char => char.charData.NPCs?.[k]);
      if (relevantChars.length === 0 && !showAll) continue;
      html += renderVaultCard(k, vd, relevantChars.length > 0 ? relevantChars : chars, showAll && chars.length > 1);
    }
    html += '</div>';
  }

  // Fixed vaults
  if (filteredFixed.length > 0) {
    html += `<div class="vault-section-title">Fixed Storage (${filteredFixed.length})</div>`;
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">';
    for (const [k, vd] of filteredFixed) {
      const slots = vd.numSlots;
      const displayName = vd.name || k;
      const area = getVaultArea(k, vd);
      html += `<div class="vault-card">
        <div class="vault-card-header">
          <div>
            <div class="vault-card-name">${displayName}</div>
            <div class="vault-card-area">${area}</div>
          </div>
          <div style="text-align:right">
            <div class="vault-card-slots">${slots ?? '?'}</div>
            <div class="vault-card-slots-label">SLOTS</div>
          </div>
        </div>
      </div>`;
    }
    html += '</div>';
  }

  if (filteredNpc.length === 0 && filteredFixed.length === 0) {
    html += '<div class="empty-state"><div class="icon">🗄</div><h3>No vaults in this location</h3></div>';
  }

  html += '</div>';
  document.getElementById('appContent').innerHTML = html;
}

function setQuestLocationFilter(loc) {

function onQuestSearch(v) {

function navigateToQuest(questName) { questSearchQ = questName; questLocationFilter = ''; setMainTab('quests'); }

function renderQuestsTab() {
  const showAll = activeCharId === '__all__';
  const chars = showAll ? characters : characters.filter(c => c.id === activeCharId);

  if (chars.length === 0) {
    document.getElementById('appContent').innerHTML = '<div class="full-panel"><div class="empty-state"><div class="icon">📜</div><h3>No character loaded</h3></div></div>';
    return;
  }

  if (!dataLoaded.quests) {
    document.getElementById('appContent').innerHTML = `<div class="full-panel"><div class="empty-state"><div class="icon">📜</div><h3>Quest data not loaded</h3><p style="font-size:12px;margin-top:8px">Place pg_quests.json in your watched folder, or sync from Settings</p></div></div>`;
    return;
  }

  // Collect all active quests across visible chars
  const questEntries = []; // {internalName, quest, chars:[charObj], hasItems}
  const seen = new Map(); // internalName -> entry index

  for (const char of chars) {
    for (const qName of (char.charData.ActiveQuests || [])) {
      const quest = QUESTS[qName];
      if (!quest) continue;
      if (seen.has(qName)) {
        questEntries[seen.get(qName)].chars.push(char);
      } else {
        const hasItems = quest.objs.some(o => o.tid);
        seen.set(qName, questEntries.length);
        questEntries.push({ internalName: qName, quest, chars: [char], hasItems });
      }
    }
  }

  // Collect all locations for filter chips
  const locSet = new Map();
  for (const { quest } of questEntries) {
    const loc = quest.loc || 'Unknown';
    locSet.set(loc, (locSet.get(loc) || 0) + 1);
  }
  const sortedLocs = [...locSet.entries()].sort((a, b) => a[0].localeCompare(b[0]));

  // Apply filters
  const q = questSearchQ.toLowerCase();
  let filtered = questEntries;
  if (questLocationFilter) filtered = filtered.filter(e => (e.quest.loc || 'Unknown') === questLocationFilter);
  if (q) filtered = filtered.filter(e => e.quest.name.toLowerCase().includes(q) || (e.quest.npcName||'').toLowerCase().includes(q));

  // Sort: quests with items first, then alphabetical
  filtered.sort((a, b) => {
    if (a.hasItems !== b.hasItems) return a.hasItems ? -1 : 1;
    return a.quest.name.localeCompare(b.quest.name);
  });

  // Location filter chips
  const locChips = sortedLocs.map(([loc, count]) => {
    const active = questLocationFilter === loc;
    return `<span class="filter-chip ${active?'active':''}" onclick="setQuestLocationFilter('${loc.replace(/'/g,"\\'")}')">
      ${loc} <span style="opacity:.6;font-size:10px">${count}</span>
    </span>`;
  }).join('');

  // Render quest cards
  const cards = filtered.map(({ internalName, quest, chars: qChars }) => {
    const npcKey = quest.npc || '';
    const npcName = quest.npcName || (npcKey ? npcKey.replace('NPC_','').replace(/_/g,' ') : '');
    const npcInfo = NPCS[npcKey];
    const npcArea = npcInfo?.area || quest.loc || '';

    // NPC icon/name with pref tooltip
    const safeNpcKey = npcKey.replace(/'/g,"\\'");
    const hasPrefTooltip = !!(npcInfo?.prefs?.length || npcInfo?.desc);
    const prefAttrs = hasPrefTooltip
      ? `onmouseenter="showNpcPrefTooltip('${safeNpcKey}',event)" onmouseleave="hideNpcPrefTooltip()"`
      : '';

    // Character tags (if multiple chars have this quest)
    const charTags = showAll && qChars.length > 0
      ? qChars.map(c => `<span class="wo-char-tag">${c.charData.Character}</span>`).join(' ')
      : '';

    // Objective progress rows
    const objRows = quest.objs.map(obj => {
      if (!obj.tid) {
        // Non-item objective — just show description
        const icon = obj.t === 'Kill' ? '⚔' : obj.t === 'UseRecipe' ? '🔨' : obj.t === 'Harvest' ? '🌿' : obj.t === 'Collect' ? '📦' : '•';
        return `<div class="quest-obj-row">
          <span class="quest-obj-icon">${icon}</span>
          <span class="quest-obj-desc">${obj.d || obj.t}</span>
          <span class="quest-obj-need">${obj.n > 1 ? `×${obj.n}` : ''}</span>
        </div>`;
      }

      // Item objective — show progress bar
      const need = obj.n;
      const idata = ITEMS[String(obj.tid)];
      const iName = idata ? idata[0] : obj.d || `#${obj.tid}`;
      const iconId = ITEMS_ICONS[String(obj.tid)];
      const iconUrl = iconId ? getIconUrl(iconId) : null;
      const iconHtml = iconUrl ? `<img class="item-icon" src="${iconUrl}" alt="" style="width:14px;height:14px;margin-right:4px;vertical-align:middle;flex-shrink:0">` : '';

      // Count from the relevant chars (single or all)
      const have = showAll
        ? getInventoryQtyAllChars(obj.tid)
        : getInventoryQtyFast(obj.tid, getCharItemMap(qChars[0]));
      const pct = Math.min(100, (have / need) * 100);
      const barCls = have >= need ? 'done' : have > 0 ? 'partial' : 'none';

      // Check if item is craftable — i.e. some recipe produces it as a result
      const isCraftable = dataLoaded.recipes && CRAFTABLE_ITEM_IDS.has(String(obj.tid));
      const safeN = iName.replace(/'/g,"\\'");
      const nameHtml = isCraftable
        ? `<span class="quest-obj-desc quest-item-link" style="flex:1" title="Click to view recipe" onclick="goToRecipe('${safeN}')">${iName} 🔗</span>`
        : `<span class="quest-obj-desc" style="flex:1">${iName}</span>`;

      // Vault storage info — skip if craftable and have none
      let vaultHtml = '';
      if (have > 0 && !(isCraftable && have === 0)) {
        const vaultChars = showAll ? characters : qChars;
        const vaultsMap = getQuestItemVaults(obj.tid, vaultChars);
        if (vaultsMap) {
          const tags = Object.entries(vaultsMap)
            .map(([v, q]) => `<span style="display:inline-flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:10px;color:var(--text-dim);white-space:nowrap">${v}<span style="color:var(--gold-dim)">×${q}</span></span>`)
            .join('');
          vaultHtml = `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${tags}</div>`;
        }
      }

      return `<div class="quest-obj-row">
        <div class="quest-obj-bar-wrap">
          <div style="display:flex;align-items:center;margin-bottom:3px">
            ${iconHtml}${nameHtml}
            <span class="quest-obj-qty ${have >= need ? 'have' : have > 0 ? 'partial' : 'lack'}">${have}/${need}</span>
          </div>
          <div class="wo-bar-wrap" style="height:4px">
            <div class="wo-bar ${barCls}" style="width:${pct}%"></div>
          </div>
          ${vaultHtml}
        </div>
      </div>`;
    }).join('');

    const hasAnyProgress = quest.objs.some(o => o.tid);

    return `<div class="quest-card">
      <div class="quest-card-header">
        <div class="quest-card-title">
          <span class="quest-name">${quest.name}</span>
          ${charTags}
        </div>
        <div class="quest-meta" ${prefAttrs} style="${hasPrefTooltip?'cursor:default':''}">
          ${npcName ? `<span class="quest-npc">${npcName}</span>` : ''}
          ${npcArea ? `<span class="quest-area">${npcArea}</span>` : ''}
        </div>
      </div>
      ${objRows ? `<div class="quest-objectives">${objRows}</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('appContent').innerHTML = `<div class="full-panel">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <div class="search-input-wrap" style="max-width:260px">
        <button class="search-clear ${questSearchQ?'visible':''}" onclick="clearQuestSearch()">✕</button>
        <input class="search-input" style="padding-left:34px" placeholder="Search quests…"
          value="${questSearchQ.replace(/"/g,'&quot;')}" oninput="onQuestSearch(this.value)">
        <span class="search-icon">⌕</span>
      </div>
      <span style="font-size:12px;color:var(--text-dim)"><span style="color:var(--gold)">${filtered.length}</span> active quests</span>
    </div>
    <div class="filter-row" style="margin-bottom:14px">
      <span class="filter-chip ${!questLocationFilter?'active':''}" onclick="setQuestLocationFilter('')">All Locations</span>
      <span class="filter-divider"></span>
      ${locChips}
    </div>
    ${filtered.length === 0
      ? `<div class="empty-state"><div class="icon">📜</div><h3>No quests found</h3></div>`
      : `<div class="quest-grid">${cards}</div>`}
  </div>`;
}
